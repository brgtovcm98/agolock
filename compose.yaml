services:
  postgres:
    image: 'postgres:17'
    environment:
      - 'POSTGRES_DB=seustockdb'
      - 'POSTGRES_PASSWORD=seustockpass'
      - 'POSTGRES_USER=seustockuser'
    ports:
      - '5433:5432'

  minio:
    image: 'minio/minio:latest'
    command: server /data --console-address ":9001"
    environment:
      - 'MINIO_ROOT_USER=seustockminio'
      - 'MINIO_ROOT_PASSWORD=seustockminiopass'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - 'minio-data:/data'

  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  minio-data:
