spring.datasource.url=jdbc:h2:mem:seustock_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.seu.seustock.model.dto
mybatis.type-handlers-package=com.seu.seustock.configuration
mybatis.configuration.map-underscore-to-camel-case=true

spring.flyway.enabled=false

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-test.sql
app.base-url=http://localhost:8080

# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

seustock.image-storage.type=local
seustock.minio.endpoint=http://localhost:9000
seustock.minio.access-key=test
seustock.minio.secret-key=testpassword
seustock.minio.bucket=seustock-test-images
seustock.upload-dir=build/test-uploads/images

spring.session.store-type=none
