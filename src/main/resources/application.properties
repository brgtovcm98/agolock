spring.application.name=Agolock

server.port=8080

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.seu.seustock.model.dto
mybatis.type-handlers-package=com.seu.seustock.configuration
mybatis.configuration.map-underscore-to-camel-case=true

app.base-url=http://localhost:8089
# QR 코드에 삽입되는 URL. 한 번 QR을 출력한 뒤에는 절대 변경하지 않아야 합니다.
# 서버 주소가 바뀌면 이 URL에서 새 주소로 리다이렉트를 설정하세요.
app.qr-base-url=${app.base-url}

spring.ai.ollama.chat.model=gemma3:4b

# YOLO image preprocessing service
seustock.ai.yolo.enabled=false
seustock.ai.yolo.image-size=640
seustock.ai.yolo.confidence-threshold=0.25
seustock.ai.yolo.iou-threshold=0.7
seustock.ai.yolo.connect-timeout-seconds=5
seustock.ai.yolo.read-timeout-seconds=30

# Ollama AI service timeouts
seustock.ai.ollama.connect-timeout-seconds=10
seustock.ai.ollama.read-timeout-seconds=120

# Image storage backend: minio(default) or local
seustock.image-storage.type=minio

# 더미 초기 데이터 생성기. local 개발 환경에서만 활성화.
seustock.datainit.enabled=false

# 시리얼/로트 추적 기능. 재활성화: true 로 변경.
seustock.features.lot-serial-enabled=false

# 공간 목록 요약: 유통기한 "임박" 판정 기준일(오늘부터 N일 이내).
seustock.space.expiring-soon-days=7

# Security
security.bcrypt.strength=10

# Password reset (Redis 토큰 TTL / 재발송 쿨다운)
seustock.password-reset.token-ttl=30m
seustock.password-reset.resend-cooldown=60s
# 메일 발송 백엔드: logging(개발용 기본값) 또는 smtp(실제 발송). MAIL_TYPE 환경변수로 전환.
seustock.mail.type=${MAIL_TYPE:logging}
# 발신 주소. Gmail SMTP 사용 시 인증된 계정으로 고정되므로 MAIL_USERNAME과 동일해야 한다.
seustock.mail.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@seustock.local}}

# SMTP (Gmail). 자격증명은 환경변수로만 주입한다 — 앱 비밀번호를 절대 커밋하지 않는다.
# 활성화: MAIL_TYPE=smtp MAIL_USERNAME=<gmail> MAIL_PASSWORD=<앱비밀번호> 로 실행.
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Session
spring.session.store-type=redis
spring.session.redis.namespace=seustock:session
spring.session.timeout=30m
server.servlet.session.timeout=30m

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Logging
logging.level.root=WARN
logging.level.com.seu.seustock=INFO
logging.level.org.springframework.ai=DEBUG

# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# File Upload Limits
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:12MB}

