# Production PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:${spring.datasource.hikari.maximum-pool-size}}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:10000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_TIME:60000}
spring.datasource.hikari.leak-detection-threshold=${DB_POOL_LEAK_THRESHOLD:2000}


# Production Tomcat backpressure
server.tomcat.threads.max=${TOMCAT_THREADS_MAX:100}
server.tomcat.threads.min-spare=${TOMCAT_THREADS_MIN_SPARE:10}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:2000}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:100}
server.tomcat.connection-timeout=${TOMCAT_CONNECTION_TIMEOUT:5s}

# Production upload limits
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:12MB}

# Production app URLs
app.base-url=${APP_BASE_URL}
app.qr-base-url=${APP_QR_BASE_URL:${app.base-url}}

# Production image storage
seustock.image-storage.type=minio
seustock.minio.endpoint=${MINIO_ENDPOINT}
seustock.minio.access-key=${MINIO_ACCESS_KEY}
seustock.minio.secret-key=${MINIO_SECRET_KEY}
seustock.minio.bucket=${MINIO_BUCKET:seustock-images}

# Production Redis session storage
spring.session.store-type=redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Production AI services
spring.ai.ollama.base-url=${OLLAMA_BASE_URL}
seustock.ai.yolo.enabled=${YOLO_ENABLED:false}
seustock.ai.yolo.base-url=${YOLO_BASE_URL:}
seustock.ai.yolo.connect-timeout-seconds=${YOLO_CONNECT_TIMEOUT_SECONDS:5}
seustock.ai.yolo.read-timeout-seconds=${YOLO_READ_TIMEOUT_SECONDS:30}
seustock.ai.ollama.connect-timeout-seconds=${OLLAMA_CONNECT_TIMEOUT_SECONDS:10}
seustock.ai.ollama.read-timeout-seconds=${OLLAMA_READ_TIMEOUT_SECONDS:120}
seustock.ai.executor.core-pool-size=${AI_EXECUTOR_CORE_POOL_SIZE:2}
seustock.ai.executor.max-pool-size=${AI_EXECUTOR_MAX_POOL_SIZE:4}
seustock.ai.executor.queue-capacity=${AI_EXECUTOR_QUEUE_CAPACITY:10}

# Production data initialization
seustock.datainit.enabled=false

# Production mail (SMTP). 모든 자격증명은 환경변수로 주입 — 시크릿 미커밋.
seustock.mail.type=${MAIL_TYPE:smtp}
seustock.mail.from=${MAIL_FROM}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
