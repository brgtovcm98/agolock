<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.forgot.title}">비밀번호 찾기 · SeuStock</title>
</head>
<body class="page min-h-screen bg-slate-50 flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main data-component-id="page.forgot-password" class="page-main flex flex-1 items-center justify-center px-4 py-12">
    <div data-component-id="forgot-password.card" class="card w-full max-w-sm p-6">

        <h1 class="page-title mb-6" th:text="#{view.forgot.header}">비밀번호 찾기</h1>

        <!-- 전송 완료: 안내 + 재발송 -->
        <div th:if="${sent}">
            <div class="mb-5 rounded-lg bg-green-50 border border-green-200 px-4 py-3 text-sm text-green-700"
                 th:text="#{view.forgot.sent}">
                입력하신 이메일이 가입되어 있다면 재설정 링크를 보냈습니다. 메일함을 확인해주세요.
            </div>
            <form data-component-id="forgot-password.resend-form" th:action="@{/password/forgot}" method="post" class="space-y-4">
                <input type="hidden" name="email" th:value="${email}">
                <button type="submit"
                        class="w-full rounded-lg border border-slate-300 px-4 py-2 text-sm text-slate-700 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition"
                        th:text="#{view.forgot.resend}">
                    메일 재발송
                </button>
            </form>
        </div>

        <!-- 요청: 이메일 입력 -->
        <div th:unless="${sent}">
            <p class="mb-5 text-sm text-slate-500" th:text="#{view.forgot.guide}">
                가입하신 이메일을 입력하시면 비밀번호 재설정 링크를 보내드립니다.
            </p>
        <form data-component-id="forgot-password.form" th:action="@{/password/forgot}" th:object="${form}" method="post" class="space-y-4">

                <div>
                    <label for="email" class="field-label" th:text="#{view.forgot.email}">
                        이메일
                    </label>
                    <input type="email" id="email" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'border-red-400 focus:ring-red-400'"
                           class="field-input"
                           th:placeholder="#{view.forgot.emailPlaceholder}"
                           placeholder="example@email.com"
                           autocomplete="email">
                    <span th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"
                          class="field-error"></span>
                </div>

                <button type="submit"
                        class="btn-primary w-full text-sm"
                        th:text="#{view.forgot.button}">
                    재설정 링크 보내기
                </button>

            </form>
        </div>

        <p class="mt-5 text-center text-sm text-slate-500">
            <a href="/login" class="font-medium text-blue-600 hover:text-blue-700" th:text="#{view.forgot.backToLogin}">로그인으로 돌아가기</a>
        </p>

    </div>
</main>

</body>
</html>
