<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.forgot.title}">비밀번호 찾기 · SeuStock</title>
</head>
<body class="ui-page ui-min-h-screen ui-bg-slate-50 ui-flex ui-flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="ui-page-main ui-flex ui-flex-1 ui-items-center ui-justify-center ui-px-4 py-12">
    <div class="ui-card ui-w-full ui-max-w-sm ui-p-6">

        <h1 class="ui-page-title ui-mb-6 ui-text-2xl ui-font-bold ui-text-slate-800" th:text="#{view.forgot.header}">비밀번호 찾기</h1>

        <!-- 전송 완료: 안내 + 재발송 -->
        <div th:if="${sent}">
            <div class="mb-5 ui-rounded-md ui-bg-green-50 ui-border ui-border-green-200 ui-px-4 ui-py-3 ui-text-sm ui-text-green-700"
                 th:text="#{view.forgot.sent}">
                입력하신 이메일이 가입되어 있다면 재설정 링크를 보냈습니다. 메일함을 확인해주세요.
            </div>
            <form th:action="@{/password/forgot}" method="post" class="ui-space-y-4">
                <input type="ui-hidden" name="email" th:value="${email}">
                <button type="submit"
                        class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-slate-700
                               ui-hover-bg-slate-100 ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500
                               focus:ring-offset-2 ui-transition"
                        th:text="#{view.forgot.resend}">
                    메일 재발송
                </button>
            </form>
        </div>

        <!-- 요청: 이메일 입력 -->
        <div th:unless="${sent}">
            <p class="mb-5 ui-text-sm ui-text-slate-500" th:text="#{view.forgot.guide}">
                가입하신 이메일을 입력하시면 비밀번호 재설정 링크를 보내드립니다.
            </p>
            <form th:action="@{/password/forgot}" th:object="${form}" method="post" class="ui-space-y-4">

                <div>
                    <label for="email" class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1" th:text="#{view.forgot.email}">
                        이메일
                    </label>
                    <input type="email" id="email" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'ui-border-red-400 ui-focus-ring-red-400'"
                           class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                                  ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500
                                  ui-transition"
                           th:placeholder="#{view.forgot.emailPlaceholder}"
                           placeholder="example@email.com"
                           autocomplete="email">
                    <span th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"
                          class="ui-mt-1 ui-block ui-text-xs ui-text-red-500"></span>
                </div>

                <button type="submit"
                        class="ui-w-full ui-rounded-md ui-bg-blue-600 ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-white
                               ui-hover-bg-blue-700 ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500
                               focus:ring-offset-2 ui-transition"
                        th:text="#{view.forgot.button}">
                    재설정 링크 보내기
                </button>

            </form>
        </div>

        <p class="mt-5 ui-text-center ui-text-sm ui-text-slate-500">
            <a href="/login" class="ui-font-medium ui-text-blue-600 ui-hover-text-blue-700" th:text="#{view.forgot.backToLogin}">로그인으로 돌아가기</a>
        </p>

    </div>
</main>

</body>
</html>
