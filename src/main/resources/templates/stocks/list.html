<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="|#{view.stock.list.title} ┬╖ SeuStock|">ыВ┤ ьЮмъ│а ┬╖ SeuStock</title>
</head>
<body class="page min-h-screen bg-slate-50 flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main data-component-id="page.stocks-list" class="page-main mx-auto w-full max-w-4xl px-4 py-10 flex-1">

    <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
        <div>
            <h1 class="page-title" th:text="#{view.stock.list.header}">ыВ┤ ьЮмъ│а</h1>
            <p class="mt-1 text-sm text-slate-500"
               th:text="${filtered} ? #{view.stock.list.description.filtered} : #{view.stock.list.description.all}"></p>
        </div>
        <a th:if="${filtered}"
           href="/stocks"
           class="btn-secondary"
           th:text="#{view.common.all}">
            ьаДь▓┤ ы│┤ъ╕░
        </a>
    </div>

    <div id="stock-detail-section" data-component-id="stocks.detail-section" aria-live="polite" th:fragment="stock-detail-section" class="space-y-3">
        <div data-component-id="stocks.filter-card" class="card p-4 space-y-2">
            <form data-component-id="stocks.search-form" hx-get="/stocks"
                  hx-target="#stock-detail-section"
                  hx-select="#stock-detail-section"
                  hx-swap="outerHTML"
                  hx-push-url="true"
                  class="flex items-stretch">
                <input type="hidden" name="sortBy" th:value="${sortBy}">
                <input type="hidden" name="page" value="1">
                <input th:if="${itemExternalId != null}" type="hidden" name="item" th:value="${item}">
                <input th:if="${spaceExternalId != null}" type="hidden" name="space" th:value="${space}">
                <input th:if="${shelfExternalId != null}" type="hidden" name="shelf" th:value="${shelf}">
                <input th:if="${boxExternalId != null}" type="hidden" name="box" th:value="${box}">
                <select name="searchType"
                        class="search-select rounded-l-md rounded-r-none border-r-0" th:attr="aria-label=#{aria.filter.searchType}">
                    <option value="all" th:selected="${searchType == null or searchType == 'all'}" th:text="#{view.stock.list.searchType.all}">ьаДь▓┤</option>
                    <option value="item" th:selected="${searchType == 'item'}" th:text="#{view.stock.list.searchType.item}">эТИыкйыкЕ</option>
                    <option th:if="${lotSerialEnabled}" value="serial" th:selected="${searchType == 'serial'}" th:text="#{view.stock.list.searchType.serial}">ьЛЬыжмьЦ╝</option>
                    <option th:if="${lotSerialEnabled}" value="lot" th:selected="${searchType == 'lot'}" th:text="#{view.stock.list.searchType.lot}">ыбЬэК╕</option>
                    <option value="memo" th:selected="${searchType == 'memo'}" th:text="#{view.stock.list.searchType.memo}">ыйФыки</option>
                </select>
                <input type="text"
                       name="keyword"
                       th:value="${keyword}"
                       th:placeholder="#{view.stock.list.searchPlaceholder}"
                       class="search-input rounded-none">
                <button type="submit"
                        class="btn-search btn-sm shrink-0 rounded-l-none rounded-r-md"
                        th:text="#{view.common.search}">
                    ъ▓АьГЙ
                </button>
            </form>
            <div data-component-id="stocks.sort-controls" class="flex flex-wrap gap-1">
                <button th:attr="hx-get=@{/stocks(sortBy='newest',keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box})}"
                        hx-target="#stock-detail-section" hx-select="#stock-detail-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'newest'} ? 'chip-active'"
                        class="chip"
                        th:text="#{view.common.sort.newest}">
                    ъ░АьЮе ь╡ЬьЛа ьИЬ
                </button>
                <button th:attr="hx-get=@{/stocks(sortBy='oldest',keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box})}"
                        hx-target="#stock-detail-section" hx-select="#stock-detail-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'oldest'} ? 'chip-active'"
                        class="chip"
                        th:text="#{view.common.sort.oldest}">
                    ъ░АьЮе ьШдыЮШыРЬ ьИЬ
                </button>
                <button th:attr="hx-get=@{/stocks(sortBy='name',keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box})}"
                        hx-target="#stock-detail-section" hx-select="#stock-detail-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'name'} ? 'chip-active'"
                        class="chip"
                        th:text="#{view.common.sort.name}">
                    эТИыкйыкЕ ьИЬ
                </button>
            </div>
        </div>

        <div id="stock-detail-list"
             data-component-id="stocks.detail-list"
             class="card overflow-hidden">
            <div class="hidden md:grid stock-row gap-3 border-b border-slate-200 bg-slate-50 px-4 py-2.5 text-xs font-semibold uppercase tracking-wide text-slate-500">
                <div th:text="#{view.stock.table.itemAndId}">эТИыкй ┬╖ ьЛЭы│ДьаХы│┤</div>
                <div th:text="#{view.stock.table.location}">ьЬДь╣Ш</div>
                <div class="text-right" th:text="#{view.stock.table.manage}">ъ┤Аыжм</div>
            </div>

            <p th:if="${stocks.empty}"
               class="empty-state"
               th:text="#{view.stock.list.empty}">
                эСЬьЛЬэХа ьЮмъ│аъ░А ьЧЖьК╡ыЛИыЛд.
            </p>

            <div th:if="${!stocks.empty}" class="divide-y divide-slate-100">
                <th:block th:each="stock : ${stocks}">
                    <th:block th:replace="~{stocks/fragments/detail-row :: view(stock=${stock})}"></th:block>
                </th:block>
            </div>
        </div>

        <div th:if="${page.totalPages() > 1}"
             class="flex items-center justify-center gap-1">
            <button th:if="${page.hasPrevious()}"
                    th:attr="hx-get=@{/stocks(page=${page.previousPage()},sortBy=${sortBy},keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box})}"
                    hx-target="#stock-detail-section" hx-select="#stock-detail-section" hx-swap="outerHTML" hx-push-url="true"
                    class="btn-secondary btn-sm text-sm"
                    th:text="#{view.common.pagination.prev}">
                ьЭ┤ьаД
            </button>
            <th:block th:each="pageNumber : ${#numbers.sequence(1, page.totalPages())}">
                <button th:attr="hx-get=@{/stocks(page=${pageNumber},sortBy=${sortBy},keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box})}"
                        hx-target="#stock-detail-section" hx-select="#stock-detail-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${pageNumber == page.page()} ? 'page-link-active'"
                        class="page-link"
                        th:text="${pageNumber}">1</button>
            </th:block>
            <button th:if="${page.hasNext()}"
                    th:attr="hx-get=@{/stocks(page=${page.nextPage()},sortBy=${sortBy},keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box})}"
                    hx-target="#stock-detail-section" hx-select="#stock-detail-section" hx-swap="outerHTML" hx-push-url="true"
                    class="btn-secondary btn-sm text-sm"
                    th:text="#{view.common.pagination.next}">
                ыЛдьЭМ
            </button>
        </div>
    </div>
    <div id="modal" data-component-id="stocks.modal-mount"></div>

</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
