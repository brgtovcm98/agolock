<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="|#{view.stock.list.title} · SeuStock|">내 재고 · SeuStock</title>
</head>
<body class="ui-page ui-min-h-screen ui-bg-slate-50 ui-flex ui-flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="ui-page-main ui-mx-auto ui-w-full ui-max-w-5xl ui-px-4 ui-py-10 ui-flex-1">

    <div class="ui-page-header ui-mb-6 ui-flex ui-flex-wrap ui-items-center ui-justify-between ui-gap-3">
        <div>
            <h1 class="ui-page-title ui-text-2xl ui-font-bold ui-text-slate-800" th:text="#{view.stock.list.header}">내 재고</h1>
            <p class="ui-mt-1 ui-text-sm ui-text-slate-500"
               th:text="${filtered} ? #{view.stock.list.description.filtered} : #{view.stock.list.description.all}"></p>
        </div>
        <a th:if="${filtered}"
           href="/stocks"
           class="ui-rounded-md ui-border ui-border-slate-300 ui-bg-white ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
           th:text="#{view.common.all}">
            전체 보기
        </a>
    </div>

    <div id="stock-detail-section" aria-live="polite" th:fragment="stock-detail-section" class="ui-space-y-3">
        <div class="ui-filter-panel ui-rounded-lg ui-border ui-border-slate-200 ui-bg-white ui-px-4 ui-py-3 ui-space-y-2">
            <form hx-get="/stocks"
                  hx-target="#stock-detail-section"
                  hx-select="#stock-detail-section"
                  hx-swap="outerHTML"
                  hx-push-url="true"
                  class="ui-flex ui-items-stretch">
                <input type="ui-hidden" name="sortBy" th:value="${sortBy}">
                <input type="ui-hidden" name="page" value="1">
                <input th:if="${itemExternalId != null}" type="ui-hidden" name="item" th:value="${item}">
                <input th:if="${spaceExternalId != null}" type="ui-hidden" name="space" th:value="${space}">
                <input th:if="${shelfExternalId != null}" type="ui-hidden" name="shelf" th:value="${shelf}">
                <input th:if="${boxExternalId != null}" type="ui-hidden" name="box" th:value="${box}">
                <select name="searchType"
                        class="ui-shrink-0 ui-rounded-l-md ui-rounded-r-none ui-border ui-border-r-0 ui-border-slate-200 ui-bg-slate-50 ui-px-2 ui-py-1-5 ui-text-xs ui-font-medium ui-text-slate-500 ui-focus-z-10 ui-focus-border-blue-400 ui-focus-outline-none ui-focus-ring-1 ui-focus-ring-blue-400" th:attr="aria-label=#{aria.filter.searchType}">
                    <option value="all" th:selected="${searchType == null or searchType == 'all'}" th:text="#{view.stock.list.searchType.all}">전체</option>
                    <option value="item" th:selected="${searchType == 'item'}" th:text="#{view.stock.list.searchType.item}">품목명</option>
                    <option th:if="${lotSerialEnabled}" value="serial" th:selected="${searchType == 'serial'}" th:text="#{view.stock.list.searchType.serial}">시리얼</option>
                    <option th:if="${lotSerialEnabled}" value="lot" th:selected="${searchType == 'lot'}" th:text="#{view.stock.list.searchType.lot}">로트</option>
                    <option value="memo" th:selected="${searchType == 'memo'}" th:text="#{view.stock.list.searchType.memo}">메모</option>
                </select>
                <input type="text"
                       name="keyword"
                       th:value="${keyword}"
                       th:placeholder="#{view.stock.list.searchPlaceholder}"
                       class="ui-flex-1 ui-min-w-0 ui-rounded-none ui-border ui-border-slate-200 ui-px-3 ui-py-1-5 ui-text-sm ui-text-slate-700 ui-placeholder-slate-400 ui-focus-z-10 ui-focus-border-blue-400 ui-focus-outline-none ui-focus-ring-1 ui-focus-ring-blue-400">
                <button type="submit"
                        class="ui-shrink-0 ui-rounded-l-none ui-rounded-r-md ui-bg-slate-600 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-slate-700 ui-transition"
                        th:text="#{view.common.search}">
                    검색
                </button>
            </form>
            <div class="ui-flex ui-flex-wrap ui-gap-1">
                <button th:attr="hx-get=@{/stocks(sortBy='newest',keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box})}"
                        hx-target="#stock-detail-section" hx-select="#stock-detail-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'newest'} ? 'ui-bg-blue-100 ui-text-blue-700 ui-ring-1 ui-ring-blue-300' : 'ui-bg-slate-100 ui-text-slate-500 ui-hover-bg-slate-200'"
                        class="ui-rounded-full ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-medium ui-transition"
                        th:text="#{view.common.sort.newest}">
                    가장 최신 순
                </button>
                <button th:attr="hx-get=@{/stocks(sortBy='oldest',keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box})}"
                        hx-target="#stock-detail-section" hx-select="#stock-detail-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'oldest'} ? 'ui-bg-blue-100 ui-text-blue-700 ui-ring-1 ui-ring-blue-300' : 'ui-bg-slate-100 ui-text-slate-500 ui-hover-bg-slate-200'"
                        class="ui-rounded-full ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-medium ui-transition"
                        th:text="#{view.common.sort.oldest}">
                    가장 오래된 순
                </button>
                <button th:attr="hx-get=@{/stocks(sortBy='name',keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box})}"
                        hx-target="#stock-detail-section" hx-select="#stock-detail-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'name'} ? 'ui-bg-blue-100 ui-text-blue-700 ui-ring-1 ui-ring-blue-300' : 'ui-bg-slate-100 ui-text-slate-500 ui-hover-bg-slate-200'"
                        class="ui-rounded-full ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-medium ui-transition"
                        th:text="#{view.common.sort.name}">
                    품목명 순
                </button>
            </div>
        </div>

        <div id="stock-detail-list"
             class="ui-list ui-overflow-hidden ui-rounded-lg ui-border ui-border-slate-200 ui-bg-white">
            <div class="ui-hidden ui-md-grid ui-grid-stock-row ui-gap-3 ui-border-b ui-border-slate-200 ui-bg-slate-50 ui-px-4 ui-py-3 ui-text-xs ui-font-semibold ui-uppercase ui-tracking-wide ui-text-slate-500">
                <div th:text="#{view.stock.table.item}">품목</div>
                <div th:text="#{view.stock.table.location}">위치</div>
                <div th:text="#{view.stock.table.identifier}">식별정보</div>
                <div class="ui-text-right" th:text="#{view.stock.table.manage}">관리</div>
            </div>

            <p th:if="${stocks.empty}"
               class="ui-px-4 ui-py-10 ui-text-center ui-text-sm ui-text-slate-400"
               th:text="#{view.stock.list.empty}">
                표시할 재고가 없습니다.
            </p>

            <div th:if="${!stocks.empty}" class="ui-divide-y ui-divide-slate-100">
                <th:block th:each="stock : ${stocks}">
                    <th:block th:replace="~{stocks/fragments/detail-row :: view(stock=${stock})}"></th:block>
                </th:block>
            </div>
        </div>

        <div th:if="${page.totalPages() > 1}"
             class="ui-flex ui-items-center ui-justify-center ui-gap-1">
            <button th:if="${page.hasPrevious()}"
                    th:attr="hx-get=@{/stocks(page=${page.previousPage()},sortBy=${sortBy},keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box})}"
                    hx-target="#stock-detail-section" hx-select="#stock-detail-section" hx-swap="outerHTML" hx-push-url="true"
                    class="ui-rounded-md ui-border ui-border-slate-300 ui-bg-white ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                    th:text="#{view.common.pagination.prev}">
                이전
            </button>
            <th:block th:each="pageNumber : ${#numbers.sequence(1, page.totalPages())}">
                <button th:attr="hx-get=@{/stocks(page=${pageNumber},sortBy=${sortBy},keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box})}"
                        hx-target="#stock-detail-section" hx-select="#stock-detail-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${pageNumber == page.page()} ? 'ui-bg-blue-600 ui-text-white' : 'ui-border ui-border-slate-300 ui-bg-white ui-text-slate-600 ui-hover-bg-slate-50'"
                        class="ui-min-w-9 ui-rounded-md ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-transition"
                        th:text="${pageNumber}">1</button>
            </th:block>
            <button th:if="${page.hasNext()}"
                    th:attr="hx-get=@{/stocks(page=${page.nextPage()},sortBy=${sortBy},keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box})}"
                    hx-target="#stock-detail-section" hx-select="#stock-detail-section" hx-swap="outerHTML" hx-push-url="true"
                    class="ui-rounded-md ui-border ui-border-slate-300 ui-bg-white ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                    th:text="#{view.common.pagination.next}">
                다음
            </button>
        </div>
    </div>
    <div id="modal"></div>

</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
