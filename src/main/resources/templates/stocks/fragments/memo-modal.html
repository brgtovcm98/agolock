<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 메모 보기 모달 -->
<div th:fragment="view(stock)"
     id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="ui-modal-overlay ui-fixed ui-inset-0 ui-z-50 ui-flex ui-items-center ui-justify-center ui-bg-black-40">
    <div class="ui-modal-dialog ui-bg-white ui-rounded-xl ui-shadow-xl ui-w-full max-w-md ui-mx-4 ui-p-6 ui-max-h-90vh ui-overflow-y-auto ui-flex ui-flex-col">
        
        <h2 id="modal-title" class="ui-text-lg ui-font-semibold ui-text-slate-800 ui-mb-1" th:text="#{view.stock.modal.memo.viewTitle}">메모 보기</h2>
        <p class="ui-text-xs ui-text-slate-400 ui-mb-4" th:text="${stock.itemName}">품목명</p>

        <div class="ui-flex-1 ui-mb-6">
            <div class="ui-rounded-lg ui-bg-slate-50 ui-border ui-border-slate-100 p-4 min-h-[8rem] ui-text-sm ui-text-slate-700 whitespace-pre-wrap"
                 th:text="${stock.memo != null and !stock.memo.isEmpty()} ? ${stock.memo} : '-'">
                메모 내용이 없습니다.
            </div>
        </div>

        <div class="ui-flex ui-gap-2 ui-justify-end">
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="ui-rounded-md ui-border ui-border-slate-300 ui-px-4 ui-py-2 ui-text-sm ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                    th:text="#{view.common.close}">
                닫기
            </button>
            <button type="button"
                    th:attr="hx-get=@{/stocks/{id}/memo/edit(id=${stock.externalId})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="ui-rounded-md ui-bg-blue-600 ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-blue-700 ui-transition"
                    th:text="#{view.common.edit}">
                수정
            </button>
        </div>
    </div>
</div>

<!-- 메모 작성/수정 모달 -->
<div th:fragment="edit(stock)"
     id="modal"
     class="ui-fixed ui-inset-0 ui-z-50 ui-flex ui-items-center ui-justify-center ui-bg-black-40">
    <div class="ui-bg-white ui-rounded-xl ui-shadow-xl ui-w-full max-w-md ui-mx-4 ui-p-6 ui-max-h-90vh ui-overflow-y-auto ui-flex ui-flex-col">

        <h2 class="ui-text-lg ui-font-semibold ui-text-slate-800 ui-mb-1"
            th:text="${stock.memo != null and !stock.memo.isEmpty()} ? #{view.stock.modal.memo.editTitle} : #{view.stock.modal.memo.writeTitle}">
            메모 작성
        </h2>
        <p class="ui-text-xs ui-text-slate-400 ui-mb-4" th:text="${stock.itemName}">품목명</p>

        <form th:attr="hx-put=@{/stocks/{id}/memo(id=${stock.externalId})},hx-target='#stock-' + ${stock.externalId}"
              hx-swap="outerHTML">
            
            <div class="ui-mb-6">
                <textarea name="memo" rows="4"
                          class="ui-w-full ui-resize-y ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500 ui-transition"
                          th:text="${stock.memo}"
                          th:placeholder="#{view.stock.form.memo.placeholder}"
                          autofocus></textarea>
            </div>

            <div class="ui-flex ui-gap-2 ui-justify-end">
                <button type="button"
                        th:attr="hx-get=${stock.memo != null and !stock.memo.isEmpty()} ? @{/stocks/{id}/memo(id=${stock.externalId})} : '/empty'"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="ui-rounded-md ui-border ui-border-slate-300 ui-px-4 ui-py-2 ui-text-sm ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        class="ui-rounded-md ui-bg-blue-600 ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-blue-700 ui-transition"
                        th:text="#{view.common.edit}">
                    수정
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
