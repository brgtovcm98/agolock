<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 메모 보기 모달 -->
<div th:fragment="view(stock)"
     id="modal" data-component-id="stocks.modal.memo-view" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="modal-overlay fixed inset-0 z-50 flex items-center justify-center">
    <div class="modal-dialog max-w-md mx-4 p-6 flex flex-col">

        <h2 id="modal-title" class="text-lg font-semibold text-ink mb-1" th:text="#{view.stock.modal.memo.viewTitle}">메모 보기</h2>
        <p class="text-xs text-faint mb-4" th:text="${stock.itemName}">품목명</p>

        <div class="flex-1 mb-6">
            <div class=" bg-surface-dim border border-line-soft p-4 min-h-[8rem] text-sm text-ink whitespace-pre-wrap"
                 th:text="${stock.memo != null and !stock.memo.isEmpty()} ? ${stock.memo} : '-'">
                메모 내용이 없습니다.
            </div>
        </div>

        <div class="flex gap-2 justify-end">
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="btn-secondary text-sm"
                    th:text="#{view.common.close}">
                닫기
            </button>
            <button type="button"
                    th:attr="hx-get=@{/stocks/{id}/memo/edit(id=${stock.externalId},page=${page != null ? page.page() : 1},sortBy=${sortBy},keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box},filter=${filter})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="btn-primary text-sm"
                    th:text="#{view.common.edit}">
                수정
            </button>
        </div>
    </div>
</div>

<!-- 메모 작성/수정 모달 -->
<div th:fragment="edit(stock)"
     id="modal"
     data-component-id="stocks.modal.memo-edit"
     class="modal-overlay fixed inset-0 z-50 flex items-center justify-center">
    <div class="modal-dialog max-w-md mx-4 p-6 flex flex-col">

        <h2 class="text-lg font-semibold text-ink mb-1"
            th:text="${stock.memo != null and !stock.memo.isEmpty()} ? #{view.stock.modal.memo.editTitle} : #{view.stock.modal.memo.writeTitle}">
            메모 작성
        </h2>
        <p class="text-xs text-faint mb-4" th:text="${stock.itemName}">품목명</p>

        <form th:attr="hx-put=@{/stocks/{id}/memo(id=${stock.externalId},page=${page != null ? page.page() : 1},sortBy=${sortBy},keyword=${keyword},searchType=${searchType},item=${item},space=${space},shelf=${shelf},box=${box},filter=${filter})}"
              hx-target="#stock-detail-section"
              hx-swap="outerHTML">
            <input type="hidden" name="sortBy" th:value="${sortBy}">
            <input type="hidden" name="keyword" th:value="${keyword}">
            <input type="hidden" name="searchType" th:value="${searchType}">
            <input type="hidden" name="filter" th:value="${filter}">
            <input type="hidden" name="page" th:value="${page != null ? page.page() : 1}">
            <input th:if="${itemExternalId != null}" type="hidden" name="item" th:value="${item}">
            <input th:if="${spaceExternalId != null}" type="hidden" name="space" th:value="${space}">
            <input th:if="${shelfExternalId != null}" type="hidden" name="shelf" th:value="${shelf}">
            <input th:if="${boxExternalId != null}" type="hidden" name="box" th:value="${box}">

            <div class="mb-6">
                <textarea name="memo" rows="4"
                          class="field-input resize-y"
                          th:text="${stock.memo}"
                          th:placeholder="#{view.stock.form.memo.placeholder}"
                          autofocus></textarea>
            </div>

            <div class="flex gap-2 justify-end">
                <button type="button"
                        th:attr="hx-get=${stock.memo != null and !stock.memo.isEmpty()} ? @{/stocks/{id}/memo(id=${stock.externalId})} : '/empty'"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="btn-secondary text-sm"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        class="btn-primary text-sm"
                        th:text="#{view.common.edit}">
                    수정
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
