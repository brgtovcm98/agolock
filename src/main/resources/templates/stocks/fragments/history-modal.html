<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 단위(unit) 이력 타임라인 모달 -->
<div th:fragment="modal"
     id="modal" data-component-id="stocks.modal.history" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="modal-overlay">
    <div class="modal-dialog modal-dialog-md p-6 max-h-[80vh] flex flex-col">

        <div class="flex items-start justify-between mb-4">
            <div class="min-w-0">
                <h2 id="modal-title" class="text-lg font-semibold text-ink truncate">
                    <span th:text="#{view.stock.history.title(${stock.itemName})}">단위 이력</span>
                </h2>
                <div class="mt-1 flex flex-wrap items-center gap-x-2 gap-y-1 text-xs text-faint">
                    <span th:if="${lotSerialEnabled and stock.serialNumber != null and !stock.serialNumber.isEmpty()}">
                        <span class="text-faint">SN</span>
                        <span class="font-mono text-muted" th:text="${stock.serialNumber}"></span>
                    </span>
                    <span th:if="${lotSerialEnabled and stock.lotNumber != null and !stock.lotNumber.isEmpty()}">
                        <span class="text-faint">LOT</span>
                        <span class="font-mono text-muted" th:text="${stock.lotNumber}"></span>
                    </span>
                    <span class="badge font-semibold"
                          th:text="#{${'enum.StockStatus.' + stock.status.name()}}">재고</span>
                </div>
            </div>
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="modal-close shrink-0"
                    th:attr="aria-label=#{aria.modal.close}">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="overflow-y-auto flex-1">
            <p th:if="${history.empty}"
               class="py-8 text-center text-sm text-faint"
               th:text="#{view.stock.history.empty}">이 단위의 거래 기록이 없습니다.</p>

            <!-- 시간순(오래된→최신) 생애 타임라인 -->
            <ol th:unless="${history.empty}" class="relative border-l border-line-soft ml-2">
                <li th:each="tx : ${history}" class="ml-4 pb-5 last:pb-0">
                    <span class="absolute -left-1.5 mt-1-5 h-3 w-3 border-2 border-surface"
                          th:classappend="${tx.transactionType.name() == 'IN'} ? 'bg-ink' :
                                          (${tx.transactionType.name() == 'OUT'} ? 'bg-accent' : 'bg-disabled')"></span>

                    <!-- 유형 badge + 일시 -->
                    <div class="flex items-center justify-between gap-2">
                        <span th:text="#{${'enum.TransactionType.' + tx.transactionType.name()}}"
                              th:classappend="${tx.transactionType.name() == 'IN'} ? 'badge-in' :
                                              (${tx.transactionType.name() == 'OUT'} ? 'badge-out' : 'badge')"
                              class="font-semibold"></span>
                        <span class="font-mono text-xs text-faint whitespace-nowrap shrink-0"
                              th:text="${#temporals.format(tx.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>

                    <!-- 이동 궤적 (MOVE 행만) -->
                    <div th:if="${tx.transactionType.name() == 'MOVE' and tx.fromSpaceName != null and tx.toSpaceName != null}"
                         class="mt-1-5 flex items-start gap-2 text-sm">
                        <span class="shrink-0 w-16 text-xs font-medium text-faint" th:text="#{view.stock.history.location}">위치</span>
                        <span class="breadcrumb">
                            <span th:text="${tx.fromSpaceName}"></span>
                            <span th:if="${tx.fromShelfName != null}" th:text="' › ' + ${tx.fromShelfName}" class="sep"></span>
                            <span th:if="${tx.fromBoxName != null}" th:text="' › ' + ${tx.fromBoxName}" class="sep"></span>
                            <span class="mx-1 text-line">→</span>
                            <span th:text="${tx.toSpaceName}"></span>
                            <span th:if="${tx.toShelfName != null}" th:text="' › ' + ${tx.toShelfName}" class="sep"></span>
                            <span th:if="${tx.toBoxName != null}" th:text="' › ' + ${tx.toBoxName}" class="sep"></span>
                        </span>
                    </div>

                    <!-- 메모 -->
                    <div th:if="${tx.memo != null and !tx.memo.isEmpty()}"
                         class="mt-1 flex items-start gap-2 text-sm">
                        <span class="shrink-0 w-16 text-xs font-medium text-faint" th:text="#{view.stock.history.memo}">메모</span>
                        <span class="text-ink" th:text="${#messages.msgOrNull(tx.memo) ?: tx.memo}"></span>
                    </div>
                </li>
            </ol>
        </div>

        <div class="flex justify-end pt-4 border-t border-line-soft mt-4">
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="btn-secondary-strong btn-sm"
                    th:text="#{view.common.close}">
                닫기
            </button>
        </div>
    </div>
</div>

</body>
</html>
