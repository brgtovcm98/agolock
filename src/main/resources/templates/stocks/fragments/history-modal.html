<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 단위(unit) 이력 타임라인 모달 -->
<div th:fragment="modal"
     id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="ui-modal-overlay ui-fixed ui-inset-0 ui-z-50 ui-flex ui-items-center ui-justify-center ui-bg-black-40">
    <div class="ui-modal-dialog ui-bg-white ui-rounded-xl ui-shadow-xl ui-w-full max-w-2xl ui-mx-4 ui-p-6 max-h-[80vh] ui-flex ui-flex-col">

        <div class="ui-flex ui-items-start ui-justify-between ui-mb-4">
            <div class="ui-min-w-0">
                <h2 id="modal-title" class="ui-text-lg ui-font-semibold ui-text-slate-800 ui-truncate">
                    <span th:text="#{view.stock.history.title(${stock.itemName})}">단위 이력</span>
                </h2>
                <div class="ui-mt-1 ui-flex ui-flex-wrap ui-items-center ui-gap-x-2 ui-gap-y-1 ui-text-xs ui-text-slate-400">
                    <span th:if="${lotSerialEnabled and stock.serialNumber != null and !stock.serialNumber.isEmpty()}">
                        <span class="ui-text-slate-300">SN</span>
                        <span class="ui-text-slate-500" th:text="${stock.serialNumber}"></span>
                    </span>
                    <span th:if="${lotSerialEnabled and stock.lotNumber != null and !stock.lotNumber.isEmpty()}">
                        <span class="ui-text-slate-300">LOT</span>
                        <span class="ui-text-slate-500" th:text="${stock.lotNumber}"></span>
                    </span>
                    <span th:classappend="${stock.status.name() == 'IN_STOCK'} ? 'bg-green-50 ui-text-green-700 ring-green-100' :
                                          (${stock.status.name() == 'DISPATCHED'} ? 'ui-bg-sky-50 ui-text-sky-700 ui-ring-sky-100' :
                                          (${stock.status.name() == 'LOST'} ? 'ui-bg-red-50 ui-text-red-700 ring-red-100' :
                                          (${stock.status.name() == 'DAMAGED'} ? 'bg-orange-50 ui-text-orange-700 ring-orange-100' :
                                          'ui-bg-slate-100 ui-text-slate-600 ring-slate-200')))"
                          class="ui-inline-flex ui-rounded-full ui-px-2 ui-py-0-5 ui-text-xs ui-font-semibold ui-ring-1 ui-ring-inset"
                          th:text="#{${'enum.StockStatus.' + stock.status.name()}}">재고중</span>
                </div>
            </div>
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="ui-shrink-0 ui-text-slate-400 ui-hover-text-slate-600 ui-transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="ui-overflow-y-auto ui-flex-1">
            <p th:if="${history.empty}"
               class="ui-py-8 ui-text-center ui-text-sm ui-text-slate-400"
               th:text="#{view.stock.history.empty}">이 단위의 거래 기록이 없습니다.</p>

            <!-- 시간순(오래된→최신) 생애 타임라인 -->
            <ol th:unless="${history.empty}" class="ui-relative border-l ui-border-slate-200 ml-2">
                <li th:each="tx : ${history}" class="ml-4 pb-5 last:pb-0">
                    <span class="ui-absolute -left-1.5 ui-mt-1-5 h-3 w-3 ui-rounded-full border-2 ui-border-white"
                          th:classappend="${tx.transactionType.name() == 'IN'} ? 'ui-bg-blue-400' :
                                          (${tx.transactionType.name() == 'OUT'} ? 'ui-bg-red-400' : 'ui-bg-slate-300')"></span>

                    <!-- 유형 badge + 일시 -->
                    <div class="ui-flex ui-items-center ui-justify-between ui-gap-2">
                        <span th:text="#{${'enum.TransactionType.' + tx.transactionType.name()}}"
                              th:classappend="${tx.transactionType.name() == 'IN'} ? 'ui-bg-blue-50 ui-text-blue-600' :
                                              (${tx.transactionType.name() == 'OUT'} ? 'ui-bg-red-50 ui-text-red-500' : 'ui-bg-slate-100 ui-text-slate-600')"
                              class="ui-inline-block rounded ui-px-2 ui-py-0-5 ui-text-xs ui-font-semibold"></span>
                        <span class="ui-text-xs ui-text-slate-400 whitespace-nowrap ui-shrink-0"
                              th:text="${#temporals.format(tx.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>

                    <!-- 이동 궤적 (MOVE 행만) -->
                    <div th:if="${tx.transactionType.name() == 'MOVE' and tx.fromSpaceName != null and tx.toSpaceName != null}"
                         class="ui-mt-1-5 ui-flex ui-items-start ui-gap-2 ui-text-sm">
                        <span class="ui-shrink-0 w-16 ui-text-xs ui-font-medium ui-text-slate-400" th:text="#{view.stock.history.location}">위치</span>
                        <span class="ui-text-slate-700">
                            <span th:text="${tx.fromSpaceName}"></span>
                            <span th:if="${tx.fromShelfName != null}" th:text="' › ' + ${tx.fromShelfName}" class="ui-text-slate-400"></span>
                            <span th:if="${tx.fromBoxName != null}" th:text="' › ' + ${tx.fromBoxName}" class="ui-text-slate-400"></span>
                            <span class="mx-1 ui-text-slate-300">→</span>
                            <span th:text="${tx.toSpaceName}"></span>
                            <span th:if="${tx.toShelfName != null}" th:text="' › ' + ${tx.toShelfName}" class="ui-text-slate-400"></span>
                            <span th:if="${tx.toBoxName != null}" th:text="' › ' + ${tx.toBoxName}" class="ui-text-slate-400"></span>
                        </span>
                    </div>

                    <!-- 메모 -->
                    <div th:if="${tx.memo != null and !tx.memo.isEmpty()}"
                         class="ui-mt-1 ui-flex ui-items-start ui-gap-2 ui-text-sm">
                        <span class="ui-shrink-0 w-16 ui-text-xs ui-font-medium ui-text-slate-400" th:text="#{view.stock.history.memo}">메모</span>
                        <span class="ui-text-slate-500" th:text="${#messages.msgOrNull(tx.memo) ?: tx.memo}"></span>
                    </div>
                </li>
            </ol>
        </div>

        <div class="ui-flex ui-justify-end pt-4 ui-border-t ui-border-slate-100 mt-4">
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="ui-rounded-md ui-border ui-border-slate-300 ui-px-4 ui-py-2 ui-text-sm ui-text-slate-600
                           ui-hover-bg-slate-50 ui-transition"
                    th:text="#{view.common.close}">
                닫기
            </button>
        </div>
    </div>
</div>

</body>
</html>
