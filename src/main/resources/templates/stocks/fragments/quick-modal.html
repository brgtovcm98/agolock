<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="ui-modal-overlay ui-fixed ui-inset-0 ui-z-50 ui-flex ui-items-center ui-justify-center ui-bg-black-40">
    <div class="ui-modal-dialog ui-bg-white ui-rounded-xl ui-shadow-xl ui-w-full ui-max-w-sm ui-mx-4 ui-p-6 ui-max-h-90vh ui-overflow-y-auto ui-flex ui-flex-col">

        <h2 id="modal-title" class="ui-text-lg ui-font-semibold ui-text-slate-800 ui-mb-1" th:text="#{view.stock.list.quickAdd}">빠른 재고 등록</h2>
        <p class="ui-text-xs ui-text-slate-400 ui-mb-4" th:text="#{view.stock.modal.quick.description}">품목을 새로 만들고 바로 재고에 추가합니다.</p>

        <form th:object="${form}"
              method="post"
              enctype="multipart/form-data"
              hx-post="/stocks/quick"
              hx-encoding="multipart/form-data"
              hx-target="#stock-panel"
              hx-swap="outerHTML">

            <input type="ui-hidden" name="spaceExternalId" th:value="${spaceId}">
            <input type="ui-hidden" name="shelfExternalId" th:value="${shelfId}">
            <input type="ui-hidden" name="boxExternalId"   th:value="${boxId}">

            <div class="mb-3">
                <label class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1">
                    <span th:text="#{view.item.modal.image.label}">사진</span> <span class="ui-text-slate-400 ui-font-normal" th:text="|#{view.common.optional}|">(선택)</span>
                </label>
                <label class="ui-flex ui-items-center ui-gap-2 ui-cursor-pointer ui-w-full ui-rounded-md ui-border ui-border-dashed ui-border-slate-300
                              ui-px-3 ui-py-2 ui-text-sm ui-text-slate-500 ui-hover-border-blue-400 ui-hover-text-blue-500 ui-transition"
                       id="image-label">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ui-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    <span id="image-label-text" th:text="#{view.item.modal.image.placeholder}">사진을 선택하세요</span>
                    <input type="file" th:field="*{imageFile}" accept="image/jpeg,image/png,image/webp,image/gif"
                           class="ui-sr-only">
                </label>
                <img id="quick-image-preview"
                     class="ui-hidden ui-mt-2 ui-w-full ui-aspect-square ui-rounded-md ui-object-cover ui-border ui-border-slate-200"
                     th:alt="#{view.item.modal.image.previewAlt}">
                <span id="quick-analysis-status"
                      class="ui-hidden ui-mt-1 ui-block ui-text-xs ui-text-blue-500" th:text="#{view.item.card.aiAnalyzing}">AI 분석 중...</span>
                <button type="button"
                        id="quick-analysis-retry-btn"
                        class="ui-hidden ui-mt-2 ui-text-xs ui-font-semibold ui-text-blue-600 ui-hover-text-blue-800 ui-transition"
                        th:text="#{view.item.card.aiRetry}">
                    다시 분석
                </button>
            </div>

            <div class="mb-3">
                <label class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1" th:text="#{view.item.card.nameLabel}">품목명</label>
                <input type="text" th:field="*{name}"
                       class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500 ui-transition"
                       th:placeholder="#{view.item.modal.namePlaceholder}">
                <span th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"
                      class="ui-mt-1 ui-block ui-text-xs ui-text-red-500"></span>
            </div>

            <div class="mb-3">
                <label class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1">
                    <span th:text="#{view.item.card.descLabel}">설명</span> <span class="ui-text-slate-400 ui-font-normal" th:text="|#{view.common.optional}|">(선택)</span>
                </label>
                <input type="text" th:field="*{description}"
                       class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500 ui-transition"
                       th:placeholder="#{view.item.modal.descPlaceholder}">
                <span th:if="${#fields.hasErrors('description')}"
                      th:errors="*{description}"
                      class="ui-mt-1 ui-block ui-text-xs ui-text-red-500"></span>
            </div>

            <div class="mb-3">
                <label class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1">
                    <span th:text="#{view.stock.form.count.label}">수량</span> <span class="ui-text-slate-400 ui-font-normal" th:text="|#{view.stock.modal.quick.max}|">(최대 50개)</span>
                </label>
                <input type="number" th:field="*{count}" min="1" max="50"
                       class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500 ui-transition">
                <span th:if="${#fields.hasErrors('count')}"
                      th:errors="*{count}"
                      class="ui-mt-1 ui-block ui-text-xs ui-text-red-500"></span>
            </div>

            <div class="mb-3">
                <label class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1">
                    <span th:text="#{view.stock.form.price.label}">가격</span> <span class="ui-text-slate-400 ui-font-normal" th:text="|#{view.common.optional}|">(선택)</span>
                </label>
                <input type="number" min="0" step="1" th:field="*{price}"
                       class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500 ui-transition"
                       th:placeholder="#{view.stock.form.price.placeholder}">
                <span th:if="${#fields.hasErrors('price')}"
                      th:errors="*{price}"
                      class="ui-mt-1 ui-block ui-text-xs ui-text-red-500"></span>
            </div>

            <div class="ui-mb-4">
                <label class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1">
                    <span th:text="#{view.stock.form.memo.label}">메모</span> <span class="ui-text-slate-400 ui-font-normal" th:text="|#{view.common.optional}|">(선택)</span>
                </label>
                <input type="text" th:field="*{memo}"
                       class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500 ui-transition">
            </div>

            <input type="ui-hidden" th:field="*{imageHash}" id="quick-image-hash">

            <div class="ui-flex ui-gap-2 ui-justify-end">
                <button type="button"
                        hx-get="/empty"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="ui-rounded-md ui-border ui-border-slate-300 ui-px-4 ui-py-2 ui-text-sm ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        id="quick-submit-btn"
                        class="ui-rounded-md ui-bg-blue-600 ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-blue-700 ui-transition"
                        th:text="#{view.common.add}">
                    등록
                </button>
            </div>
        </form>

    </div>

    <script>
    var analyzeQuickModalImage = createImageAnalysisHandler({
        fileInputSelector:        '#modal input[name="imageFile"]',
        nameInputSelector:        '#modal input[name="name"]',
        descriptionInputSelector: '#modal input[name="description"]',
        submitSelector:           '#quick-submit-btn',
        statusSelector:           '#quick-analysis-status',
        retryButtonSelector:      '#quick-analysis-retry-btn',
        fileLabelSelector:        '#image-label'
    });

    initImageUpload({
        fileInputSelector:  '#modal input[name="imageFile"]',
        previewSelector:    '#quick-image-preview',
        hashInputSelector:  '#quick-image-hash',
        submitSelector:     '#quick-submit-btn',
        labelTextSelector:  '#image-label-text',
        onImageReady: analyzeQuickModalImage
    });
    </script>
</div>
</body>
</html>
