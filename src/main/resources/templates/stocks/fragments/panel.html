<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  stock-panel-response: POST /stocks 응답 (OOB 모달 닫기 + 패널 갱신)
  stock-panel: HTMX 위치 선택 시 패널 교체용
  공통 내용은 panel-content fragment로 분리
-->

<th:block th:fragment="stock-panel-response">
    <div id="modal" hx-swap-oob="true"></div>
    <div id="stock-panel" class="ui-rounded-lg ui-border ui-border-slate-200 ui-bg-white ui-overflow-hidden">
        <th:block th:replace="~{:: panel-content}"></th:block>
    </div>
</th:block>

<div th:fragment="stock-panel"
     id="stock-panel"
     class="ui-rounded-lg ui-border ui-border-slate-200 ui-bg-white ui-overflow-hidden">
    <th:block th:replace="~{:: panel-content}"></th:block>
</div>

<th:block th:fragment="panel-content">

    <div class="ui-px-4 ui-py-3 ui-bg-slate-50 ui-border-b ui-border-slate-200 ui-flex ui-flex-wrap ui-items-center ui-justify-between gap-y-2">
        <div class="ui-flex ui-items-center ui-gap-2 ui-text-sm ui-text-slate-600">
            <span class="ui-text-slate-400">📦</span>
            <span th:text="${breadcrumb}">위치</span>
        </div>
        <div class="ui-flex ui-gap-2">
            <button type="button"
                    onclick="startStockMoveMode()"
                    class="stock-default-only ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                    th:text="#{view.stock.modal.move.title}">
                물품 이동
            </button>
            <button th:attr="hx-get=@{/stocks/quick(spaceId=${space},shelfId=${shelf},boxId=${box})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="stock-default-only ui-rounded-md ui-bg-slate-600 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-slate-700 ui-transition"
                    th:text="|+#{view.stock.list.quickAdd}|">
                + 빠른 등록
            </button>
            <button th:attr="hx-get=@{/stocks/new(spaceId=${space},shelfId=${shelf},boxId=${box})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="stock-default-only ui-rounded-md ui-bg-blue-600 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-blue-700 ui-transition"
                    th:text="|+#{view.item.list.table.stock}|">
                + 재고 추가
            </button>
        </div>
    </div>

    <!-- 검색바 + 정렬 뱃지 (전체보기 전용) -->
    <div th:if="${isAllView}" class="ui-px-4 ui-py-3 ui-border-b ui-border-slate-100 ui-space-y-2">
        <form th:attr="hx-get=@{/spaces/{id}/stocks/all(id=${space})}"
              hx-target="#stock-panel"
              hx-swap="outerHTML"
              class="ui-flex ui-items-center ui-gap-2">
            <input type="ui-hidden" name="sortBy" th:value="${sortBy}">
            <input type="ui-hidden" name="page" value="1">
            <span class="ui-shrink-0 ui-rounded-md ui-border ui-border-slate-200 ui-bg-slate-50 ui-px-2 ui-py-1-5 ui-text-xs ui-text-slate-500" th:text="#{view.item.list.table.item}">물품명</span>
            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   th:placeholder="#{view.item.list.search.placeholder}"
                   class="ui-flex-1 ui-min-w-0 ui-rounded-md ui-border ui-border-slate-200 ui-px-3 ui-py-1-5 ui-text-sm ui-text-slate-700 ui-placeholder-slate-400 ui-focus-border-blue-400 ui-focus-outline-none ui-focus-ring-1 ui-focus-ring-blue-400">
            <button type="submit"
                    class="ui-shrink-0 ui-rounded-md ui-bg-slate-600 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-slate-700 ui-transition"
                    th:text="#{view.common.search}">
                검색
            </button>
        </form>
        <div class="ui-flex ui-flex-wrap ui-gap-1">
            <button th:attr="hx-get=@{/spaces/{id}/stocks/all(id=${space},sortBy='newest',keyword=${keyword})}"
                    hx-target="#stock-panel" hx-swap="outerHTML"
                    th:classappend="${sortBy == 'newest'} ? 'ui-bg-blue-100 ui-text-blue-700 ui-ring-1 ui-ring-blue-300' : 'ui-bg-slate-100 ui-text-slate-500 ui-hover-bg-slate-200'"
                    class="ui-rounded-full ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-medium ui-transition"
                    th:text="#{view.common.sort.newest}">
                가장 최신 순
            </button>
            <button th:attr="hx-get=@{/spaces/{id}/stocks/all(id=${space},sortBy='oldest',keyword=${keyword})}"
                    hx-target="#stock-panel" hx-swap="outerHTML"
                    th:classappend="${sortBy == 'oldest'} ? 'ui-bg-blue-100 ui-text-blue-700 ui-ring-1 ui-ring-blue-300' : 'ui-bg-slate-100 ui-text-slate-500 ui-hover-bg-slate-200'"
                    class="ui-rounded-full ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-medium ui-transition"
                    th:text="#{view.common.sort.oldest}">
                가장 오래된 순
            </button>
            <button th:attr="hx-get=@{/spaces/{id}/stocks/all(id=${space},sortBy='inFreq',keyword=${keyword})}"
                    hx-target="#stock-panel" hx-swap="outerHTML"
                    th:classappend="${sortBy == 'inFreq'} ? 'ui-bg-blue-100 ui-text-blue-700 ui-ring-1 ui-ring-blue-300' : 'ui-bg-slate-100 ui-text-slate-500 ui-hover-bg-slate-200'"
                    class="ui-rounded-full ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-medium ui-transition"
                    th:text="#{view.stock.list.sort.inFreq}">
                입고 빈도 순
            </button>
            <button th:attr="hx-get=@{/spaces/{id}/stocks/all(id=${space},sortBy='outFreq',keyword=${keyword})}"
                    hx-target="#stock-panel" hx-swap="outerHTML"
                    th:classappend="${sortBy == 'outFreq'} ? 'ui-bg-blue-100 ui-text-blue-700 ui-ring-1 ui-ring-blue-300' : 'ui-bg-slate-100 ui-text-slate-500 ui-hover-bg-slate-200'"
                    class="ui-rounded-full ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-medium ui-transition"
                    th:text="#{view.stock.list.sort.outFreq}">
                출고 빈도 순
            </button>
        </div>
    </div>

    <form id="stock-move-selection-form"
          class="ui-hidden ui-border-b ui-border-blue-100 ui-bg-blue-50 ui-px-4 ui-py-3"
          hx-get="/stocks/move-form"
          hx-target="#modal"
          hx-swap="outerHTML"
          onsubmit="return prepareStockMoveSelection()">
        <input type="ui-hidden" name="sourceSpaceExternalId" th:value="${space}">
        <input type="ui-hidden" name="sourceShelfExternalId" th:value="${shelf}">
        <input type="ui-hidden" name="sourceBoxExternalId" th:value="${box}">
        <div id="move-selection-fields"></div>
        <div class="ui-flex ui-flex-wrap ui-items-center ui-justify-between ui-gap-2">
            <p class="ui-text-sm ui-text-blue-700" th:text="#{view.stock.modal.move.instruction}">이동할 물품을 선택하고 수량을 조정하세요.</p>
            <div class="ui-flex ui-gap-2">
                <button type="button"
                        onclick="cancelStockMoveMode()"
                        class="ui-rounded-md ui-border ui-border-blue-200 ui-bg-white ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-blue-700 ui-hover-bg-blue-50 ui-transition"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        id="stock-move-submit"
                        disabled
                        class="ui-rounded-md ui-bg-blue-600 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-white ui-transition ui-disabled-cursor-not-allowed disabled:bg-slate-300"
                        th:text="#{view.stock.modal.move.button.submit}">
                    이동하기
                </button>
            </div>
        </div>
    </form>

    <div id="stock-panel-rows" class="ui-divide-y ui-divide-slate-100">

        <div th:if="${stocks.empty}" class="ui-px-4 ui-py-8 ui-text-center ui-text-sm ui-text-slate-400" th:text="#{view.stock.panel.empty}">
            이 위치에 등록된 재고가 없습니다.
        </div>

        <th:block th:replace="~{:: stock-panel-row-content}"></th:block>

    </div>

    <div id="stock-panel-more" th:fragment="stock-panel-more" class="ui-border-t ui-border-slate-100 ui-px-4 ui-py-3 ui-text-center">
        <button th:if="${page.hasNext() and isAllView}"
                th:attr="hx-get=@{/spaces/{id}/stocks/all(id=${space},page=${page.nextPage()},sortBy=${sortBy},keyword=${keyword},append=true)}"
                hx-target="#stock-panel-more"
                hx-swap="outerHTML"
                class="ui-rounded-md ui-border ui-border-slate-300 ui-bg-white ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                th:text="#{view.space.list.more}">
            더 보기
        </button>
        <button th:if="${page.hasNext() and isAllView == false and shelfExternalId == null}"
                th:attr="hx-get=@{/spaces/{id}/stocks(id=${space},page=${page.nextPage()},append=true)}"
                hx-target="#stock-panel-more"
                hx-swap="outerHTML"
                class="ui-rounded-md ui-border ui-border-slate-300 ui-bg-white ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                th:text="#{view.space.list.more}">
            더 보기
        </button>
        <button th:if="${page.hasNext() and isAllView == false and shelfExternalId != null and boxExternalId == null}"
                th:attr="hx-get=@{/spaces/{id}/shelves/{id}/stocks(sid=${space},id=${shelf},page=${page.nextPage()},append=true)}"
                hx-target="#stock-panel-more"
                hx-swap="outerHTML"
                class="ui-rounded-md ui-border ui-border-slate-300 ui-bg-white ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                th:text="#{view.space.list.more}">
            더 보기
        </button>
        <button th:if="${page.hasNext() and isAllView == false and shelfExternalId != null and boxExternalId != null}"
                th:attr="hx-get=@{/spaces/{sid}/shelves/{shelfId}/boxes/{boxId}/stocks(sid=${space},shelfId=${shelf},boxId=${box},page=${page.nextPage()},append=true)}"
                hx-target="#stock-panel-more"
                hx-swap="outerHTML"
                class="ui-rounded-md ui-border ui-border-slate-300 ui-bg-white ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                th:text="#{view.space.list.more}">
            더 보기
        </button>
    </div>

</th:block>

<th:block th:fragment="stock-panel-row-content">
    <th:block th:each="stock : ${stocks}">
        <th:block th:replace="~{stocks/fragments/row :: view(stock=${stock})}"></th:block>
    </th:block>
</th:block>

<th:block th:fragment="stock-panel-more-response">
    <div hx-swap-oob="beforeend:#stock-panel-rows">
        <th:block th:replace="~{:: stock-panel-row-content}"></th:block>
    </div>
    <div id="stock-panel-more" th:replace="~{:: stock-panel-more}"></div>
</th:block>

</body>
</html>
