<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  view: 패널 내 각 재고 카드 렌더링용 (panel.html에서 th:each로 호출)
        stock 파라미터를 받아 렌더링. 위치 변수(spaceExternalId 등)는 모델에서 자동 참조.
-->
<div th:fragment="view(stock)"
     th:id="'item-' + ${stock.itemExternalId}"
     th:data-item-external-id="${stock.itemExternalId}"
     th:data-current-count="${stock.count}"
     class="ui-flex ui-items-center ui-gap-3 ui-px-4 ui-py-3 ui-hover-bg-slate-50 ui-transition">

    <input type="checkbox"
           class="stock-move-only stock-move-check ui-hidden h-4 w-4 rounded ui-border-slate-300 ui-text-blue-600 ui-focus-ring-blue-500"
           th:value="${stock.itemExternalId}"
           onchange="syncStockMoveControls()">

    <!-- 썸네일 -->
    <img th:src="${stock.displayImageExternalId != null} ? @{/images/{id}(id=${stock.displayImageExternalId})} : @{/image/placeholder/item_placeholder_v2.png}"
         alt=""
         class="h-12 w-12 ui-shrink-0 ui-rounded-md ui-object-cover ui-border ui-border-slate-200">

    <!-- 품목명 -->
    <div class="ui-flex-1 ui-min-w-0">
        <div class="ui-text-sm ui-font-medium ui-text-slate-800 ui-truncate" th:text="${stock.itemName}">품목명</div>
    </div>

    <!-- 수량 + 관리 버튼 -->
    <div class="ui-shrink-0 ui-flex ui-items-center ui-gap-2">
        <div class="stock-default-only ui-flex items-baseline gap-0.5">
            <span class="ui-text-base ui-font-mono ui-font-semibold"
                  th:classappend="${stock.count == 0} ? 'ui-text-slate-300' : 'ui-text-slate-800'"
                  th:text="${stock.count}"></span>
            <span class="ui-text-xs ui-text-slate-400" th:text="#{view.item.card.unit}">개</span>
        </div>
        <div class="stock-move-only ui-hidden ui-flex ui-items-center ui-gap-1">
            <input type="number"
                   min="1"
                   th:max="${stock.count}"
                   th:value="${stock.count}"
                   class="stock-move-count w-20 ui-rounded-md ui-border ui-border-slate-300 ui-px-2 ui-py-1-5 ui-text-sm ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500"
                   oninput="syncStockMoveControls()">
            <span class="ui-text-xs ui-text-slate-400">/ <span th:text="${stock.count}"></span><span th:text="#{view.item.card.unit}">개</span></span>
        </div>
        <a th:href="@{/stocks(item=${stock.itemExternalId},space=${space},shelf=${shelf},box=${box})}"
           class="stock-default-only ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
           th:text="#{view.common.list}">
            목록
        </a>
        <button type="button"
                class="stock-default-only ui-rounded-md ui-bg-slate-600 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-slate-700 ui-transition"
                th:attr="hx-get=@{/stocks/action-form(item=${stock.itemExternalId},itemName=${stock.itemName},space=${space},shelf=${shelf},box=${box},count=${stock.count})}"
                hx-target="#modal" hx-swap="outerHTML"
                th:text="#{view.common.change}">변경</button>
    </div>

</div>

</body>
</html>
