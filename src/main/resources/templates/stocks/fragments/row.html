<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  view: 패널 내 각 재고 카드 렌더링용 (panel.html에서 th:each로 호출)
        stock 파라미터를 받아 렌더링. 위치 변수(spaceExternalId 등)는 모델에서 자동 참조.
-->
<div th:fragment="view(stock)" data-component-id="stocks.panel-row"
     th:id="'item-' + ${stock.itemExternalId}"
     th:data-item-external-id="${stock.itemExternalId}"
     th:data-current-count="${stock.count}"
     class="flex items-center gap-3 px-4 py-3 transition-colors duration-120 ease-out hover:bg-surface-dim">

    <input type="checkbox"
           class="stock-move-only stock-move-check hidden field-check"
           th:value="${stock.itemExternalId}"
           onchange="syncStockMoveControls()">

    <!-- 썸네일 -->
    <img th:src="${stock.displayImageExternalId != null} ? @{/images/{id}(id=${stock.displayImageExternalId})} : @{/image/placeholder/item_placeholder_v2.png}"
         alt=""
         class="row-thumb">

    <!-- 품목명 -->
    <div class="flex-1 min-w-0">
        <div class="text-sm font-medium text-ink truncate" th:text="${stock.itemName}">품목명</div>
    </div>

    <!-- 수량 + 관리 버튼 -->
    <div class="shrink-0 flex items-center gap-2">
        <div class="stock-default-only flex items-baseline gap-0.5">
            <span class="text-base font-mono font-semibold"
                  th:classappend="${stock.count == 0} ? 'text-disabled' : 'text-ink'"
                  th:text="${stock.count}"></span>
            <span class="text-xs text-muted" th:text="#{view.item.card.unit}">개</span>
        </div>
        <div class="stock-move-only hidden flex items-center gap-1">
            <input type="number"
                   min="1"
                   th:max="${stock.count}"
                   th:value="${stock.count}"
                   class="stock-move-count field-input w-20"
                   oninput="syncStockMoveControls()">
            <span class="text-xs text-muted">/ <span th:text="${stock.count}"></span><span th:text="#{view.item.card.unit}">개</span></span>
        </div>
        <a th:href="@{/stocks(item=${stock.itemExternalId},space=${space},shelf=${shelf},box=${box})}"
           class="stock-default-only btn-secondary btn-sm"
           th:text="#{view.common.list}">
            목록
        </a>
        <button type="button"
                class="stock-default-only btn-search btn-sm"
                th:attr="hx-get=@{/stocks/action-form(item=${stock.itemExternalId},itemName=${stock.itemName},space=${space},shelf=${shelf},box=${box},count=${stock.count},allView=${allView},keyword=${keyword},sortBy=${sortBy})}"
                hx-target="#modal" hx-swap="outerHTML"
                th:text="#{view.common.change}">변경</button>
    </div>

</div>

</body>
</html>
