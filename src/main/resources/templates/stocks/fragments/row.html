<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  view: 패널 내 각 재고 카드 렌더링용 (panel.html에서 th:each로 호출)
        stock 파라미터를 받아 렌더링. 위치 변수(spaceExternalId 등)는 모델에서 자동 참조.
-->
<div th:fragment="view(stock)"
     th:id="'item-' + ${stock.itemExternalId}"
     th:data-item-external-id="${stock.itemExternalId}"
     th:data-current-count="${stock.count}"
     class="flex items-center gap-3 px-4 py-3 hover:bg-slate-50 transition">

    <input type="checkbox"
           class="stock-move-only stock-move-check hidden h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500"
           th:value="${stock.itemExternalId}"
           onchange="syncStockMoveControls()">

    <!-- 썸네일 -->
    <img th:src="${stock.displayImageExternalId != null} ? @{/images/{id}(id=${stock.displayImageExternalId})} : @{/image/placeholder/item_placeholder_v2.png}"
         alt=""
         class="h-12 w-12 shrink-0 rounded-md object-cover border border-slate-200">

    <!-- 품목명 -->
    <div class="flex-1 min-w-0">
        <div class="text-sm font-medium text-slate-800 truncate" th:text="${stock.itemName}">품목명</div>
    </div>

    <!-- 수량 + 관리 버튼 -->
    <div class="shrink-0 flex items-center gap-2">
        <div class="stock-default-only flex items-baseline gap-0.5">
            <span class="text-base font-mono font-semibold"
                  th:classappend="${stock.count == 0} ? 'text-slate-300' : 'text-slate-800'"
                  th:text="${stock.count}"></span>
            <span class="text-xs text-slate-400" th:text="#{view.item.card.unit}">개</span>
        </div>
        <div class="stock-move-only hidden flex items-center gap-1">
            <input type="number"
                   min="1"
                   th:max="${stock.count}"
                   th:value="${stock.count}"
                   class="stock-move-count w-20 rounded-md border border-slate-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                   oninput="syncStockMoveControls()">
            <span class="text-xs text-slate-400">/ <span th:text="${stock.count}"></span><span th:text="#{view.item.card.unit}">개</span></span>
        </div>
        <a th:href="@{/stocks(itemExternalId=${stock.itemExternalId},spaceExternalId=${spaceExternalId},shelfExternalId=${shelfExternalId},boxExternalId=${boxExternalId})}"
           class="stock-default-only rounded-md border border-slate-300 px-3 py-1.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition"
           th:text="#{view.common.list}">
            목록
        </a>
        <button type="button"
                class="stock-default-only rounded-md bg-slate-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-slate-700 transition"
                th:attr="hx-get=@{/stocks/action-form(itemExternalId=${stock.itemExternalId},itemName=${stock.itemName},spaceExternalId=${spaceExternalId},shelfExternalId=${shelfExternalId},boxExternalId=${boxExternalId},count=${stock.count})}"
                hx-target="#modal" hx-swap="outerHTML"
                th:text="#{view.common.change}">변경</button>
    </div>

</div>

</body>
</html>
