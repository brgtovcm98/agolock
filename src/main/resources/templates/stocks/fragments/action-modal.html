<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal" data-component-id="stocks.modal.action" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="modal-overlay fixed inset-0 z-50 flex items-center justify-center">
    <div class="modal-dialog max-w-sm mx-4 p-6 max-h-[90vh] overflow-y-auto flex flex-col">

        <!-- 헤더 -->
        <div class="mb-4">
            <h2 id="modal-title" class="text-lg font-semibold text-ink" th:text="${itemName}">품목명</h2>
            <p class="text-sm text-muted" th:text="#{view.stock.modal.action.subtitle}">재고 조작</p>
        </div>

        <!-- 탭 -->
        <div class="flex gap-1 mb-5 bg-surface-dim p-1">
            <button type="button" onclick="switchActionTab('in')" id="action-tab-in"
                    class="flex-1 py-1.5 text-sm font-medium bg-surface text-in transition"
                    th:text="#{view.stock.modal.in.title}">
                입고
            </button>
            <button type="button" onclick="switchActionTab('out')" id="action-tab-out"
                    class="flex-1 py-1.5 text-sm font-medium text-muted transition"
                    th:text="#{view.stock.modal.out.title}">
                출고
            </button>
            <button type="button" onclick="switchActionTab('del')" id="action-tab-del"
                    class="flex-1 py-1.5 text-sm font-medium text-muted transition"
                    th:text="#{view.common.delete}">
                삭제
            </button>
        </div>

        <!-- 입고 섹션 -->
        <div id="action-section-in">
            <p class="text-sm text-muted mb-3" th:text="#{view.stock.modal.in.message}">입고할 수량을 입력해주세요.</p>
            <form id="in-form">
                <input type="hidden" name="itemExternalId"  th:value="${item}">
                <input type="hidden" name="spaceExternalId" th:value="${space}">
                <input type="hidden" name="shelfExternalId" th:value="${shelf}">
                <input type="hidden" name="boxExternalId"   th:value="${box}">
                <input type="hidden" name="allView" th:value="${allView}">
                <input type="hidden" name="keyword" th:value="${keyword}">
                <input type="hidden" name="sortBy" th:value="${sortBy}">
                <div class="mb-3">
                    <label class="field-label" th:text="#{view.stock.form.count.label}">수량</label>
                    <input type="number" name="count" value="1" min="1"
                           id="in-count-input"
                           th:data-current-count="${currentCount}"
                           class="field-input">
                    <p id="in-count-msg" class="mt-1 text-xs text-muted"></p>
                </div>
                <div class="mb-4">
                    <label class="field-label">
                        <span th:text="#{view.stock.form.memo.label}">메모</span>
                        <span class="text-faint font-normal" th:text="#{view.common.optional}">(선택)</span>
                    </label>
                    <input type="text" name="memo"
                           id="in-memo-input"
                           class="field-input"
                           th:placeholder="#{view.stock.modal.in.memoPlaceholder}">
                    <div class="mt-2 flex flex-wrap gap-1.5" th:if="${inMemoSuggestions != null and !inMemoSuggestions.isEmpty()}">
                        <button type="button"
                                th:each="memo : ${inMemoSuggestions}"
                                th:data-memo="${memo}"
                                onclick="setTransactionMemo('in', this.dataset.memo)"
                                class="chip-suggest chip-suggest-in"
                                th:text="${memo}">
                            구매 입고
                        </button>
                    </div>
                </div>
                <div class="flex gap-2 justify-end">
                    <button type="button"
                            hx-get="/empty" hx-target="#modal" hx-swap="outerHTML"
                            class="btn-secondary text-sm"
                            th:text="#{view.common.cancel}">
                        취소
                    </button>
                    <button type="button"
                            hx-post="/stocks/in"
                            hx-include="#in-form"
                            hx-target="#stock-panel"
                            hx-swap="outerHTML"
                            th:attr="hx-confirm=#{view.stock.modal.in.confirm}"
                            class="btn-primary text-sm"
                            th:text="#{view.stock.modal.in.title}">
                        입고
                    </button>
                </div>
            </form>
        </div>

        <!-- 출고 섹션 -->
        <div id="action-section-out" class="hidden">
            <p class="text-sm text-muted mb-3" th:text="#{view.stock.modal.out.message}">출고할 수량을 입력해주세요.</p>
            <form id="out-form">
                <input type="hidden" name="itemExternalId"  th:value="${item}">
                <input type="hidden" name="spaceExternalId" th:value="${space}">
                <input type="hidden" name="shelfExternalId" th:value="${shelf}">
                <input type="hidden" name="boxExternalId"   th:value="${box}">
                <input type="hidden" name="allView" th:value="${allView}">
                <input type="hidden" name="keyword" th:value="${keyword}">
                <input type="hidden" name="sortBy" th:value="${sortBy}">
                <div class="mb-3">
                    <label class="field-label" th:text="#{view.stock.form.count.label}">수량</label>
                    <input type="number" name="count" value="1" min="1"
                           id="out-count-input"
                           th:data-current-count="${currentCount}"
                           class="field-input field-input--out">
                    <p id="out-count-msg" class="mt-1 text-xs text-muted"></p>
                </div>
                <div class="mb-4">
                    <label class="field-label">
                        <span th:text="#{view.stock.form.memo.label}">메모</span>
                        <span class="text-faint font-normal" th:text="#{view.common.optional}">(선택)</span>
                    </label>
                    <input type="text" name="memo"
                           id="out-memo-input"
                           class="field-input field-input--out"
                           th:placeholder="#{view.stock.modal.out.memoPlaceholder}">
                    <div class="mt-2 flex flex-wrap gap-1.5" th:if="${outMemoSuggestions != null and !outMemoSuggestions.isEmpty()}">
                        <button type="button"
                                th:each="memo : ${outMemoSuggestions}"
                                th:data-memo="${memo}"
                                onclick="setTransactionMemo('out', this.dataset.memo)"
                                class="chip-suggest chip-suggest-out"
                                th:text="${memo}">
                            사용 출고
                        </button>
                    </div>
                </div>
                <div class="mb-3 flex items-center gap-2">
                    <input type="checkbox"
                           id="out-include-kept"
                           name="includeKept"
                           value="true"
                           class="field-check field-check--out">
                    <label for="out-include-kept"
                           class="text-sm text-muted"
                           th:text="#{view.stock.modal.out.includeKept}">보관 품목 포함</label>
                </div>
                <div class="flex gap-2 justify-end">
                    <button type="button"
                            hx-get="/empty" hx-target="#modal" hx-swap="outerHTML"
                            class="btn-secondary text-sm"
                            th:text="#{view.common.cancel}">
                        취소
                    </button>
                    <button type="button"
                            hx-post="/stocks/out"
                            hx-include="#out-form"
                            hx-target="#stock-panel"
                            hx-swap="outerHTML"
                            th:attr="hx-confirm=#{view.stock.modal.out.confirm}"
                            class="btn-out text-sm"
                            th:text="#{view.stock.modal.out.title}">
                        출고
                    </button>
                </div>
            </form>
        </div>

        <!-- 삭제 섹션 -->
        <div id="action-section-del" class="hidden">
            <p class="text-sm font-medium text-danger mb-2" th:text="#{view.stock.modal.delete.warning}">⚠ 이 위치의 재고를 모두 삭제합니다.</p>
            <p class="text-sm text-muted mb-6" th:text="#{view.stock.modal.delete.message}">삭제된 재고는 복구할 수 없습니다.</p>
            <div class="flex gap-2 justify-end">
                <button type="button"
                        hx-get="/empty" hx-target="#modal" hx-swap="outerHTML"
                        class="btn-secondary text-sm"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="button"
                        th:attr="hx-delete=@{/stocks(item=${item},space=${space},shelf=${shelf},box=${box},allView=${allView},keyword=${keyword},sortBy=${sortBy})},hx-confirm=#{view.stock.modal.delete.confirm}"
                        hx-target="#stock-panel"
                        hx-swap="outerHTML"
                        class="btn-danger-solid text-sm"
                        th:text="#{view.common.delete}">
                    삭제
                </button>
            </div>
        </div>

    </div>

    <!-- fragment 안에 있어야 HTMX swap 시 함께 전달됨 -->
    <script th:inline="javascript">
    const minCountMsg = /*[[#{view.stock.modal.js.minCount}]]*/ '1개 이상 입력해주세요';
    const maxCountMsg = /*[[#{view.stock.modal.js.maxCount}]]*/ '50개 초과 입력할 수 없습니다';
    const addMsgTemplate = /*[[#{view.stock.modal.js.addMessage}]]*/ '{0}개가 추가되어 총 {1}개가 됩니다';
    const outMsgTemplate = /*[[#{view.stock.modal.js.outMessage}]]*/ '{0}개가 출고되어 총 {1}개가 됩니다';
    const minTotalErrorMsg = /*[[#{view.stock.modal.js.minTotalError}]]*/ '재고의 총 수량은 0개 이하가 될 수 없습니다';

    function switchActionTab(tab) {
        const tabColors = { in: 'text-in', out: 'text-out', del: 'text-danger' };
        ['in', 'out', 'del'].forEach(function(t) {
            var section = document.getElementById('action-section-' + t);
            var btn = document.getElementById('action-tab-' + t);
            if (t === tab) {
                section.classList.remove('hidden');
                btn.classList.add('bg-surface', tabColors[t]);
                btn.classList.remove('text-muted');
            } else {
                section.classList.add('hidden');
                btn.classList.remove('bg-surface', 'text-in', 'text-out', 'text-danger');
                btn.classList.add('text-muted');
            }
        });
        document.getElementById('in-count-msg').textContent = '';
        document.getElementById('out-count-msg').textContent = '';
    }

    function updateInMsg() {
        var input = document.getElementById('in-count-input');
        var msg = document.getElementById('in-count-msg');
        var count = parseInt(input.value, 10);
        var current = parseInt(input.dataset.currentCount, 10);
        if (isNaN(count)) {
            msg.textContent = '';
        } else if (count <= 0) {
            msg.textContent = minCountMsg;
        } else if (count > 50) {
            msg.textContent = maxCountMsg;
        } else {
            msg.textContent = addMsgTemplate.replace('{0}', count).replace('{1}', current + count);
        }
    }

    function updateOutMsg() {
        var input = document.getElementById('out-count-input');
        var msg = document.getElementById('out-count-msg');
        var count = parseInt(input.value, 10);
        var current = parseInt(input.dataset.currentCount, 10);
        if (isNaN(count)) {
            msg.textContent = '';
        } else if (count <= 0) {
            msg.textContent = minCountMsg;
        } else if (count > 50) {
            msg.textContent = maxCountMsg;
        } else if (current - count <= 0) {
            msg.textContent = minTotalErrorMsg;
        } else {
            msg.textContent = outMsgTemplate.replace('{0}', count).replace('{1}', current - count);
        }
    }

    function setTransactionMemo(type, memo) {
        var input = document.getElementById(type + '-memo-input');
        if (!input) return;
        input.value = memo || '';
        input.focus();
    }

    (function() {
        var inInput = document.getElementById('in-count-input');
        var outInput = document.getElementById('out-count-input');
        if (inInput) { inInput.addEventListener('input', updateInMsg); }
        if (outInput) { outInput.addEventListener('input', updateOutMsg); }
    })();
    </script>

</div>

</body>
</html>
