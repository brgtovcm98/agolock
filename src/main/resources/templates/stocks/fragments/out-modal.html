<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="ui-modal-overlay ui-fixed ui-inset-0 ui-z-50 ui-flex ui-items-center ui-justify-center ui-bg-black-40">
    <div class="ui-modal-dialog ui-bg-white ui-rounded-xl ui-shadow-xl ui-w-full ui-max-w-sm ui-mx-4 ui-p-6 ui-max-h-90vh ui-overflow-y-auto ui-flex ui-flex-col">

        <h2 id="modal-title" class="ui-text-lg ui-font-semibold ui-text-slate-800 ui-mb-1" th:text="#{view.stock.modal.out.title}">출고 처리</h2>
        <p class="ui-text-sm ui-text-slate-500 ui-mb-4" th:text="#{view.stock.modal.out.message}">출고할 수량을 입력해주세요.</p>

        <form th:object="${form}"
              method="post"
              hx-post="/stocks/out"
              hx-target="#stock-panel"
              hx-swap="outerHTML">

            <input type="ui-hidden" name="itemExternalId"  th:value="*{itemExternalId}">
            <input type="ui-hidden" name="spaceExternalId" th:value="*{spaceExternalId}">
            <input type="ui-hidden" name="shelfExternalId" th:value="*{shelfExternalId}">
            <input type="ui-hidden" name="boxExternalId"   th:value="*{boxExternalId}">

            <div class="mb-3">
                <label class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1" th:text="#{view.stock.form.count.label}">수량</label>
                <input type="number" th:field="*{count}" min="1"
                       class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500 ui-transition"
                       autofocus>
                <span th:if="${#fields.hasErrors('count')}"
                      th:errors="*{count}"
                      class="ui-mt-1 ui-block ui-text-xs ui-text-red-500"></span>
            </div>

            <div class="ui-mb-4">
                <label class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1">
                    <span th:text="#{view.stock.form.memo.label}">메모</span>
                    <span class="ui-text-slate-400 ui-font-normal" th:text="#{view.common.optional}">(선택)</span>
                </label>
                <input type="text" th:field="*{memo}"
                       class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500 ui-transition"
                       th:placeholder="#{view.stock.modal.out.memoPlaceholder}">
            </div>

            <div class="ui-flex ui-gap-2 ui-justify-end">
                <button type="button"
                        hx-get="/empty"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="ui-rounded-md ui-border ui-border-slate-300 ui-px-4 ui-py-2 ui-text-sm ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        class="ui-rounded-md bg-orange-600 ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-orange-700 ui-transition"
                        th:text="#{view.stock.modal.out.title}">
                    출고
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
