<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal" data-component-id="stocks.modal.out" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="modal-overlay fixed inset-0 z-50 flex items-center justify-center">
    <div class="modal-dialog max-w-sm mx-4 p-6 flex flex-col">

        <h2 id="modal-title" class="text-lg font-semibold text-slate-800 mb-1" th:text="#{view.stock.modal.out.title}">출고 처리</h2>
        <p class="text-sm text-slate-500 mb-4" th:text="#{view.stock.modal.out.message}">출고할 수량을 입력해주세요.</p>

        <form th:object="${form}"
              method="post"
              hx-post="/stocks/out"
              hx-target="#stock-panel"
              hx-swap="outerHTML">

            <input type="hidden" name="itemExternalId"  th:value="*{itemExternalId}">
            <input type="hidden" name="spaceExternalId" th:value="*{spaceExternalId}">
            <input type="hidden" name="shelfExternalId" th:value="*{shelfExternalId}">
            <input type="hidden" name="boxExternalId"   th:value="*{boxExternalId}">

            <div class="mb-3">
                <label class="field-label" th:text="#{view.stock.form.count.label}">수량</label>
                <input type="number" th:field="*{count}" min="1"
                       class="field-input"
                       autofocus>
                <span th:if="${#fields.hasErrors('count')}"
                      th:errors="*{count}"
                      class="field-error"></span>
            </div>

            <div class="mb-4">
                <label class="field-label">
                    <span th:text="#{view.stock.form.memo.label}">메모</span>
                    <span class="text-slate-400 font-normal" th:text="#{view.common.optional}">(선택)</span>
                </label>
                <input type="text" th:field="*{memo}"
                       class="field-input"
                       th:placeholder="#{view.stock.modal.out.memoPlaceholder}">
            </div>

            <div class="flex gap-2 justify-end">
                <button type="button"
                        hx-get="/empty"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="btn-secondary text-sm"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        class="rounded-lg bg-orange-600 px-4 py-2 text-sm text-white hover:bg-orange-600 transition"
                        th:text="#{view.stock.modal.out.title}">
                    출고
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
