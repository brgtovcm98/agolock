<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="view(stock)"
     th:id="'stock-' + ${stock.externalId}"
     class="ui-grid ui-gap-3 ui-px-4 ui-py-4 md:ui-grid-stock-row ui-md-items-center">

    <div class="ui-flex ui-min-w-0 ui-items-center ui-gap-3">
        <img th:src="${stock.displayImageExternalId != null} ? @{/images/{id}(id=${stock.displayImageExternalId})} : @{/image/placeholder/item_placeholder_v2.png}"
             alt=""
             class="h-12 w-12 ui-shrink-0 ui-rounded-md ui-border ui-border-slate-200 ui-object-cover">
        <div class="ui-min-w-0">
            <p class="ui-truncate ui-text-sm ui-font-semibold ui-text-slate-800" th:text="${stock.itemName}">품목명</p>
            <p class="mt-0.5 ui-text-xs ui-text-slate-400"
               th:text="${#temporals.format(stock.createdAt, 'yyyy-MM-dd')}">등록일</p>
        </div>
    </div>

    <div class="ui-min-w-0 ui-space-y-2">
        <div class="ui-flex ui-flex-wrap gap-1.5">
            <a th:href="@{/stocks(space=${stock.spaceExternalId})}"
               class="ui-inline-flex max-w-full ui-items-center ui-rounded-full ui-bg-blue-50 ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-semibold ui-text-blue-700 ui-ring-1 ui-ring-inset ui-ring-blue-100 ui-hover-bg-blue-100 ui-transition">
                <span class="ui-truncate" th:text="${stock.spaceName}">공간</span>
            </a>
            <a th:if="${stock.shelfName != null}"
               th:href="@{/stocks(shelf=${stock.shelfExternalId})}"
               class="ui-inline-flex max-w-full ui-items-center ui-rounded-full ui-bg-teal-50 ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-semibold ui-text-teal-700 ui-ring-1 ui-ring-inset ui-ring-teal-100 ui-hover-bg-teal-100 ui-transition">
                <span class="ui-truncate" th:text="${stock.shelfName}">선반</span>
            </a>
            <a th:if="${stock.boxName != null}"
               th:href="@{/stocks(box=${stock.boxExternalId})}"
               class="ui-inline-flex max-w-full ui-items-center ui-rounded-full ui-bg-amber-50 ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-semibold ui-text-amber-700 ui-ring-1 ui-ring-inset ui-ring-amber-100 ui-hover-bg-amber-100 ui-transition">
                <span class="ui-truncate" th:text="${stock.boxName}">박스</span>
            </a>
        </div>
        <div class="ui-flex ui-flex-wrap gap-1.5">
            <button type="button"
                    th:attr="hx-get=@{/stocks/{id}/status(id=${stock.externalId})}"
                    hx-target="#modal"
                    th:classappend="${stock.status.name() == 'IN_STOCK'} ? 'bg-green-50 ui-text-green-700 ring-green-100 hover:bg-green-100' :
                                    (${stock.status.name() == 'DISPATCHED'} ? 'ui-bg-sky-50 ui-text-sky-700 ui-ring-sky-100 ui-hover-bg-sky-100' :
                                    (${stock.status.name() == 'LOST'} ? 'ui-bg-red-50 ui-text-red-700 ring-red-100 hover:bg-red-100' :
                                    (${stock.status.name() == 'DAMAGED'} ? 'bg-orange-50 ui-text-orange-700 ring-orange-100 hover:bg-orange-100' :
                                    'ui-bg-slate-100 ui-text-slate-600 ui-ring-slate-200 ui-hover-bg-slate-200')))"
                    class="ui-inline-flex ui-rounded-full ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-semibold ui-ring-1 ui-ring-inset ui-cursor-pointer ui-transition"
                    th:text="#{${'enum.StockStatus.' + stock.status.name()}}">재고중</button>
            <span th:if="${stock.kept}"
                  class="ui-inline-flex ui-rounded-full ui-bg-amber-100 ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-semibold ui-text-amber-800 ui-ring-1 ui-ring-inset ui-ring-amber-200"
                  th:text="#{stock.badge.kept}">보관</span>
        </div>
    </div>

    <div class="ui-text-sm ui-text-slate-600">
        <p th:if="${lotSerialEnabled}">
            <span class="ui-text-xs ui-text-slate-400">SN</span>
            <span th:text="${stock.serialNumber != null and !stock.serialNumber.isEmpty()} ? ${stock.serialNumber} : '-'"></span>
        </p>
        <p class="mt-0.5" th:if="${lotSerialEnabled}">
            <span class="ui-text-xs ui-text-slate-400">LOT</span>
            <button th:if="${stock.lotExternalId != null}"
                    type="button"
                    th:attr="hx-get=@{/lots/{id}(id=${stock.lotExternalId})}"
                    hx-target="#modal"
                    class="ui-text-sm ui-text-blue-700 ui-hover-underline"
                    th:text="${stock.lotNumber}">LOT</button>
            <span th:unless="${stock.lotExternalId != null}"
                  th:text="${stock.lotNumber != null and !stock.lotNumber.isEmpty()} ? ${stock.lotNumber} : '-'"></span>
        </p>
        <p class="mt-0.5" th:if="${stock.price != null or stock.itemPrice != null}">
            <span class="ui-text-xs ui-text-slate-400" th:text="#{view.stock.form.price.label}">가격</span>
            <span th:if="${stock.price != null}">
                <span th:text="#{view.common.price.format(${#numbers.formatInteger(stock.price, 1, 'COMMA')})}">5,000원</span>
                <span class="ml-0.5 ui-text-sm" th:text="#{view.stock.price.individual}">(개별가격)</span>
            </span>
            <span th:unless="${stock.price != null}">
                <span th:text="#{view.common.price.format(${#numbers.formatInteger(stock.itemPrice, 1, 'COMMA')})}">5,000원</span>
            </span>
        </p>
        <p th:if="${stock.expirationDate != null}"
           class="mt-0.5">
            <span class="ui-text-xs ui-text-slate-400" th:text="#{view.stock.form.expiration.label}">유통기한</span>
            <span th:text="${#temporals.format(stock.expirationDate, 'yyyy-MM-dd')}">2026-12-31</span>
        </p>
    </div>

    <div class="ui-flex flex-nowrap justify-start ui-gap-2 overflow-x-auto md:justify-end">
        <th:block th:if="${stock.memo != null and !stock.memo.isEmpty()}">
            <button type="button"
                    th:attr="hx-get=@{/stocks/{id}/memo(id=${stock.externalId})}"
                    hx-target="#modal"
                    class="ui-inline-flex ui-shrink-0 ui-items-center gap-1.5 ui-rounded-md ui-bg-slate-100 ui-px-2-5 ui-py-1-5 ui-text-xs ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-200 ui-hover-text-slate-800 ui-transition"
                    th:title="${stock.memo}">
                <svg class="h-3.5 w-3.5 ui-text-slate-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                </svg>
                <span th:text="#{view.stock.action.viewMemo}">메모보기</span>
            </button>
        </th:block>
        <th:block th:unless="${stock.memo != null and !stock.memo.isEmpty()}">
            <button type="button"
                    th:attr="hx-get=@{/stocks/{id}/memo/edit(id=${stock.externalId})}"
                    hx-target="#modal"
                    class="ui-inline-flex ui-shrink-0 ui-items-center gap-1.5 ui-rounded-md ui-border ui-border-dashed ui-border-slate-300 ui-bg-white ui-px-2-5 ui-py-1-5 ui-text-xs ui-font-medium ui-text-slate-500 ui-hover-border-slate-400 ui-hover-bg-slate-50 ui-transition">
                <svg class="h-3.5 w-3.5 ui-text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                <span th:text="#{view.stock.action.writeMemo}">메모작성</span>
            </button>
        </th:block>

        <button type="button"
                th:attr="hx-get=@{/stocks/{id}/history(id=${stock.externalId})}"
                hx-target="#modal"
                class="ui-inline-flex ui-shrink-0 ui-items-center gap-1.5 ui-rounded-md ui-border ui-border-slate-300 ui-bg-white ui-px-2-5 ui-py-1-5 ui-text-xs ui-font-medium ui-text-slate-500 ui-hover-bg-slate-50 ui-transition"
                th:title="#{view.stock.action.history}">
            <svg class="h-3.5 w-3.5 ui-text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span th:text="#{view.stock.action.history}">이력</span>
        </button>

        <button type="button"
                th:attr="hx-post=@{/stocks/{id}/keep(id=${stock.externalId},kept=${!stock.kept})},hx-target='#stock-' + ${stock.externalId}"
                hx-swap="outerHTML"
                th:classappend="${stock.kept} ? 'border-amber-300 text-amber-600 hover:bg-amber-50' : 'ui-border-slate-300 ui-text-slate-500 ui-hover-bg-slate-50'"
                class="ui-shrink-0 ui-rounded-md ui-border ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-transition"
                th:text="${stock.kept} ? #{view.stock.action.unkeep} : #{view.stock.action.keep}">
            보관
        </button>
        <button type="button"
                th:attr="hx-get=@{/stocks/{id}/edit(id=${stock.externalId})},hx-target='#stock-' + ${stock.externalId}"
                hx-swap="outerHTML"
                class="ui-shrink-0 ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                th:text="#{view.common.edit}">
            수정
        </button>
    </div>
</div>

<div th:fragment="edit"
     th:id="'stock-' + ${stock.externalId}"
     th:object="${form}"
     class="ui-grid ui-gap-3 ui-border-l-4 ui-border-blue-500 ui-bg-blue-50-40 ui-px-4 ui-py-4 md:ui-grid-stock-row md:items-start">

    <div class="ui-flex ui-min-w-0 ui-items-center ui-gap-3">
        <img th:src="${stock.displayImageExternalId != null} ? @{/images/{id}(id=${stock.displayImageExternalId})} : @{/image/placeholder/item_placeholder_v2.png}"
             alt=""
             class="h-12 w-12 ui-shrink-0 ui-rounded-md ui-border ui-border-slate-200 ui-object-cover">
        <div class="ui-min-w-0">
            <p class="ui-truncate ui-text-sm ui-font-semibold ui-text-slate-800" th:text="${stock.itemName}">품목명</p>
            <p class="mt-0.5 ui-text-xs ui-text-slate-400"
               th:text="${stock.spaceName}">위치</p>
        </div>
    </div>

    <div class="ui-min-w-0 ui-space-y-2">
        <div class="ui-flex ui-flex-wrap gap-1.5">
            <a th:href="@{/stocks(space=${stock.spaceExternalId})}"
               class="ui-inline-flex max-w-full ui-items-center ui-rounded-full ui-bg-blue-50 ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-semibold ui-text-blue-700 ui-ring-1 ui-ring-inset ui-ring-blue-100 ui-hover-bg-blue-100 ui-transition">
                <span class="ui-truncate" th:text="${stock.spaceName}">공간</span>
            </a>
            <a th:if="${stock.shelfName != null}"
               th:href="@{/stocks(shelf=${stock.shelfExternalId})}"
               class="ui-inline-flex max-w-full ui-items-center ui-rounded-full ui-bg-teal-50 ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-semibold ui-text-teal-700 ui-ring-1 ui-ring-inset ui-ring-teal-100 ui-hover-bg-teal-100 ui-transition">
                <span class="ui-truncate" th:text="${stock.shelfName}">선반</span>
            </a>
            <a th:if="${stock.boxName != null}"
               th:href="@{/stocks(box=${stock.boxExternalId})}"
               class="ui-inline-flex max-w-full ui-items-center ui-rounded-full ui-bg-amber-50 ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-semibold ui-text-amber-700 ui-ring-1 ui-ring-inset ui-ring-amber-100 ui-hover-bg-amber-100 ui-transition">
                <span class="ui-truncate" th:text="${stock.boxName}">박스</span>
            </a>
        </div>
        <p class="ui-text-xs ui-text-slate-400" th:text="#{${'enum.StockStatus.' + stock.status.name()}}">재고중</p>
    </div>

    <div class="ui-space-y-2">
        <div th:if="${lotSerialEnabled}">
            <label class="ui-mb-1 ui-block ui-text-xs ui-font-medium ui-text-slate-500" th:text="#{view.stock.form.serial.label}">시리얼 번호</label>
            <input type="text" th:field="*{serialNumber}"
                   class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500">
            <p th:if="${#fields.hasErrors('serialNumber')}" th:errors="*{serialNumber}"
               class="ui-mt-1 ui-text-xs ui-text-red-500"></p>
        </div>
        <div th:if="${lotSerialEnabled}">
            <label class="ui-mb-1 ui-block ui-text-xs ui-font-medium ui-text-slate-500" th:text="#{view.stock.form.lot.label}">로트 번호</label>
            <input type="text" th:field="*{lotNumber}"
                   th:readonly="${stock.lotExternalId != null}"
                   th:classappend="${stock.lotExternalId != null} ? 'ui-bg-slate-100 ui-text-slate-500'"
                   class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500">
            <p th:if="${#fields.hasErrors('lotNumber')}" th:errors="*{lotNumber}"
               class="ui-mt-1 ui-text-xs ui-text-red-500"></p>
        </div>
        <div>
            <label class="ui-mb-1 ui-block ui-text-xs ui-font-medium ui-text-slate-500" th:text="#{view.stock.form.price.label}">가격</label>
            <input type="number" min="0" step="1" th:field="*{price}"
                   class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500">
            <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}"
               class="ui-mt-1 ui-text-xs ui-text-red-500"></p>
        </div>
        <div>
            <label class="ui-mb-1 ui-block ui-text-xs ui-font-medium ui-text-slate-500" th:text="#{view.stock.form.expiration.label}">유통기한</label>
            <input type="date" th:field="*{expirationDate}"
                   class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500">
        </div>
    </div>

    <div class="ui-flex ui-flex-wrap ui-gap-2 ui-items-center md:justify-end">
        <button type="button"
                th:attr="hx-delete=@{/stocks/{id}(id=${stock.externalId})},hx-target='#stock-' + ${stock.externalId},hx-confirm=#{view.stock.detail.deleteConfirm(${stock.itemName})}"
                hx-swap="outerHTML"
                class="ui-rounded-md ui-border ui-border-red-200 ui-bg-white ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-red-600 ui-hover-bg-red-50 ui-transition md:order-last"
                th:text="#{view.common.delete}">
            삭제
        </button>
        <button type="button"
                th:attr="hx-put=@{/stocks/{id}(id=${stock.externalId})},hx-target='#stock-' + ${stock.externalId},hx-include='#stock-' + ${stock.externalId}"
                hx-swap="outerHTML"
                class="ui-rounded-md ui-bg-blue-600 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-blue-700 ui-transition"
                th:text="#{view.common.save}">
            저장
        </button>
        <button type="button"
                th:attr="hx-get=@{/stocks/{id}/cancel(id=${stock.externalId})},hx-target='#stock-' + ${stock.externalId}"
                hx-swap="outerHTML"
                class="ui-rounded-md ui-border ui-border-slate-300 ui-bg-white ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                th:text="#{view.common.cancel}">
            취소
        </button>
    </div>
</div>

<th:block th:fragment="view-with-modal-close">
    <th:block th:replace="~{stocks/fragments/detail-row :: view(stock=${stock})}"></th:block>
    <div id="modal" hx-swap-oob="true"></div>
</th:block>

</body>
</html>
