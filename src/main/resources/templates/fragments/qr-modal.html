<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal(title, qrUrl)" id="modal" data-component-id="common.modal.qr" role="dialog" aria-modal="true" aria-labelledby="modal-title" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center backdrop-blur-sm animate-in fade-in duration-200">
    <div class="modal-dialog max-w-sm mx-4 p-6">
        <div class="mb-4 flex items-center justify-between">
            <h3 class="text-lg font-bold text-ink" th:text="${title} ?: #{view.qr.modal.title}">QR 코드</h3>
            <button type="button"
                    hx-get="/empty" hx-target="#modal" hx-swap="outerHTML"
                    class=" p-1 text-faint hover:bg-surface-dim hover:text-ink text-sm">
                <span class="text-2xl">&times;</span>
            </button>
        </div>

        <div class="flex flex-col items-center gap-4 py-4">
            <div class=" border-4 border-line-soft p-2 bg-white">
                <img th:src="@{/api/qr/generate(content=${qrUrl})}"
                     alt="QR Code"
                     class="h-64 w-64 block">
            </div>
            <p class="text-xs text-faint text-center" th:text="#{view.qr.modal.description}">
                스캔하면 해당 위치의 재고 관리 화면으로 이동합니다.
            </p>
            <div class="mt-2 w-full">
                <button type="button"
                        onclick="window.print()"
                        class="w-full bg-ink py-2.5 text-sm text-white hover:bg-black transition"
                        th:text="#{view.qr.modal.print}">
                    인쇄하기
                </button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
