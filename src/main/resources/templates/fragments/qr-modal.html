<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal(title, qrUrl)" id="modal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm animate-in fade-in duration-200">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 p-6">
        <div class="mb-4 flex items-center justify-between">
            <h3 class="text-lg font-bold text-slate-800" th:text="${title} ?: #{view.qr.modal.title}">QR 코드</h3>
            <button type="button"
                    hx-get="/empty" hx-target="#modal" hx-swap="outerHTML"
                    class="rounded-lg p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-600">
                <span class="text-2xl">&times;</span>
            </button>
        </div>

        <div class="flex flex-col items-center gap-4 py-4">
            <div class="rounded-lg border-4 border-slate-100 p-2 bg-white">
                <img th:src="@{/api/qr/generate(content=${qrUrl})}"
                     alt="QR Code"
                     class="h-64 w-64 block">
            </div>
            <p class="text-xs text-slate-400 text-center" th:text="#{view.qr.modal.description}">
                스캔하면 해당 위치의 재고 관리 화면으로 이동합니다.
            </p>
            <div class="mt-2 w-full">
                <button type="button"
                        onclick="window.print()"
                        class="w-full rounded-lg bg-slate-800 py-2.5 text-sm font-semibold text-white hover:bg-slate-700 transition"
                        th:text="#{view.qr.modal.print}">
                    인쇄하기
                </button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
