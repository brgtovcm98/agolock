<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">

<!--/* 공통 <head> — 모든 페이지에서 th:replace="~{fragments/layout :: head(~{::title})}" 로 사용 */-->
<head th:fragment="head(titleContent)">
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${titleContent}">SeuStock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Noto+Sans+KR:wght@100..900&family=Noto+Sans+JP:wght@100..900&family=Noto+Sans+SC:wght@100..900&display=swap">
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/js/csrf.js"></script>
    <script src="/js/image-upload.js"></script>
    <script src="/js/tracking-policy-preview.js"></script>
    <script src="/js/dropdown-menu.js"></script>
    <script>
        (function () {
            function ensureToastContainer() {
                var container = document.getElementById('toast-container');
                if (container) return container;

                container = document.createElement('div');
                container.id = 'toast-container';
                container.setAttribute('data-component-id', 'feedback.toast-container');
                container.className = 'fixed right-4 top-4 z-60 flex toast-width flex-col gap-2';
                document.body.appendChild(container);
                return container;
            }

            function showToast(detail) {
                var message = detail && detail.message ? detail.message : /*[[#{toast.default.success}]]*/ '요청을 처리했습니다.';
                var type = detail && detail.type ? detail.type : 'success';
                var isError = type === 'error';
                var toast = document.createElement('div');
                toast.setAttribute('data-component-id', 'feedback.toast');
                toast.className = 'flex items-center gap-2 border px-4 py-3 text-sm leading-5 transition-colors duration-120 ease-out mb-0 border-ink bg-white/75 text-ink backdrop-blur-sm';

                var msgSpan = document.createElement('span');
                msgSpan.className = 'flex-1';
                msgSpan.textContent = message;

                var closeBtn = document.createElement('button');
                closeBtn.type = 'button';
                closeBtn.textContent = '×';
                closeBtn.className = 'ml-1 shrink-0 text-base leading-none opacity-60 hover:opacity-100 focus:outline-none';

                function dismiss() {
                    window.clearTimeout(timerId);
                    toast.classList.add('opacity-0');
                    window.setTimeout(function () { toast.remove(); }, 200);
                }
                closeBtn.addEventListener('click', dismiss);

                toast.appendChild(msgSpan);
                toast.appendChild(closeBtn);
                ensureToastContainer().appendChild(toast);

                var timerId = window.setTimeout(dismiss, 2800);
            }

            window.SeuStockToast = showToast;

            function replaceModalFromResponse(xhr) {
                if (!xhr || !xhr.responseText) return false;
                var parser = new DOMParser();
                var doc = parser.parseFromString(xhr.responseText, 'text/html');
                var incomingModal = doc.getElementById('modal');
                if (!incomingModal || !incomingModal.hasAttribute('data-error-modal')) return false;

                var currentModal = document.getElementById('modal');
                var insertedModal;
                if (currentModal) {
                    currentModal.outerHTML = incomingModal.outerHTML;
                    insertedModal = document.getElementById('modal');
                } else {
                    document.body.insertAdjacentHTML('beforeend', incomingModal.outerHTML);
                    insertedModal = document.getElementById('modal');
                }
                if (insertedModal && window.htmx) {
                    window.htmx.process(insertedModal);
                }
                return true;
            }

            document.addEventListener('app:toast', function (event) {
                showToast(event.detail);
            });

            document.addEventListener('htmx:responseError', function (event) {
                if (!replaceModalFromResponse(event.detail && event.detail.xhr)) {
                    showToast({ type: 'error', message: /*[[#{toast.default.error}]]*/ '요청을 처리하지 못했습니다.' });
                }
            });
        })();
    </script>
    <script th:if="${toastMessage != null}" th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            window.SeuStockToast({
                type: /*[[${toastType}]]*/ 'success' || 'success',
                message: /*[[${toastMessage}]]*/ /*[[#{toast.default.success}]]*/ '요청을 처리했습니다.'
            });
        });
    </script>
</head>

<!--/* 공통 네비게이션 바 */-->
<nav th:fragment="nav" data-component-id="layout.nav" class="border-b-2 border-ink bg-surface">
    <div class="mx-auto flex max-w-[960px] items-center justify-between px-4 py-4 md:px-6 lg:px-14">
        <a href="/" class="flex items-center gap-2.5">
            <span class="flex h-[22px] w-[22px] items-center justify-center bg-ink text-surface">
                <span class="font-mono text-sm font-semibold">S</span>
            </span>
            <span class="font-mono text-base font-semibold tracking-[0.06em] text-ink">SEUSTOCK</span>
        </a>

        <!--/* 데스크탑: md 이상에서 가로 나열 */-->
        <div class="hidden md:flex items-center gap-6 text-sm">
            <th:block th:if="${currentUsername != null}">
                <div class="flex items-center">
                    <a href="/spaces"
                       th:classappend="${activeNav == 'spaces'} ? 'bg-ink text-white font-bold' : 'text-muted hover:text-ink'"
                       class="px-3 py-1.5 text-sm transition-colors duration-120 ease-out"
                       th:text="#{view.nav.mySpaces}">내 공간</a>
                </div>
                <span class="h-3.5 w-px bg-line"></span>
                <div class="flex items-center">
                    <a href="/items"
                       th:classappend="${activeNav == 'items'} ? 'bg-ink text-white font-bold' : 'text-muted hover:text-ink'"
                       class="px-3 py-1.5 text-sm transition-colors duration-120 ease-out"
                       th:text="#{view.nav.myItems}">내 품목</a>
                </div>
                <span class="h-3.5 w-px bg-line"></span>
                <div class="flex items-center">
                    <a href="/stocks"
                       th:classappend="${activeNav == 'stocks'} ? 'bg-ink text-white font-bold' : 'text-muted hover:text-ink'"
                       class="px-3 py-1.5 text-sm transition-colors duration-120 ease-out"
                       th:text="#{view.nav.myStocks}">내 재고</a>
                </div>
                <span class="h-3.5 w-px bg-line"></span>
                <div class="flex items-center">
                    <a href="/account"
                       th:classappend="${activeNav == 'account'} ? 'bg-ink text-white font-bold' : 'text-muted hover:text-ink'"
                       class="px-3 py-1.5 text-sm transition-colors duration-120 ease-out"
                       th:text="#{view.nav.myAccount}">내 계정</a>
                </div>
                <span class="h-3.5 w-px bg-line"></span>
                <span class="font-mono text-[12.5px] text-muted" th:text="${currentNickname}"></span>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit"
                            class="text-[13px] text-muted hover:text-ink transition-colors duration-120 ease-out cursor-pointer bg-transparent border-0 p-0"
                            th:text="#{view.nav.logout}">로그아웃</button>
                </form>
            </th:block>
            <th:block th:if="${currentUsername == null}">
                <a href="/login"
                   th:classappend="${activeNav == 'login'} ? 'bg-ink text-white font-bold' : 'text-muted hover:text-ink'"
                   class="px-3 py-1.5 text-sm transition-colors duration-120 ease-out"
                   th:text="#{view.nav.login}">로그인</a>
                <a href="/register"
                   th:classappend="${activeNav == 'register'} ? 'bg-ink text-white font-bold' : 'btn-primary btn-sm'"
                   class="px-4 py-2 text-sm font-bold transition-colors duration-120 ease-out"
                   th:text="#{view.nav.register}">회원가입</a>
            </th:block>
        </div>

        <!--/* 모바일: md 미만에서 드롭다운 */-->
        <details class="relative md:hidden text-sm" aria-label="메뉴" data-dropdown-menu>
            <summary class="list-none cursor-pointer select-none px-3 py-1.5
                            text-muted hover:text-ink transition-colors duration-120 ease-out"
                     th:text="|#{view.nav.menu} ▾|">
                메뉴 ▾
            </summary>
            <div class="absolute right-0 top-full mt-1 min-w-[140px]
                        border border-ink bg-white/75 py-1 z-50 text-ink backdrop-blur-sm">
                <th:block th:if="${currentUsername != null}">
                    <div class="px-4 py-2 text-xs text-muted font-mono"
                         th:text="${currentNickname}"></div>
                    <hr class="border-line-soft mx-2 my-1"/>
                    <a href="/spaces"
                       class="block px-4 py-2 text-ink hover:bg-surface-dim transition-colors duration-120 ease-out"
                       th:text="#{view.nav.mySpaces}">내 공간</a>
                    <a href="/items"
                       class="block px-4 py-2 text-ink hover:bg-surface-dim transition-colors duration-120 ease-out"
                       th:text="#{view.nav.myItems}">내 품목</a>
                    <a href="/stocks"
                       class="block px-4 py-2 text-ink hover:bg-surface-dim transition-colors duration-120 ease-out"
                       th:text="#{view.nav.myStocks}">내 재고</a>
                    <a href="/account"
                       class="block px-4 py-2 text-ink hover:bg-surface-dim transition-colors duration-120 ease-out"
                       th:text="#{view.nav.myAccount}">내 계정</a>
                    <hr class="border-line-soft mx-2 my-1"/>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit"
                                class="block w-full text-left px-4 py-2 text-ink hover:bg-surface-dim transition-colors duration-120 ease-out bg-transparent border-0 cursor-pointer text-sm"
                                th:text="#{view.nav.logout}">로그아웃</button>
                    </form>
                </th:block>
                <th:block th:if="${currentUsername == null}">
                    <a href="/login"
                       class="block px-4 py-2 text-ink hover:bg-surface-dim transition-colors duration-120 ease-out"
                       th:text="#{view.nav.login}">로그인</a>
                    <a href="/register"
                       class="block px-4 py-2 text-accent font-semibold hover:bg-surface-dim transition-colors duration-120 ease-out"
                       th:text="#{view.nav.register}">회원가입</a>
                </th:block>
            </div>
        </details>
    </div>
</nav>

<!--/* 공통 푸터 */-->

    <div class="mx-auto flex max-w-[960px] flex-col gap-4 px-4 py-8 md:flex-row md:items-center md:justify-between">
        <div class="flex flex-col gap-2">
            <p class="text-sm text-muted">
                &copy; 2026 <span class="font-semibold text-ink">Team Ugui</span>. All rights reserved.
            </p>
            <div class="flex flex-col gap-2 text-xs text-muted sm:flex-row sm:items-center sm:gap-3">
                <div class="flex flex-wrap gap-x-2 gap-y-1">
                    <a th:href="@{''(lang='ko')}" class="hover:text-ink transition-colors duration-120 ease-out" th:classappend="${#locale.language == 'ko'} ? 'font-bold text-ink' : ''">한국어</a>
                    <a th:href="@{''(lang='en')}" class="hover:text-ink transition-colors duration-120 ease-out" th:classappend="${#locale.language == 'en'} ? 'font-bold text-ink' : ''">English</a>
                    <a th:href="@{''(lang='ja')}" class="hover:text-ink transition-colors duration-120 ease-out" th:classappend="${#locale.language == 'ja'} ? 'font-bold text-ink' : ''">日本語</a>
                    <a th:href="@{''(lang='zh-CN')}" class="hover:text-ink transition-colors duration-120 ease-out" th:classappend="${#locale.language == 'zh' && #locale.country == 'CN'} ? 'font-bold text-ink' : ''">简体中文</a>
                    <a th:href="@{''(lang='mn')}" class="hover:text-ink transition-colors duration-120 ease-out" th:classappend="${#locale.language == 'mn'} ? 'font-bold text-ink' : ''">Монгол</a>
                </div>
                <span class="hidden text-line sm:inline">|</span>
                <span>Released under the <a href="https://opensource.org/licenses/MIT" target="_blank" class="hover:text-ink underline decoration-line">MIT License</a>.</span>
            </div>

        <div class="flex items-center gap-6">

</html>
