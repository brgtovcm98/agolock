<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">

<!--/* 공통 <head> — 모든 페이지에서 th:replace="~{fragments/layout :: head(~{::title})}" 로 사용 */-->
<head th:fragment="head(titleContent)">
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${titleContent}">SeuStock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Noto+Sans+KR:wght@100..900&family=Noto+Sans+JP:wght@100..900&family=Noto+Sans+SC:wght@100..900&display=swap">
    <link rel="stylesheet" href="/css/ui.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/js/csrf.js"></script>
    <script src="/js/image-upload.js"></script>
    <script src="/js/tracking-policy-preview.js"></script>
    <script>
        (function () {
            function ensureToastContainer() {
                var container = document.getElementById('toast-container');
                if (container) return container;

                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'ui-fixed ui-right-4 ui-top-4 ui-z-60 ui-flex ui-w-toast ui-flex-col ui-gap-2';
                document.body.appendChild(container);
                return container;
            }

            function showToast(detail) {
                var message = detail && detail.message ? detail.message : /*[[#{toast.default.success}]]*/ '요청을 처리했습니다.';
                var type = detail && detail.type ? detail.type : 'success';
                var isError = type === 'error';
                var toast = document.createElement('div');
                toast.className = 'ui-rounded-md ui-ui-border ui-px-4 ui-py-3 ui-text-sm ui-shadow-xl ui-transition ui-flex ui-items-center ui-gap-2 ' +
                    (isError
                        ? 'ui-border-red-200 ui-bg-red-50 ui-text-red-700'
                        : 'ui-border-emerald-200 ui-bg-emerald-50 ui-text-emerald-700');

                var msgSpan = document.createElement('span');
                msgSpan.className = 'ui-flex-1';
                msgSpan.textContent = message;

                var closeBtn = document.createElement('button');
                closeBtn.type = 'button';
                closeBtn.textContent = '×';
                closeBtn.className = 'ui-ml-1 ui-shrink-0 ui-text-base ui-leading-none ui-opacity-50 ui-hover-opacity-100 ui-focus-outline-none';

                function dismiss() {
                    window.clearTimeout(timerId);
                    toast.classList.add('ui-opacity-0');
                    window.setTimeout(function () { toast.remove(); }, 200);
                }
                closeBtn.addEventListener('click', dismiss);

                toast.appendChild(msgSpan);
                toast.appendChild(closeBtn);
                ensureToastContainer().appendChild(toast);

                var timerId = window.setTimeout(dismiss, 2800);
            }

            window.SeuStockToast = showToast;

            function replaceModalFromResponse(xhr) {
                if (!xhr || !xhr.responseText) return false;
                var parser = new DOMParser();
                var doc = parser.parseFromString(xhr.responseText, 'text/html');
                var incomingModal = doc.getElementById('modal');
                if (!incomingModal || !incomingModal.hasAttribute('data-error-modal')) return false;

                var currentModal = document.getElementById('modal');
                var insertedModal;
                if (currentModal) {
                    currentModal.outerHTML = incomingModal.outerHTML;
                    insertedModal = document.getElementById('modal');
                } else {
                    document.body.insertAdjacentHTML('beforeend', incomingModal.outerHTML);
                    insertedModal = document.getElementById('modal');
                }
                if (insertedModal && window.htmx) {
                    window.htmx.process(insertedModal);
                }
                return true;
            }

            document.addEventListener('app:toast', function (event) {
                showToast(event.detail);
            });

            document.addEventListener('htmx:responseError', function (event) {
                if (!replaceModalFromResponse(event.detail && event.detail.xhr)) {
                    showToast({ type: 'error', message: /*[[#{toast.default.error}]]*/ '요청을 처리하지 못했습니다.' });
                }
            });
        })();
    </script>
    <script th:if="${toastMessage != null}" th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            window.SeuStockToast({
                type: /*[[${toastType}]]*/ 'success' || 'success',
                message: /*[[${toastMessage}]]*/ /*[[#{toast.default.success}]]*/ '요청을 처리했습니다.'
            });
        });
    </script>
</head>

<!--/* 공통 네비게이션 바 */-->
<nav th:fragment="nav" class="ui-border-b ui-border-slate-200 ui-bg-white">
    <div class="ui-mx-auto ui-max-w-5xl ui-px-4 ui-py-3 ui-flex ui-items-center ui-justify-between">
        <a href="/" class="ui-text-lg ui-font-semibold ui-text-slate-800 ui-tracking-tight">SeuStock</a>

        <!--/* 데스크탑: md 이상에서 가로 나열 */-->
        <div class="ui-hidden ui-md-flex ui-items-center ui-gap-x-4 ui-text-sm">
            <th:block th:if="${currentUsername != null}">
                <a href="/spaces"
                   class="ui-text-slate-600 ui-hover-text-slate-900 ui-transition" th:text="#{view.nav.mySpaces}">내 공간</a>
                <span class="ui-text-slate-300">|</span>
                <a href="/items"
                   class="ui-text-slate-600 ui-hover-text-slate-900 ui-transition" th:text="#{view.nav.myItems}">내 품목</a>
                <span class="ui-text-slate-300">|</span>
                <a href="/stocks"
                   class="ui-text-slate-600 ui-hover-text-slate-900 ui-transition" th:text="#{view.nav.myStocks}">내 재고</a>
                <span class="ui-text-slate-300">|</span>
                <span class="ui-text-slate-500" th:text="${currentNickname}"></span>
                <form th:action="@{/logout}" method="post" class="ui-inline">
                    <button type="submit"
                            class="ui-text-slate-600 ui-hover-text-slate-900 ui-transition ui-cursor-pointer ui-bg-transparent ui-border-0 ui-p-0" th:text="#{view.nav.logout}">로그아웃</button>
                </form>
            </th:block>
            <th:block th:if="${currentUsername == null}">
                <a href="/login"
                   class="ui-text-slate-600 ui-hover-text-slate-900 ui-transition" th:text="#{view.nav.login}">로그인</a>
                <a href="/register"
                   class="ui-rounded-md ui-bg-blue-600 ui-px-3 ui-py-1-5 ui-font-medium ui-text-white
                          ui-hover-bg-blue-700 ui-transition" th:text="#{view.nav.register}">회원가입</a>
            </th:block>
        </div>

        <!--/* 모바일: md 미만에서 드롭다운 */-->
        <details class="ui-relative ui-md-hidden ui-text-sm" aria-label="메뉴">
            <summary class="ui-list-none ui-cursor-pointer ui-select-none ui-rounded ui-px-3 ui-py-1-5
                            ui-text-slate-600 ui-hover-text-slate-900 ui-hover-bg-slate-100 ui-transition" th:text="|#{view.nav.menu} ▾|">
                메뉴 ▾
            </summary>
            <div class="ui-absolute ui-right-0 ui-top-full ui-mt-1 ui-min-w-120px ui-rounded-md
                        ui-ui-border ui-border-slate-200 ui-bg-white ui-shadow-md ui-py-1 ui-z-50">
                <th:block th:if="${currentUsername != null}">
                    <div class="ui-px-3 ui-py-1-5 ui-text-xs ui-text-slate-400"
                         th:text="${currentNickname}"></div>
                    <hr class="ui-border-slate-100 ui-mx-2 ui-my-1"/>
                    <a href="/spaces"
                       class="ui-block ui-px-3 ui-py-2 ui-text-slate-700 ui-hover-bg-slate-50 ui-transition" th:text="#{view.nav.mySpaces}">내 공간</a>
                    <a href="/items"
                       class="ui-block ui-px-3 ui-py-2 ui-text-slate-700 ui-hover-bg-slate-50 ui-transition" th:text="#{view.nav.myItems}">내 품목</a>
                    <a href="/stocks"
                       class="ui-block ui-px-3 ui-py-2 ui-text-slate-700 ui-hover-bg-slate-50 ui-transition" th:text="#{view.nav.myStocks}">내 재고</a>
                    <hr class="ui-border-slate-100 ui-mx-2 ui-my-1"/>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit"
                                class="ui-block ui-w-full ui-text-left ui-px-3 ui-py-2 ui-text-slate-700 ui-hover-bg-slate-50 ui-transition ui-bg-transparent ui-border-0 ui-cursor-pointer" th:text="#{view.nav.logout}">로그아웃</button>
                    </form>
                </th:block>
                <th:block th:if="${currentUsername == null}">
                    <a href="/login"
                       class="ui-block ui-px-3 ui-py-2 ui-text-slate-700 ui-hover-bg-slate-50 ui-transition" th:text="#{view.nav.login}">로그인</a>
                    <a href="/register"
                       class="ui-block ui-px-3 ui-py-2 ui-text-blue-600 ui-font-medium ui-hover-bg-slate-50 ui-transition" th:text="#{view.nav.register}">회원가입</a>
                </th:block>
            </div>
        </details>
    </div>
</nav>

<!--/* 공통 푸터 */-->

    <div class="ui-mx-auto ui-flex ui-max-w-5xl ui-flex-col ui-gap-4 ui-px-4 ui-py-8 ui-md-flex-row ui-md-items-center ui-md-justify-between">
        <div class="ui-flex ui-flex-col ui-gap-2">
            <p class="ui-text-sm ui-text-slate-500">
                &copy; 2026 <span class="ui-font-medium ui-text-slate-700">Team Ugui</span>. All rights reserved.
            </p>
            <div class="ui-flex ui-flex-col ui-gap-2 ui-text-xs ui-text-slate-400 ui-sm-flex-row ui-sm-items-center ui-sm-gap-3">
                <div class="ui-flex ui-flex-wrap ui-gap-x-2 ui-gap-y-1">
                    <a th:href="@{''(lang='ko')}" class="ui-hover-text-slate-600 ui-transition" th:classappend="${#locale.language == 'ko'} ? 'ui-font-bold ui-text-slate-600' : ''">한국어</a>
                    <a th:href="@{''(lang='en')}" class="ui-hover-text-slate-600 ui-transition" th:classappend="${#locale.language == 'en'} ? 'ui-font-bold ui-text-slate-600' : ''">English</a>
                    <a th:href="@{''(lang='ja')}" class="ui-hover-text-slate-600 ui-transition" th:classappend="${#locale.language == 'ja'} ? 'ui-font-bold ui-text-slate-600' : ''">日本語</a>
                    <a th:href="@{''(lang='zh-CN')}" class="ui-hover-text-slate-600 ui-transition" th:classappend="${#locale.language == 'zh' && #locale.country == 'CN'} ? 'ui-font-bold ui-text-slate-600' : ''">简体中文</a>
                    <a th:href="@{''(lang='mn')}" class="ui-hover-text-slate-600 ui-transition" th:classappend="${#locale.language == 'mn'} ? 'ui-font-bold ui-text-slate-600' : ''">Монгол</a>
                </div>
                <span class="ui-hidden ui-text-slate-200 ui-sm-inline">|</span>
                <span>Released under the <a href="https://opensource.org/licenses/MIT" target="_blank" class="ui-hover-text-slate-600 ui-underline ui-decoration-slate-300">MIT License</a>.</span>
            </div>

                </svg>
            </a>
        </div>
    </div>
</footer>

</html>
