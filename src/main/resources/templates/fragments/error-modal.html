<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     data-error-modal
     class="ui-modal-overlay ui-fixed ui-inset-0 ui-z-50 ui-flex ui-items-center ui-justify-center ui-bg-slate-900-50 ui-px-4">
    <div class="ui-modal-dialog ui-w-full ui-max-w-sm ui-rounded-lg ui-bg-white ui-p-6 ui-shadow-xl">
        <div class="ui-mb-4 ui-flex ui-items-start ui-gap-3">
            <div class="ui-flex ui-h-9 ui-w-9 ui-shrink-0 ui-items-center ui-justify-center ui-rounded-full ui-bg-red-50 ui-text-sm ui-font-bold ui-text-red-600"
                 th:text="${statusCode}">400</div>
            <div class="ui-min-w-0">
                <h2 id="modal-title" class="ui-text-base ui-font-semibold ui-text-slate-800"
                    th:text="${errorTitle} ?: #{view.error.modal.defaultTitle}">요청을 처리할 수 없습니다</h2>
                <p class="ui-mt-1 ui-text-sm ui-text-slate-500"
                   th:text="${errorMessage} ?: #{view.error.modal.defaultMessage}">잠시 후 다시 시도해주세요.</p>
            </div>
        </div>
        <div class="ui-flex ui-justify-end">
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="ui-rounded-md ui-bg-slate-700 ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-slate-800 ui-transition"
                    th:text="#{view.common.confirm}">
                확인
            </button>
        </div>
    </div>
</div>

</body>
</html>
