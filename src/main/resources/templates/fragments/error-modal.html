<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal"
     data-error-modal
     class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 px-4">
    <div class="w-full max-w-sm rounded-lg bg-white p-6 shadow-xl">
        <div class="mb-4 flex items-start gap-3">
            <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-red-50 text-sm font-bold text-red-600"
                 th:text="${statusCode}">400</div>
            <div class="min-w-0">
                <h2 class="text-base font-semibold text-slate-800"
                    th:text="${errorTitle} ?: #{view.error.modal.defaultTitle}">요청을 처리할 수 없습니다</h2>
                <p class="mt-1 text-sm text-slate-500"
                   th:text="${errorMessage} ?: #{view.error.modal.defaultMessage}">잠시 후 다시 시도해주세요.</p>
            </div>
        </div>
        <div class="flex justify-end">
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="rounded-md bg-slate-700 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800 transition"
                    th:text="#{view.common.confirm}">
                확인
            </button>
        </div>
    </div>
</div>

</body>
</html>
