<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<li th:fragment="tree-item(shelf, space)"
    th:id="'shelf-' + ${shelf.externalId}"
    class="ui-border-b ui-border-slate-100 last:border-0">

    <!-- Shelf 헤더: 클릭 첫 번째→HTMX로 Box 목록 로드, 이후→JS 토글 -->
    <div class="tree-item-container ui-flex ui-items-center ui-gap-1 ui-px-3 ui-py-3 ui-bg-slate-50 ui-hover-bg-slate-100 active:bg-slate-200 ui-transition ui-cursor-pointer group" role="button" tabindex="0" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){this.click()}"
         th:attr="onclick='toggleBoxList(\'' + ${shelf.externalId} + '\', this)',
                  hx-get=@{/spaces/{sid}/shelves/{id}/boxes(sid=${space},id=${shelf.externalId})},
                  hx-target='#box-list-' + ${shelf.externalId}"
         hx-swap="innerHTML"
         hx-trigger="click once">

        <span class="arrow ui-text-xs ui-text-slate-400 w-3 ui-shrink-0">▶</span>

        <!-- Shelf명 클릭 → 선반 직접 재고 패널 로드 -->
        <button type="button"
                class="tree-item-trigger tree-item-text ui-flex-1 ui-text-left ui-text-sm ui-font-medium ui-text-slate-700 ui-truncate"
                th:text="${shelf.name}"
                th:attr="hx-get=@{/spaces/{sid}/shelves/{id}/stocks(sid=${space},id=${shelf.externalId})}"
                hx-target="#stock-panel"
                hx-swap="outerHTML"
                onclick="event.stopPropagation()"></button>

        <span class="ui-flex ui-items-center gap-0.5 ui-shrink-0">
            <!-- QR 코드 버튼 -->
            <button type="button"
                    class="ui-inline-flex h-8 w-8 ui-items-center ui-justify-center rounded ui-text-sm ui-text-slate-400 ui-hover-bg-slate-100 ui-hover-text-slate-600"
                    th:attr="hx-get=@{/api/qr/modal(type='shelf',externalId=${shelf.externalId},name=${shelf.name})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    onclick="event.stopPropagation()"
                    th:title="#{view.box.tree.qrTitle}">📷</button>
            <!-- Shelf 수정 버튼 -->
            <button type="button"
                    class="ui-inline-flex h-8 w-8 ui-items-center ui-justify-center rounded ui-text-sm ui-text-slate-400 ui-hover-bg-slate-100 ui-hover-text-slate-600"
                    th:attr="hx-get=@{/spaces/{sid}/shelves/{id}/edit(sid=${space},id=${shelf.externalId})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    onclick="event.stopPropagation()"
                    th:title="#{view.box.tree.editTitle}">✏</button>

            <!-- Box 추가 버튼 -->
            <button type="button"
                    class="ui-inline-flex ui-h-6 ui-w-6 ui-items-center ui-justify-center rounded ui-text-xs ui-text-blue-500 ui-hover-bg-blue-50 ui-hover-text-blue-700"
                    th:attr="hx-get=@{/spaces/{sid}/shelves/{id}/boxes/new(sid=${space},id=${shelf.externalId})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    onclick="event.stopPropagation()"
                    th:title="#{view.shelf.created.addBox}">+</button>

            <!-- Shelf 삭제 버튼 -->
            <button type="button"
                    class="ui-inline-flex h-8 w-8 ui-items-center ui-justify-center rounded ui-text-sm ui-text-slate-400 ui-hover-bg-red-50 ui-hover-text-red-500"
                    th:attr="hx-delete=@{/spaces/{sid}/shelves/{id}(sid=${space},id=${shelf.externalId})},
                             hx-confirm=#{view.shelf.created.deleteConfirm}"
                    hx-target="#shelf-list"
                    hx-swap="outerHTML"
                    onclick="event.stopPropagation()"
                    th:title="#{view.common.delete}">×</button>
        </span>
    </div>

    <!-- Box 목록 컨테이너 (HTMX가 innerHTML로 채움) -->
    <ul th:id="'box-list-' + ${shelf.externalId}"
        class="ui-hidden ml-4 border-l ui-border-slate-100">
    </ul>

</li>

</body>
</html>
