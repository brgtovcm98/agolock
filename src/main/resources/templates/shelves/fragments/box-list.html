<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- HTMX로 Box 목록 첫 로드 시 innerHTML로 삽입됨 -->
<th:block th:fragment="box-list">
    <th:block th:replace="~{:: box-list-content}"></th:block>
</th:block>

<th:block th:fragment="box-list-content">
    <li th:if="${boxes.empty}"
        class="px-3 py-2">
        <button type="button"
                class="btn--cta cursor-pointer text-sm"
                th:attr="hx-get=@{/spaces/{sid}/shelves/{shid}/boxes/new(sid=${space},shid=${shelf.externalId})},hx-target='#modal'"
                hx-swap="outerHTML"
                th:text="|+ #{view.shelf.created.addBox}|">
            + 박스 추가
        </button>
    </li>

    <th:block th:each="box : ${boxes}">
        <th:block th:replace="~{boxes/fragments/tree-item :: tree-item(box=${box}, space=${space}, shelf=${shelf.externalId})}"></th:block>
    </th:block>
</th:block>

<ul th:fragment="box-list-container" data-component-id="shelves.box-list-container"
    th:id="'box-list-' + ${shelf.externalId}"
    class="ml-4 border-l border-line-soft">
    <th:block th:replace="~{:: box-list-content}"></th:block>
</ul>

<th:block th:fragment="box-list-response">
    <ul data-component-id="shelves.box-list-response" th:id="'box-list-' + ${shelf.externalId}"
        class="ml-4 border-l border-line-soft"
        hx-swap-oob="true">
        <th:block th:replace="~{:: box-list-content}"></th:block>
    </ul>
    <div id="modal" data-component-id="shelves.modal-mount"></div>
</th:block>

</body>
</html>
