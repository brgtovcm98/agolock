<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 새 선반 행 -->
<li th:fragment="created" data-component-id="shelves.tree-item.created"
    th:id="'shelf-' + ${shelf.externalId}"
    class="border-b border-line-soft last:border-0">

    <div class="flex items-center gap-1 px-3 hover:bg-surface-dim transition cursor-pointer group"
         th:attr="onclick='toggleBoxList(\'' + ${shelf.externalId} + '\', this)',
                  hx-get=@{/spaces/{sid}/shelves/{id}/boxes(sid=${space},id=${shelf.externalId})},
                  hx-target='#box-list-' + ${shelf.externalId}"
         hx-swap="innerHTML"
         hx-trigger="click once">

        <span class="arrow text-xs text-faint w-3 shrink-0">▶</span>

        <button type="button"
                class="flex-1 text-left text-sm font-medium text-ink truncate"
                th:text="${shelf.name}"
                th:attr="hx-get=@{/spaces/{sid}/shelves/{id}/stocks(sid=${space},id=${shelf.externalId})}"
                hx-target="#stock-panel"
                hx-swap="outerHTML"
                onclick="event.stopPropagation()"></button>

        <span class="hidden group-hover:flex items-center gap-1 shrink-0">
            <button type="button"
                    class="inline-flex h-6 w-6 items-center justify-center text-sm text-accent hover:text-accent"
                    th:attr="hx-get=@{/spaces/{sid}/shelves/{id}/boxes/new(sid=${space},id=${shelf.externalId})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    onclick="event.stopPropagation()"
                    th:title="#{view.shelf.created.addBox}">+</button>

            <button type="button"
                    class="inline-flex h-6 w-6 items-center justify-center text-sm text-danger hover:text-danger"
                    th:attr="hx-delete=@{/spaces/{sid}/shelves/{id}(sid=${space},id=${shelf.externalId})},
                             hx-confirm=#{view.shelf.created.deleteConfirm}"
                    hx-target="#shelf-list"
                    hx-swap="outerHTML"
                    onclick="event.stopPropagation()"
                    th:title="#{view.common.delete}">×</button>
        </span>
    </div>

    <ul data-component-id="shelves.box-list" th:id="'box-list-' + ${shelf.externalId}"
        class="hidden ml-4 border-l border-line-soft">
    </ul>

</li>

<!-- OOB: 모달 닫기 -->
<div id="modal" data-component-id="shelves.modal-mount" hx-swap-oob="true"></div>

</body>
</html>
