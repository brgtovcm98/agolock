<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 새 선반 행 -->
<li th:fragment="created"
    th:id="'shelf-' + ${shelf.externalId}"
    class="border-b border-slate-100 last:border-0">

    <div class="flex items-center gap-1 px-3 py-2 hover:bg-slate-50 transition cursor-pointer group"
         th:attr="onclick='toggleBoxList(\'' + ${shelf.externalId} + '\', this)',
                  hx-get=@{/spaces/{sid}/shelves/{id}/boxes(sid=${spaceExternalId},id=${shelf.externalId})},
                  hx-target='#box-list-' + ${shelf.externalId}"
         hx-swap="innerHTML"
         hx-trigger="click once">

        <span class="arrow text-xs text-slate-400 w-3 shrink-0">▶</span>

        <button type="button"
                class="flex-1 text-left text-sm font-medium text-slate-700 truncate"
                th:text="${shelf.name}"
                th:attr="hx-get=@{/spaces/{sid}/shelves/{id}/stocks(sid=${spaceExternalId},id=${shelf.externalId})}"
                hx-target="#stock-panel"
                hx-swap="outerHTML"
                onclick="event.stopPropagation()"></button>

        <span class="hidden group-hover:flex items-center gap-1 shrink-0">
            <button type="button"
                    class="inline-flex h-6 w-6 items-center justify-center rounded text-xs text-blue-500 hover:text-blue-700"
                    th:attr="hx-get=@{/spaces/{sid}/shelves/{id}/boxes/new(sid=${spaceExternalId},id=${shelf.externalId})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    onclick="event.stopPropagation()"
                    th:title="#{view.shelf.created.addBox}">+</button>

            <button type="button"
                    class="inline-flex h-6 w-6 items-center justify-center rounded text-xs text-red-400 hover:text-red-600"
                    th:attr="hx-delete=@{/spaces/{sid}/shelves/{id}(sid=${spaceExternalId},id=${shelf.externalId})},
                             hx-confirm=#{view.shelf.created.deleteConfirm}"
                    hx-target="#shelf-list"
                    hx-swap="outerHTML"
                    onclick="event.stopPropagation()"
                    th:title="#{view.common.delete}">×</button>
        </span>
    </div>

    <ul th:id="'box-list-' + ${shelf.externalId}"
        class="hidden ml-4 border-l border-slate-100">
    </ul>

</li>

<!-- OOB: 모달 닫기 -->
<div id="modal" hx-swap-oob="true"></div>

</body>
</html>
