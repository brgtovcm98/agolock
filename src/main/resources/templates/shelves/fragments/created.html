<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 새 선반 행 -->
<li th:fragment="created"
    th:id="'shelf-' + ${shelf.externalId}"
    class="ui-border-b ui-border-slate-100 last:border-0">

    <div class="ui-flex ui-items-center ui-gap-1 ui-px-3 ui-py-2 ui-hover-bg-slate-50 ui-transition ui-cursor-pointer group"
         th:attr="onclick='toggleBoxList(\'' + ${shelf.externalId} + '\', this)',
                  hx-get=@{/spaces/{sid}/shelves/{id}/boxes(sid=${space},id=${shelf.externalId})},
                  hx-target='#box-list-' + ${shelf.externalId}"
         hx-swap="innerHTML"
         hx-trigger="click once">

        <span class="arrow ui-text-xs ui-text-slate-400 w-3 ui-shrink-0">▶</span>

        <button type="button"
                class="ui-flex-1 ui-text-left ui-text-sm ui-font-medium ui-text-slate-700 ui-truncate"
                th:text="${shelf.name}"
                th:attr="hx-get=@{/spaces/{sid}/shelves/{id}/stocks(sid=${space},id=${shelf.externalId})}"
                hx-target="#stock-panel"
                hx-swap="outerHTML"
                onclick="event.stopPropagation()"></button>

        <span class="ui-hidden group-hover:flex ui-items-center ui-gap-1 ui-shrink-0">
            <button type="button"
                    class="ui-inline-flex ui-h-6 ui-w-6 ui-items-center ui-justify-center rounded ui-text-xs ui-text-blue-500 ui-hover-text-blue-700"
                    th:attr="hx-get=@{/spaces/{sid}/shelves/{id}/boxes/new(sid=${space},id=${shelf.externalId})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    onclick="event.stopPropagation()"
                    th:title="#{view.shelf.created.addBox}">+</button>

            <button type="button"
                    class="ui-inline-flex ui-h-6 ui-w-6 ui-items-center ui-justify-center rounded ui-text-xs ui-text-red-400 ui-hover-text-red-600"
                    th:attr="hx-delete=@{/spaces/{sid}/shelves/{id}(sid=${space},id=${shelf.externalId})},
                             hx-confirm=#{view.shelf.created.deleteConfirm}"
                    hx-target="#shelf-list"
                    hx-swap="outerHTML"
                    onclick="event.stopPropagation()"
                    th:title="#{view.common.delete}">×</button>
        </span>
    </div>

    <ul th:id="'box-list-' + ${shelf.externalId}"
        class="ui-hidden ml-4 border-l ui-border-slate-100">
    </ul>

</li>

<!-- OOB: 모달 닫기 -->
<div id="modal" hx-swap-oob="true"></div>

</body>
</html>
