<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal" data-component-id="shelves.modal.create" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="modal-overlay fixed inset-0 z-50 flex items-center justify-center">
    <div class="modal-dialog max-w-sm mx-4 p-6 flex flex-col">

        <h2 id="modal-title" class="modal-title mb-4" th:text="#{view.shelf.modal.add.title}">선반 추가</h2>

        <form th:object="${form}"
              method="post"
              th:attr="hx-post=@{/spaces/{id}/shelves(id=${space})}"
              hx-target="#modal"
              hx-swap="outerHTML">

            <div class="mb-4">
                <label class="field-label" th:text="#{view.shelf.form.name.label}">선반 이름</label>
                <input type="text" th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                       class="field-input"
                       th:placeholder="#{view.shelf.form.name.placeholder}" autofocus>
                <span th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"
                      class="field-error"></span>
            </div>

            <div class="flex gap-2 justify-end">
                <button type="button"
                        hx-get="/empty"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="btn-secondary text-sm"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        class="btn-primary text-sm"
                        th:text="#{view.common.add}">
                    추가
                </button>
            </div>
        </form>
    </div>
</div>


<div th:fragment="edit-modal"
     id="modal"
     data-component-id="shelves.modal.edit"
     class="modal-overlay fixed inset-0 z-50 flex items-center justify-center">
    <div class="modal-dialog max-w-sm mx-4 p-6 flex flex-col">

        <h2 class="modal-title mb-4" th:text="#{view.shelf.modal.edit.title}">선반 이름 수정</h2>

        <form th:object="${form}"
              method="post"
              th:attr="hx-patch=@{/spaces/{sid}/shelves/{id}(sid=${space},id=${shelf})}"
              hx-target="#modal"
              hx-swap="outerHTML">

            <div class="mb-4">
                <label class="field-label" th:text="#{view.shelf.form.name.label}">선반 이름</label>
                <input type="text" th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                       class="field-input"
                       th:placeholder="#{view.shelf.form.name.placeholder}" autofocus>
                <span th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"
                      class="field-error"></span>
            </div>

            <div class="flex gap-2 justify-end">
                <button type="button"
                        hx-get="/empty"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="btn-secondary text-sm"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        class="btn-primary text-sm"
                        th:text="#{view.common.save}">
                    저장
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
