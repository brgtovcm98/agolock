<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 p-6 max-h-[90vh] overflow-y-auto flex flex-col">

        <h2 class="text-lg font-semibold text-slate-800 mb-4" th:text="#{view.shelf.modal.add.title}">선반 추가</h2>

        <form th:object="${form}"
              method="post"
              th:attr="hx-post=@{/spaces/{id}/shelves(id=${spaceExternalId})}"
              hx-target="#modal"
              hx-swap="outerHTML">

            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-700 mb-1" th:text="#{view.shelf.form.name.label}">선반 이름</label>
                <input type="text" th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'border-red-400'"
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                       th:placeholder="#{view.shelf.form.name.placeholder}" autofocus>
                <span th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <div class="flex gap-2 justify-end">
                <button type="button"
                        hx-get="/empty"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="rounded-md border border-slate-300 px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 transition"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        class="rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 transition"
                        th:text="#{view.common.add}">
                    추가
                </button>
            </div>
        </form>
    </div>
</div>


<div th:fragment="edit-modal"
     id="modal"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 p-6 max-h-[90vh] overflow-y-auto flex flex-col">

        <h2 class="text-lg font-semibold text-slate-800 mb-4" th:text="#{view.shelf.modal.edit.title}">선반 이름 수정</h2>

        <form th:object="${form}"
              method="post"
              th:attr="hx-patch=@{/spaces/{sid}/shelves/{id}(sid=${spaceExternalId},id=${shelfExternalId})}"
              hx-target="#modal"
              hx-swap="outerHTML">

            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-700 mb-1" th:text="#{view.shelf.form.name.label}">선반 이름</label>
                <input type="text" th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'border-red-400'"
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                       th:placeholder="#{view.shelf.form.name.placeholder}" autofocus>
                <span th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <div class="flex gap-2 justify-end">
                <button type="button"
                        hx-get="/empty"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="rounded-md border border-slate-300 px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 transition"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        class="rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 transition"
                        th:text="#{view.common.save}">
                    저장
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
