<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.login.title}">로그인 · SeuStock</title>
</head>
<body class="page min-h-screen bg-slate-50 flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main data-component-id="page.login" class="page-main flex flex-1 items-center justify-center px-4 py-12">
    <div data-component-id="login.card" class="card w-full max-w-sm p-6">

        <h1 class="page-title mb-6" th:text="#{view.login.header}">로그인</h1>

        <form data-component-id="login.form" th:action="@{/login}" th:object="${form}" method="post" class="space-y-4">

            <!-- 비밀번호 변경 완료 -->
            <div th:if="${param.reset}"
                 class="alert alert-success"
                 th:text="#{view.login.resetSuccess}">
                비밀번호가 변경되었습니다. 다시 로그인해주세요.
            </div>

            <!-- 인증 오류 -->
            <div th:if="${param.error}"
                 class="alert alert-error"
                 th:text="#{view.login.error}">
                이메일 또는 비밀번호가 올바르지 않습니다.
            </div>

            <!-- 이메일 -->
            <div>
                <label for="email" class="field-label" th:text="#{view.login.email}">
                    이메일
                </label>
                <input type="email" id="email" th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'border-red-400 focus:ring-red-400'"
                       class="field-input"
                       autocomplete="email">
                <span th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"
                      class="field-error"></span>
            </div>

            <!-- 비밀번호 -->
            <div>
                <label for="password" class="field-label" th:text="#{view.login.password}">
                    비밀번호
                </label>
                <input type="password" id="password" th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? 'border-red-400 focus:ring-red-400'"
                       class="field-input"
                       autocomplete="current-password">
                <span th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"
                      class="field-error"></span>
            </div>

            <button type="submit"
                    class="btn-primary w-full"
                    th:text="#{view.login.button}">
                로그인
            </button>

        </form>

        <p class="mt-4 text-center text-sm">
            <a href="/password/forgot" class="font-medium text-blue-600 hover:text-blue-700" th:text="#{view.login.forgotPassword}">비밀번호를 잊으셨나요?</a>
        </p>

        <p class="mt-3 text-center text-sm text-slate-500">
            <span th:text="#{view.login.noAccount}">계정이 없으신가요?</span>
            <a href="/register" class="font-medium text-blue-600 hover:text-blue-700" th:text="#{view.login.register}">회원가입</a>
        </p>

    </div>
</main>

</body>
</html>
