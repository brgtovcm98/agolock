<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.login.title}">로그인 · SeuStock</title>
</head>
<body class="ui-page ui-min-h-screen ui-bg-slate-50 ui-flex ui-flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="ui-page-main ui-flex ui-flex-1 ui-items-center ui-justify-center ui-px-4 py-12">
    <div class="ui-card ui-w-full ui-max-w-sm ui-p-6">

        <h1 class="ui-page-title ui-mb-6 ui-text-2xl ui-font-bold ui-text-slate-800" th:text="#{view.login.header}">로그인</h1>

        <form th:action="@{/login}" th:object="${form}" method="post" class="ui-space-y-4">

            <!-- 비밀번호 변경 완료 -->
            <div th:if="${param.reset}"
                 class="ui-alert ui-alert-success ui-rounded-md ui-bg-green-50 ui-border ui-border-green-200 ui-px-4 ui-py-3 ui-text-sm ui-text-green-700"
                 th:text="#{view.login.resetSuccess}">
                비밀번호가 변경되었습니다. 다시 로그인해주세요.
            </div>

            <!-- 인증 오류 -->
            <div th:if="${param.error}"
                 class="ui-alert ui-alert-error ui-rounded-md ui-bg-red-50 ui-border ui-border-red-200 ui-px-4 ui-py-3 ui-text-sm ui-text-red-600"
                 th:text="#{view.login.error}">
                이메일 또는 비밀번호가 올바르지 않습니다.
            </div>

            <!-- 이메일 -->
            <div>
                <label for="email" class="ui-label ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1" th:text="#{view.login.email}">
                    이메일
                </label>
                <input type="email" id="email" th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'ui-border-red-400 ui-focus-ring-red-400'"
                       class="ui-input ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500
                              ui-transition"
                       autocomplete="email">
                <span th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"
                      class="ui-mt-1 ui-block ui-text-xs ui-text-red-500"></span>
            </div>

            <!-- 비밀번호 -->
            <div>
                <label for="password" class="ui-label ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1" th:text="#{view.login.password}">
                    비밀번호
                </label>
                <input type="password" id="password" th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? 'ui-border-red-400 ui-focus-ring-red-400'"
                       class="ui-input ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500
                              ui-transition"
                       autocomplete="current-password">
                <span th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"
                      class="ui-mt-1 ui-block ui-text-xs ui-text-red-500"></span>
            </div>

            <button type="submit"
                    class="ui-button ui-button-primary ui-w-full ui-rounded-md ui-bg-blue-600 ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-white
                           ui-hover-bg-blue-700 ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500
                           focus:ring-offset-2 ui-transition"
                    th:text="#{view.login.button}">
                로그인
            </button>

        </form>

        <p class="mt-4 ui-text-center ui-text-sm">
            <a href="/password/forgot" class="ui-font-medium ui-text-blue-600 ui-hover-text-blue-700" th:text="#{view.login.forgotPassword}">비밀번호를 잊으셨나요?</a>
        </p>

        <p class="mt-3 ui-text-center ui-text-sm ui-text-slate-500">
            <span th:text="#{view.login.noAccount}">계정이 없으신가요?</span>
            <a href="/register" class="ui-font-medium ui-text-blue-600 ui-hover-text-blue-700" th:text="#{view.login.register}">회원가입</a>
        </p>

    </div>
</main>

</body>
</html>
