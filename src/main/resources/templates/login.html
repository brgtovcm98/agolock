<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.login.title}">로그인 · SeuStock</title>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="flex flex-1 items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

        <h1 class="mb-6 text-2xl font-bold text-slate-800" th:text="#{view.login.header}">로그인</h1>

        <form th:action="@{/login}" th:object="${form}" method="post" class="space-y-4">

            <!-- 비밀번호 변경 완료 -->
            <div th:if="${param.reset}"
                 class="rounded-md bg-green-50 border border-green-200 px-4 py-3 text-sm text-green-700"
                 th:text="#{view.login.resetSuccess}">
                비밀번호가 변경되었습니다. 다시 로그인해주세요.
            </div>

            <!-- 인증 오류 -->
            <div th:if="${param.error}"
                 class="rounded-md bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-600"
                 th:text="#{view.login.error}">
                이메일 또는 비밀번호가 올바르지 않습니다.
            </div>

            <!-- 이메일 -->
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1" th:text="#{view.login.email}">
                    이메일
                </label>
                <input type="email" id="email" th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'border-red-400 focus:ring-red-400'"
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                              transition"
                       autocomplete="email">
                <span th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <!-- 비밀번호 -->
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1" th:text="#{view.login.password}">
                    비밀번호
                </label>
                <input type="password" id="password" th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? 'border-red-400 focus:ring-red-400'"
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                              transition"
                       autocomplete="current-password">
                <span th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <button type="submit"
                    class="w-full rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white
                           hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500
                           focus:ring-offset-2 transition"
                    th:text="#{view.login.button}">
                로그인
            </button>

        </form>

        <p class="mt-4 text-center text-sm">
            <a href="/password/forgot" class="font-medium text-blue-600 hover:text-blue-700" th:text="#{view.login.forgotPassword}">비밀번호를 잊으셨나요?</a>
        </p>

        <p class="mt-3 text-center text-sm text-slate-500">
            <span th:text="#{view.login.noAccount}">계정이 없으신가요?</span>
            <a href="/register" class="font-medium text-blue-600 hover:text-blue-700" th:text="#{view.login.register}">회원가입</a>
        </p>

    </div>
</main>

</body>
</html>
