<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.register.title}">회원가입 · SeuStock</title>
</head>
<body class="page min-h-screen flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main data-component-id="page.register" class="page-main flex flex-1 items-start justify-center px-4 pt-[120px]">
    <div data-component-id="register.card" class="w-full max-w-[440px] border border-ink bg-surface p-10">

        <div class="mb-7">
            <p class="page-caption mb-2">REGISTER</p>
            <h1 class="text-2xl font-extrabold text-ink" th:text="#{view.register.header}">회원가입</h1>
        </div>

        <!-- 가입 완료 메시지 -->
        <div th:if="${success}"
             class="mb-5 border border-ink bg-ink px-4 py-3 text-sm text-white"
             th:text="#{view.register.success}">
            회원가입이 완료되었습니다.
        </div>

        <form data-component-id="register.form" th:action="@{/register}" th:object="${form}" method="post" class="space-y-5">

            <!-- 이메일 -->
            <div>
                <label for="email" class="field-label" th:text="#{view.register.email}">
                    이메일
                </label>
                <input type="email" id="email" th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                       class="field-input h-11"
                       th:placeholder="#{view.register.emailPlaceholder}"
                       placeholder="example@email.com"
                       hx-get="/register/check-email"
                       hx-trigger="input changed delay:400ms"
                       hx-target="#email-feedback"
                       hx-include="[name='email']"
                       autocomplete="email">
                <div id="email-feedback" class="mt-1 text-xs">
                    <span th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"
                          class="text-danger"></span>
                </div>
            </div>

            <!-- 닉네임 -->
            <div>
                <label for="nickname" class="field-label" th:text="#{view.register.nickname}">
                    닉네임
                </label>
                <input type="text" id="nickname" th:field="*{nickname}"
                       th:classappend="${#fields.hasErrors('nickname')} ? 'is-invalid'"
                       class="field-input h-11"
                       th:placeholder="#{view.register.nicknamePlaceholder}"
                       placeholder="표시될 이름 2~20자"
                       autocomplete="nickname">
                <span th:if="${#fields.hasErrors('nickname')}"
                      th:errors="*{nickname}"
                      class="field-error"></span>
            </div>

            <!-- 비밀번호 -->
            <div>
                <label for="password" class="field-label" th:text="#{view.register.password}">
                    비밀번호
                </label>
                <input type="password" id="password" th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                       class="field-input h-11"
                       th:placeholder="#{view.register.passwordPlaceholder}"
                       placeholder="8자 이상"
                       autocomplete="new-password">
                <span th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"
                      class="field-error"></span>
            </div>

            <!-- 비밀번호 확인 -->
            <div>
                <label for="passwordConfirm" class="field-label" th:text="#{view.register.passwordConfirm}">
                    비밀번호 확인
                </label>
                <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}"
                       th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'is-invalid'"
                       class="field-input h-11"
                       autocomplete="new-password">
                <span th:if="${#fields.hasErrors('passwordConfirm')}"
                      th:errors="*{passwordConfirm}"
                      class="field-error"></span>
            </div>

            <button type="submit"
                    class="btn-primary h-12 w-full text-[15px] font-bold"
                    th:text="#{view.register.button}">
                가입하기
            </button>

        </form>
    </div>
</main>

</body>
</html>
