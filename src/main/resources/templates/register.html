<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.register.title}">회원가입 · SeuStock</title>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="flex flex-1 items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

        <h1 class="mb-6 text-2xl font-bold text-slate-800" th:text="#{view.register.header}">회원가입</h1>

        <!-- 가입 완료 메시지 -->
        <div th:if="${success}"
             class="mb-5 rounded-md bg-green-50 border border-green-200 px-4 py-3 text-sm text-green-700"
             th:text="#{view.register.success}">
            회원가입이 완료되었습니다.
        </div>

        <form th:action="@{/register}" th:object="${form}" method="post" class="space-y-4">

            <!-- 이메일 -->
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1" th:text="#{view.register.email}">
                    이메일
                </label>
                <input type="email" id="email" th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'border-red-400 focus:ring-red-400'"
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                              transition"
                       th:placeholder="#{view.register.emailPlaceholder}"
                       placeholder="example@email.com"
                       hx-get="/register/check-email"
                       hx-trigger="input changed delay:400ms"
                       hx-target="#email-feedback"
                       hx-include="[name='email']"
                       autocomplete="email">
                <div id="email-feedback" class="mt-1 text-xs">
                    <span th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"
                          class="text-red-500"></span>
                </div>
            </div>

            <!-- 닉네임 -->
            <div>
                <label for="nickname" class="block text-sm font-medium text-slate-700 mb-1" th:text="#{view.register.nickname}">
                    닉네임
                </label>
                <input type="text" id="nickname" th:field="*{nickname}"
                       th:classappend="${#fields.hasErrors('nickname')} ? 'border-red-400 focus:ring-red-400'"
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                              transition"
                       th:placeholder="#{view.register.nicknamePlaceholder}"
                       placeholder="표시될 이름 2~20자"
                       autocomplete="nickname">
                <span th:if="${#fields.hasErrors('nickname')}"
                      th:errors="*{nickname}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <!-- 비밀번호 -->
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1" th:text="#{view.register.password}">
                    비밀번호
                </label>
                <input type="password" id="password" th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? 'border-red-400 focus:ring-red-400'"
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                              transition"
                       th:placeholder="#{view.register.passwordPlaceholder}"
                       placeholder="8자 이상"
                       autocomplete="new-password">
                <span th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <!-- 비밀번호 확인 -->
            <div>
                <label for="passwordConfirm" class="block text-sm font-medium text-slate-700 mb-1" th:text="#{view.register.passwordConfirm}">
                    비밀번호 확인
                </label>
                <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}"
                       th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'border-red-400 focus:ring-red-400'"
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                              transition"
                       autocomplete="new-password">
                <span th:if="${#fields.hasErrors('passwordConfirm')}"
                      th:errors="*{passwordConfirm}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <button type="submit"
                    class="w-full rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white
                           hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500
                           focus:ring-offset-2 transition"
                    th:text="#{view.register.button}">
                가입하기
            </button>

        </form>
    </div>
</main>

</body>
</html>
