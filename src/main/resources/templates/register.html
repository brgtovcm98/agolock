<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.register.title}">회원가입 · SeuStock</title>
</head>
<body class="ui-page ui-min-h-screen ui-bg-slate-50 ui-flex ui-flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="ui-page-main ui-flex ui-flex-1 ui-items-center ui-justify-center ui-px-4 py-12">
    <div class="ui-card ui-w-full ui-max-w-sm ui-p-6">

        <h1 class="ui-page-title ui-mb-6 ui-text-2xl ui-font-bold ui-text-slate-800" th:text="#{view.register.header}">회원가입</h1>

        <!-- 가입 완료 메시지 -->
        <div th:if="${success}"
             class="mb-5 ui-rounded-md ui-bg-green-50 ui-border ui-border-green-200 ui-px-4 ui-py-3 ui-text-sm ui-text-green-700"
             th:text="#{view.register.success}">
            회원가입이 완료되었습니다.
        </div>

        <form th:action="@{/register}" th:object="${form}" method="post" class="ui-space-y-4">

            <!-- 이메일 -->
            <div>
                <label for="email" class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1" th:text="#{view.register.email}">
                    이메일
                </label>
                <input type="email" id="email" th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'ui-border-red-400 ui-focus-ring-red-400'"
                       class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500
                              ui-transition"
                       th:placeholder="#{view.register.emailPlaceholder}"
                       placeholder="example@email.com"
                       hx-get="/register/check-email"
                       hx-trigger="input changed delay:400ms"
                       hx-target="#email-feedback"
                       hx-include="[name='email']"
                       autocomplete="email">
                <div id="email-feedback" class="ui-mt-1 ui-text-xs">
                    <span th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"
                          class="ui-text-red-500"></span>
                </div>
            </div>

            <!-- 닉네임 -->
            <div>
                <label for="nickname" class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1" th:text="#{view.register.nickname}">
                    닉네임
                </label>
                <input type="text" id="nickname" th:field="*{nickname}"
                       th:classappend="${#fields.hasErrors('nickname')} ? 'ui-border-red-400 ui-focus-ring-red-400'"
                       class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500
                              ui-transition"
                       th:placeholder="#{view.register.nicknamePlaceholder}"
                       placeholder="표시될 이름 2~20자"
                       autocomplete="nickname">
                <span th:if="${#fields.hasErrors('nickname')}"
                      th:errors="*{nickname}"
                      class="ui-mt-1 ui-block ui-text-xs ui-text-red-500"></span>
            </div>

            <!-- 비밀번호 -->
            <div>
                <label for="password" class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1" th:text="#{view.register.password}">
                    비밀번호
                </label>
                <input type="password" id="password" th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? 'ui-border-red-400 ui-focus-ring-red-400'"
                       class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500
                              ui-transition"
                       th:placeholder="#{view.register.passwordPlaceholder}"
                       placeholder="8자 이상"
                       autocomplete="new-password">
                <span th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"
                      class="ui-mt-1 ui-block ui-text-xs ui-text-red-500"></span>
            </div>

            <!-- 비밀번호 확인 -->
            <div>
                <label for="passwordConfirm" class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1" th:text="#{view.register.passwordConfirm}">
                    비밀번호 확인
                </label>
                <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}"
                       th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'ui-border-red-400 ui-focus-ring-red-400'"
                       class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500
                              ui-transition"
                       autocomplete="new-password">
                <span th:if="${#fields.hasErrors('passwordConfirm')}"
                      th:errors="*{passwordConfirm}"
                      class="ui-mt-1 ui-block ui-text-xs ui-text-red-500"></span>
            </div>

            <button type="submit"
                    class="ui-w-full ui-rounded-md ui-bg-blue-600 ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-white
                           ui-hover-bg-blue-700 ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500
                           focus:ring-offset-2 ui-transition"
                    th:text="#{view.register.button}">
                가입하기
            </button>

        </form>
    </div>
</main>

</body>
</html>
