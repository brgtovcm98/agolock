<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal" data-component-id="boxes.modal.create" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="modal-overlay fixed inset-0 z-50 flex items-center justify-center">
    <div class="modal-dialog max-w-sm mx-4 p-6 max-h-[90vh] overflow-y-auto flex flex-col">

        <h2 id="modal-title" class="text-lg font-semibold text-slate-800 mb-4" th:text="#{view.box.modal.add.title}">박스 추가</h2>

        <form th:object="${form}"
              method="post"
              th:attr="hx-post=@{/shelves/{id}/boxes(id=${shelf})}"
              hx-target="#modal"
              hx-swap="outerHTML">

            <input type="hidden" name="spaceExternalId" th:value="${space}">

            <div class="mb-4">
                <label class="field-label" th:text="#{view.box.form.name.label}">박스 이름</label>
                <input type="text" th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'border-red-400'"
                       class="field-input
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                       th:placeholder="#{view.box.form.name.placeholder}" autofocus>
                <span th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <div class="flex gap-2 justify-end">
                <button type="button"
                        hx-get="/empty"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="rounded-lg border border-slate-300 px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 transition"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 transition"
                        th:text="#{view.common.add}">
                    추가
                </button>
            </div>
        </form>
    </div>
</div>


<div th:fragment="edit-modal"
     id="modal"
     data-component-id="boxes.modal.edit"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 p-6 max-h-[90vh] overflow-y-auto flex flex-col">

        <h2 class="text-lg font-semibold text-slate-800 mb-4" th:text="#{view.box.modal.edit.title}">박스 이름 수정</h2>

        <form th:object="${form}"
              method="post"
              th:attr="hx-patch=@{/spaces/{sid}/shelves/{shid}/boxes/{id}(sid=${space},shid=${shelf},id=${box})}"
              hx-target="#modal"
              hx-swap="outerHTML">

            <div class="mb-4">
                <label class="field-label" th:text="#{view.box.form.name.label}">박스 이름</label>
                <input type="text" th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'border-red-400'"
                       class="field-input
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                       th:placeholder="#{view.box.form.name.placeholder}" autofocus>
                <span th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <div class="flex gap-2 justify-end">
                <button type="button"
                        hx-get="/empty"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="rounded-lg border border-slate-300 px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 transition"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 transition"
                        th:text="#{view.common.save}">
                    저장
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
