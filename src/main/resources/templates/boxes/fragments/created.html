<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 새 박스 행 -->
<li th:fragment="created"
    th:id="'box-' + ${box.externalId}"
    class="ui-flex ui-items-center ui-gap-1 ui-px-3 ui-py-1-5 ui-hover-bg-slate-50 ui-transition ui-cursor-pointer group">

    <span class="ui-text-xs ui-text-slate-300 w-3">□</span>

    <button type="button"
            class="ui-flex-1 ui-text-left ui-text-sm ui-text-slate-600 ui-truncate"
            th:text="${box.name}"
            th:attr="hx-get=@{/spaces/{sid}/shelves/{shid}/boxes/{id}/stocks(sid=${space},shid=${shelf},id=${box.externalId})}"
            hx-target="#stock-panel"
            hx-swap="outerHTML"></button>

    <span class="ui-hidden group-hover:flex ui-items-center ui-gap-1 ui-shrink-0">
    <button type="button"
            class="ui-inline-flex ui-h-6 ui-w-6 ui-items-center ui-justify-center rounded ui-text-xs ui-text-blue-500 ui-hover-text-blue-700"
            th:attr="hx-get=@{/stocks/new(spaceId=${space},shelfId=${shelf},boxId=${box.externalId})}"
            hx-target="#modal"
            hx-swap="outerHTML"
            th:title="#{view.box.created.addStock}">📦</button>

    <button type="button"
            class="ui-inline-flex ui-h-6 ui-w-6 ui-items-center ui-justify-center rounded ui-text-xs ui-text-red-400 ui-hover-text-red-600"
            th:attr="hx-delete=@{/spaces/{sid}/shelves/{shid}/boxes/{id}(sid=${space},shid=${shelf},id=${box.externalId})},
                     hx-confirm=#{view.box.created.deleteConfirm},
                     hx-target='#box-list-' + ${shelf}"
            hx-swap="outerHTML"
            th:title="#{view.box.created.delete}">×</button>
    </span>
</li>

<!-- OOB: 모달 닫기 -->
<div id="modal" hx-swap-oob="true"></div>

</body>
</html>
