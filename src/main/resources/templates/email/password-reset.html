<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{mail.passwordReset.subject}">[SeuStock] 비밀번호 재설정 안내</title>
</head>
<body style="margin:0; padding:0; background-color:#f8fafc;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
           style="background-color:#f8fafc; padding:32px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
                       style="max-width:480px; background-color:#ffffff; border:1px solid #e2e8f0;
                              border-radius:8px; overflow:hidden;">
                    <tr>
                        <td style="padding:32px;">
                            <h1 style="margin:0 0 24px; font-size:20px; font-weight:bold; color:#1e293b;
                                       font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;"
                                th:text="#{mail.passwordReset.heading}">비밀번호 재설정</h1>

                            <p style="margin:0 0 24px; font-size:14px; line-height:1.6; color:#475569;
                                      font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;"
                               th:text="#{mail.passwordReset.guide}">
                                아래 버튼을 눌러 새 비밀번호를 설정해주세요.
                            </p>

                            <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
                                <tr>
                                    <td style="border-radius:6px; background-color:#2563eb;">
                                        <a th:href="${resetUrl}" href="#"
                                           style="display:inline-block; padding:12px 24px; font-size:14px;
                                                  font-weight:bold; color:#ffffff; text-decoration:none;
                                                  font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;"
                                           th:text="#{mail.passwordReset.button}">비밀번호 재설정하기</a>
                                    </td>
                                </tr>
                            </table>

                            <p style="margin:0 0 8px; font-size:12px; line-height:1.6; color:#94a3b8;
                                      font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;"
                               th:text="#{mail.passwordReset.expiry}">
                                이 링크는 30분 동안만 유효합니다.
                            </p>
                            <p style="margin:0 0 16px; font-size:12px; line-height:1.6; color:#94a3b8;
                                      font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;"
                               th:text="#{mail.passwordReset.ignore}">
                                본인이 요청하지 않았다면 이 메일을 무시하셔도 됩니다.
                            </p>

                            <p style="margin:0; font-size:11px; line-height:1.6; color:#cbd5e1; word-break:break-all;
                                      font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;"
                               th:text="${resetUrl}">https://example.com/password/reset?token=...</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:16px 32px; background-color:#f1f5f9; text-align:center;">
                            <span style="font-size:11px; color:#94a3b8;
                                         font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;">SeuStock</span>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
