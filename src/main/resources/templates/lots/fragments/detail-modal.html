<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     th:if="${lotSerialEnabled}"
     id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="ui-modal-overlay ui-fixed ui-inset-0 ui-z-50 ui-flex ui-items-center ui-justify-center ui-bg-black-40">
    <div class="ui-modal-dialog ui-bg-white ui-rounded-xl ui-shadow-xl ui-w-full max-w-lg ui-mx-4 ui-p-6 ui-max-h-90vh ui-overflow-y-auto">
        <div class="ui-mb-4 ui-flex ui-items-start ui-justify-between ui-gap-3">
            <div>
                <h2 id="modal-title" class="ui-text-lg ui-font-semibold ui-text-slate-800" th:text="#{view.lot.detail.title}">로트 상세</h2>
                <p class="ui-mt-1 ui-text-sm ui-text-slate-500">
                    <span th:text="${lot.itemName}">품목</span>
                    <span class="ui-text-slate-300"> / </span>
                    <span th:text="${lot.lotNumber}">LOT</span>
                </p>
            </div>
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-1-5 ui-text-sm ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                    th:text="#{view.common.close}">
                닫기
            </button>
        </div>

        <div class="ui-mb-4 ui-grid ui-gap-2 ui-rounded-md ui-bg-slate-50 p-3 ui-text-sm ui-text-slate-600 sm:grid-cols-2">
            <p>
                <span class="ui-text-xs ui-text-slate-400" th:text="#{view.stock.form.lot.label}">로트 번호</span><br>
                <span class="ui-font-medium ui-text-slate-800" th:text="${lot.lotNumber}">LOT-001</span>
            </p>
            <p>
                <span class="ui-text-xs ui-text-slate-400" th:text="#{view.stock.form.expiration.label}">유통기한</span><br>
                <span class="ui-font-medium ui-text-slate-800"
                      th:text="${lot.expirationDate != null ? #temporals.format(lot.expirationDate, 'yyyy-MM-dd') : '-'}">-</span>
            </p>
        </div>

        <div class="ui-overflow-hidden ui-rounded-lg ui-border ui-border-slate-200">
            <div class="ui-grid grid-cols-[minmax(0,1fr)_7rem] ui-gap-2 ui-bg-slate-50 ui-px-3 ui-py-2 ui-text-xs ui-font-semibold ui-text-slate-500">
                <div th:text="#{view.stock.form.serial.label}">시리얼 번호</div>
                <div th:text="#{view.stock.table.status}">상태</div>
            </div>
            <p th:if="${units.empty}" class="ui-px-3 ui-py-8 ui-text-center ui-text-sm ui-text-slate-400"
               th:text="#{view.lot.detail.empty}">이 로트에 연결된 재고가 없습니다.</p>
            <div th:if="${!units.empty}" class="ui-divide-y ui-divide-slate-100">
                <div th:each="unit : ${units}"
                     class="ui-grid grid-cols-[minmax(0,1fr)_7rem] ui-gap-2 ui-px-3 ui-py-2 ui-text-sm">
                    <div class="ui-min-w-0">
                        <a th:href="@{/stocks(keyword=${unit.serialNumber})}"
                           class="ui-truncate ui-font-medium ui-text-blue-700 ui-hover-underline"
                           th:text="${unit.serialNumber != null and !unit.serialNumber.isBlank()} ? ${unit.serialNumber} : '-'">SN</a>
                        <p class="ui-truncate ui-text-xs ui-text-slate-400">
                            <span th:text="${unit.spaceName}">공간</span>
                            <th:block th:if="${unit.shelfName != null}">
                                <span> / </span><span th:text="${unit.shelfName}">선반</span>
                            </th:block>
                            <th:block th:if="${unit.boxName != null}">
                                <span> / </span><span th:text="${unit.boxName}">박스</span>
                            </th:block>
                        </p>
                    </div>
                    <div>
                        <span class="ui-inline-flex ui-rounded-full ui-bg-blue-50 ui-px-2 ui-py-0-5 ui-text-xs ui-font-semibold ui-text-blue-700"
                              th:text="#{${'enum.StockStatus.' + unit.status.name()}}">재고중</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
