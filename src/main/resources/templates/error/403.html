<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.error.403.title}">접근 권한 없음 - SeuStock</title>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
<nav th:replace="~{fragments/layout :: nav}"></nav>
<main class="mx-auto max-w-5xl px-4 py-16 text-center flex-1">
    <p class="text-5xl font-bold text-slate-300 mb-4">403</p>
    <h1 class="text-xl font-semibold text-slate-700 mb-2" th:text="#{view.error.403.header}">접근 권한이 없습니다</h1>
    <p class="text-slate-500 mb-8" th:text="${errorMessage} ?: #{view.error.403.defaultMessage}">이 리소스에 접근할 수 없습니다.</p>
    <a href="javascript:history.back()" class="text-blue-600 hover:underline" th:text="#{view.error.back}">돌아가기</a>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
