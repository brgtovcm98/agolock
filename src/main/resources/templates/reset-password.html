<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.reset.title}">비밀번호 변경 · SeuStock</title>
</head>
<body class="ui-page ui-min-h-screen ui-bg-slate-50 ui-flex ui-flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="ui-page-main ui-flex ui-flex-1 ui-items-center ui-justify-center ui-px-4 py-12">
    <div class="ui-card ui-w-full ui-max-w-sm ui-p-6">

        <h1 class="ui-page-title ui-mb-6 ui-text-2xl ui-font-bold ui-text-slate-800" th:text="#{view.reset.header}">비밀번호 변경</h1>

        <!-- 유효하지 않거나 만료된 링크 -->
        <div th:unless="${valid}">
            <div class="mb-5 ui-rounded-md ui-bg-red-50 ui-border ui-border-red-200 ui-px-4 ui-py-3 ui-text-sm ui-text-red-600"
                 th:text="#{view.reset.invalid}">
                링크가 만료되었거나 유효하지 않습니다.
            </div>
            <p class="ui-text-center ui-text-sm ui-text-slate-500">
                <a href="/password/forgot" class="ui-font-medium ui-text-blue-600 ui-hover-text-blue-700" th:text="#{view.reset.requestAgain}">다시 요청하기</a>
            </p>
        </div>

        <!-- 새 비밀번호 설정 -->
        <form th:if="${valid}" th:action="@{/password/reset}" th:object="${form}" method="post" class="ui-space-y-4">

            <input type="ui-hidden" th:field="*{token}">

            <div>
                <label for="password" class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1" th:text="#{view.reset.password}">
                    새 비밀번호
                </label>
                <input type="password" id="password" th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? 'ui-border-red-400 ui-focus-ring-red-400'"
                       class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500
                              ui-transition"
                       th:placeholder="#{view.reset.passwordPlaceholder}"
                       placeholder="8자 이상"
                       autocomplete="new-password">
                <span th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"
                      class="ui-mt-1 ui-block ui-text-xs ui-text-red-500"></span>
            </div>

            <div>
                <label for="passwordConfirm" class="ui-block ui-text-sm ui-font-medium ui-text-slate-700 ui-mb-1" th:text="#{view.reset.passwordConfirm}">
                    새 비밀번호 확인
                </label>
                <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}"
                       th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'ui-border-red-400 ui-focus-ring-red-400'"
                       class="ui-w-full ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-2 ui-text-sm
                              ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500
                              ui-transition"
                       autocomplete="new-password">
                <span th:if="${#fields.hasErrors('passwordConfirm')}"
                      th:errors="*{passwordConfirm}"
                      class="ui-mt-1 ui-block ui-text-xs ui-text-red-500"></span>
            </div>

            <button type="submit"
                    class="ui-w-full ui-rounded-md ui-bg-blue-600 ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-white
                           ui-hover-bg-blue-700 ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500
                           focus:ring-offset-2 ui-transition"
                    th:text="#{view.reset.button}">
                비밀번호 변경
            </button>

        </form>

    </div>
</main>

</body>
</html>
