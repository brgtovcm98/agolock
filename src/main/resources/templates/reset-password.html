<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.reset.title}">비밀번호 변경 · SeuStock</title>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="flex flex-1 items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

        <h1 class="mb-6 text-2xl font-bold text-slate-800" th:text="#{view.reset.header}">비밀번호 변경</h1>

        <!-- 유효하지 않거나 만료된 링크 -->
        <div th:unless="${valid}">
            <div class="mb-5 rounded-md bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-600"
                 th:text="#{view.reset.invalid}">
                링크가 만료되었거나 유효하지 않습니다.
            </div>
            <p class="text-center text-sm text-slate-500">
                <a href="/password/forgot" class="font-medium text-blue-600 hover:text-blue-700" th:text="#{view.reset.requestAgain}">다시 요청하기</a>
            </p>
        </div>

        <!-- 새 비밀번호 설정 -->
        <form th:if="${valid}" th:action="@{/password/reset}" th:object="${form}" method="post" class="space-y-4">

            <input type="hidden" th:field="*{token}">

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1" th:text="#{view.reset.password}">
                    새 비밀번호
                </label>
                <input type="password" id="password" th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? 'border-red-400 focus:ring-red-400'"
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                              transition"
                       th:placeholder="#{view.reset.passwordPlaceholder}"
                       placeholder="8자 이상"
                       autocomplete="new-password">
                <span th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <div>
                <label for="passwordConfirm" class="block text-sm font-medium text-slate-700 mb-1" th:text="#{view.reset.passwordConfirm}">
                    새 비밀번호 확인
                </label>
                <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}"
                       th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'border-red-400 focus:ring-red-400'"
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                              transition"
                       autocomplete="new-password">
                <span th:if="${#fields.hasErrors('passwordConfirm')}"
                      th:errors="*{passwordConfirm}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <button type="submit"
                    class="w-full rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white
                           hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500
                           focus:ring-offset-2 transition"
                    th:text="#{view.reset.button}">
                비밀번호 변경
            </button>

        </form>

    </div>
</main>

</body>
</html>
