<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.reset.title}">비밀번호 변경 · SeuStock</title>
</head>
<body class="page min-h-screen bg-surface-dim flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main data-component-id="page.reset-password" class="page-main flex flex-1 items-center justify-center px-4 py-12">
    <div data-component-id="reset-password.card" class="card w-full max-w-sm p-6">

        <h1 class="page-title mb-6" th:text="#{view.reset.header}">비밀번호 변경</h1>

        <!-- 유효하지 않거나 만료된 링크 -->
        <div th:unless="${valid}">
            <div class="alert-error"
                 th:text="#{view.reset.invalid}">
                링크가 만료되었거나 유효하지 않습니다.
            </div>
            <p class="text-center text-sm text-muted">
                <a href="/password/forgot" class="link" th:text="#{view.reset.requestAgain}">다시 요청하기</a>
            </p>
        </div>

        <!-- 새 비밀번호 설정 -->
        <form data-component-id="reset-password.form" th:if="${valid}" th:action="@{/password/reset}" th:object="${form}" method="post" class="space-y-4">

            <input type="hidden" th:field="*{token}">

            <div>
                <label for="password" class="field-label" th:text="#{view.reset.password}">
                    새 비밀번호
                </label>
                <input type="password" id="password" th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                       class="field-input"
                       th:placeholder="#{view.reset.passwordPlaceholder}"
                       placeholder="8자 이상"
                       autocomplete="new-password">
                <span th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"
                      class="field-error"></span>
            </div>

            <div>
                <label for="passwordConfirm" class="field-label" th:text="#{view.reset.passwordConfirm}">
                    새 비밀번호 확인
                </label>
                <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}"
                       th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'is-invalid'"
                       class="field-input"
                       autocomplete="new-password">
                <span th:if="${#fields.hasErrors('passwordConfirm')}"
                      th:errors="*{passwordConfirm}"
                      class="field-error"></span>
            </div>

            <button type="submit"
                    class="btn-primary w-full text-sm"
                    th:text="#{view.reset.button}">
                비밀번호 변경
            </button>

        </form>

    </div>
</main>

</body>
</html>
