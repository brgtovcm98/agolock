<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- ── 공간 선택 (legacy) ── -->
<div th:fragment="space-list"
     id="modal" data-component-id="items.modal.add-stock-space" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="modal-overlay fixed inset-0 z-50 flex items-center justify-center">
    <div class="modal-dialog max-w-sm mx-4 p-6 flex flex-col gap-4">

        <div class="flex items-center justify-between">
            <h2 id="modal-title" class="modal-title">
                <span th:text="#{view.item.addStock.title(${item.name})}">재고 추가</span>
            </h2>
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="text-slate-400 hover:text-slate-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="flex items-center gap-3 rounded-lg bg-slate-50 px-3 py-2">
            <img th:if="${item.primaryImageExternalId != null}"
                 th:src="@{/images/{id}(id=${item.primaryImageExternalId})}"
                 alt="" class="h-10 w-10 rounded-lg object-cover border border-slate-200">
            <span th:unless="${item.primaryImageExternalId != null}"
                  class="h-10 w-10 rounded-lg border border-slate-200 bg-slate-100 flex items-center justify-center text-slate-400 text-xs">No img</span>
            <span class="text-sm font-medium text-slate-800" th:text="${item.name}">품목명</span>
        </div>

        <p class="text-sm text-slate-500" th:text="#{view.item.addStock.selectSpace}">재고를 추가할 공간을 선택하세요.</p>

        <div th:if="${spaces.empty}" class="rounded-lg bg-amber-50 border border-amber-200 px-4 py-3 text-sm text-amber-700"
             th:text="#{view.item.addStock.noSpace}">
            등록된 공간이 없습니다. 먼저 공간을 등록해주세요.
        </div>

        <div th:unless="${spaces.empty}" class="divide-y divide-slate-100 border border-slate-200 rounded-lg max-h-56 overflow-y-auto">
            <button th:each="space : ${spaces}"
                    th:attr="hx-get=@{/items/{id}/add-stock(id=${item.externalId},spaceId=${space.externalId})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="flex items-center justify-between w-full px-4 py-3 text-left hover:bg-slate-50 transition">
                <span class="text-sm font-medium text-slate-800" th:text="${space.name}">공간명</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
                </svg>
            </button>
        </div>

        <div th:if="${spaces.empty}" class="flex justify-end">
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="btn-secondary"
                    th:text="#{view.common.close}">닫기</button>
        </div>

    </div>
</div>

<!-- ── 선반 선택 (legacy) ── -->
<div th:fragment="shelf-list"
     id="modal" data-component-id="items.modal.add-stock-shelf" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="modal-overlay fixed inset-0 z-50 flex items-center justify-center">
    <div class="modal-dialog max-w-sm mx-4 p-6 flex flex-col gap-4">

        <div class="flex items-center justify-between">
            <h2 id="modal-title" class="modal-title">
                <span th:text="#{view.item.addStock.title(${item.name})}">재고 추가</span>
            </h2>
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="text-slate-400 hover:text-slate-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <p class="text-sm text-slate-500" th:text="#{view.item.addStock.selectShelf}">선반을 선택하세요.</p>

        <button th:attr="hx-get=@{/items/{id}/add-stock(id=${item.externalId},spaceId=${spaceId},direct=true)}"
                hx-target="#modal"
                hx-swap="outerHTML"
                class="flex items-center justify-between w-full px-4 py-3 text-left rounded-lg border border-slate-200 hover:bg-slate-50 transition">
            <span class="text-sm text-slate-500" th:text="#{view.item.addStock.spaceRoot}">공간 루트 (선반 없이 추가)</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
        </button>

        <div th:if="${shelves.empty}" class="text-sm text-slate-400 text-center py-4"
             th:text="#{view.item.addStock.noShelf}">
            등록된 선반이 없습니다.
        </div>

        <div th:unless="${shelves.empty}" class="divide-y divide-slate-100 border border-slate-200 rounded-lg max-h-56 overflow-y-auto">
            <button th:each="shelf : ${shelves}"
                    th:attr="hx-get=@{/items/{id}/add-stock(id=${item.externalId},spaceId=${spaceId},shelfId=${shelf.externalId})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="flex items-center justify-between w-full px-4 py-3 text-left hover:bg-slate-50 transition">
                <span class="text-sm font-medium text-slate-800" th:text="${shelf.name}">선반명</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
                </svg>
            </button>
        </div>

        <div class="flex justify-between border-t border-slate-100 pt-2">
            <button type="button"
                    th:attr="hx-get=@{/items/{id}/add-stock(id=${item.externalId})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="text-sm text-slate-500 hover:text-slate-700 transition"
                    th:text="#{view.common.back}">← 뒤로</button>
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="btn-secondary"
                    th:text="#{view.common.close}">닫기</button>
        </div>

    </div>
</div>

<!-- ════════════════════════════════════════════ -->
<!-- ── 통합 재고 등록 폼 ── -->
<!-- ════════════════════════════════════════════ -->
<div th:fragment="unified-form"
     id="modal" data-component-id="items.modal.add-stock-form" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="modal-overlay fixed inset-0 z-50 flex items-center justify-center">
    <div class="modal-dialog max-w-sm mx-4 p-4 flex flex-col gap-3"
         th:object="${form}">

        <style>
            .radio-pill:has(> input:checked) {
                background-color: #eff6ff;
                border-color: #93c5fd;
                color: #1d4ed8;
            }
            .radio-pill:has(> input:checked) .radio-dot {
                display: inline-block !important;
            }
        </style>

        <div class="flex items-center justify-between">
            <h2 id="modal-title" class="modal-title">
                <span th:text="#{view.item.addStock.title(${item.name})}">재고 추가</span>
            </h2>
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="text-slate-400 hover:text-slate-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="flex items-center gap-3 rounded-lg bg-slate-50 px-3 py-2">
            <img th:if="${item.primaryImageExternalId != null}"
                 th:src="@{/images/{id}(id=${item.primaryImageExternalId})}"
                 alt="" class="h-10 w-10 rounded-lg object-cover border border-slate-200">
            <span th:unless="${item.primaryImageExternalId != null}"
                  class="h-10 w-10 rounded-lg border border-slate-200 bg-slate-100 flex items-center justify-center text-slate-400 text-xs">No img</span>
            <span class="text-sm font-medium text-slate-800" th:text="${item.name}">품목명</span>
        </div>

        <!-- ── 공간 선택 ── -->
        <div th:if="${spaces != null && !spaces.empty}">
            <p class="text-xs font-medium text-slate-500 mb-1.5" th:text="#{view.item.addStock.selectSpace}">공간 선택</p>
            <div class="overflow-x-auto whitespace-nowrap flex gap-2 pb-1">
                <label th:each="space : ${spaces}"
                       class="radio-pill inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-slate-200 text-sm text-slate-600 cursor-pointer select-none transition hover:bg-slate-50 flex-shrink-0">
                    <input type="radio" name="spaceExternalId" th:value="${space.externalId}" class="sr-only" form="stock-form"
                           th:checked="${form != null and form.spaceExternalId != null and form.spaceExternalId == space.externalId}"
                           th:attr="hx-get=@{/items/{id}/add-stock(id=${item.externalId},spaceId=${space.externalId})}"
                           hx-target="#shelf-radio-area"
                           hx-swap="innerHTML"
                           hx-trigger="change">
                    <span class="radio-dot w-2 h-2 rounded-full bg-current" style="display:none"></span>
                    <span th:text="${space.name}">공간명</span>
                </label>
            </div>
            <span th:if="${#fields.hasErrors('spaceExternalId')}"
                  th:errors="*{spaceExternalId}"
                  class="field-error"></span>
        </div>
        <div th:if="${spaces == null || spaces.empty}" class="rounded-lg bg-amber-50 border border-amber-200 px-3 py-2 text-xs text-amber-700"
             th:text="#{view.item.addStock.noSpace}">
            등록된 공간이 없습니다.
        </div>

        <!-- ── 선반 영역 (선택 해제 가능) ── -->
        <div id="shelf-radio-area">
            <th:block th:if="${shelves != null and !shelves.empty}">
                <p class="text-xs font-medium text-slate-500 mb-1.5" th:text="#{view.item.addStock.selectShelf}">선반 선택</p>
                <div class="overflow-x-auto whitespace-nowrap flex gap-2 pb-1">
                    <label th:each="shelf : ${shelves}"
                           class="radio-pill inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-slate-200 text-sm text-slate-600 cursor-pointer select-none transition hover:bg-slate-50 flex-shrink-0">
                        <input type="radio" name="shelfExternalId" th:value="${shelf.externalId}" class="sr-only" form="stock-form"
                               data-deselectable data-clears-target="#box-radio-area"
                               th:checked="${form != null and form.shelfExternalId != null and form.shelfExternalId == shelf.externalId}"
                               th:attr="hx-get=@{/items/{id}/add-stock(id=${item.externalId},spaceId=${spaceId},shelfId=${shelf.externalId})}"
                               hx-target="#box-radio-area"
                               hx-swap="innerHTML"
                               hx-trigger="change">
                        <span class="radio-dot w-2 h-2 rounded-full bg-current" style="display:none"></span>
                        <span th:text="${shelf.name}">선반명</span>
                    </label>
                </div>
            </th:block>
            <p th:if="${shelves != null and shelves.empty}"
               class="text-xs text-slate-400 py-2"
               th:text="#{view.item.addStock.noShelf}">등록된 선반이 없습니다.</p>
        </div>

        <!-- ── 박스 영역 (선택 해제 가능) ── -->
        <div id="box-radio-area">
            <th:block th:if="${boxes != null and !boxes.empty}">
                <p class="text-xs font-medium text-slate-500 mb-1.5" th:text="#{view.item.addStock.selectBox}">박스 선택</p>
                <div class="overflow-x-auto whitespace-nowrap flex gap-2 pb-1">
                    <label th:each="box : ${boxes}"
                           class="radio-pill inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-slate-200 text-sm text-slate-600 cursor-pointer select-none transition hover:bg-slate-50 flex-shrink-0">
                        <input type="radio" name="boxExternalId" th:value="${box.externalId}" class="sr-only" form="stock-form"
                               data-deselectable
                               th:checked="${form != null and form.boxExternalId != null and form.boxExternalId == box.externalId}">
                        <span class="radio-dot w-2 h-2 rounded-full bg-current" style="display:none"></span>
                        <span th:text="${box.name}">박스명</span>
                    </label>
                </div>
            </th:block>
        </div>

        <form id="stock-form"
              method="post"
              th:action="@{/items/{id}/stocks(id=${item.externalId})}"
              hx-post="@{/items/{id}/stocks(id=${item.externalId})}"
              hx-target="#modal"
              hx-swap="outerHTML">

            <div class="mb-3">
                <label class="field-label" th:text="#{view.stock.form.count.label}">수량</label>
                <input type="number" th:field="*{count}" min="1" max="50"
                       class="field-input">
                <span th:if="${#fields.hasErrors('count')}"
                      th:errors="*{count}"
                      class="field-error"></span>
            </div>

            <div class="mb-3">
                <label class="field-label">
                    <span th:text="#{view.stock.form.price.label}">가격</span>
                    <span class="text-slate-400 font-normal" th:text="#{view.common.optional}">(선택)</span>
                </label>
                <input type="number" min="0" step="1" th:field="*{price}"
                       class="field-input"
                       th:placeholder="#{view.stock.form.price.placeholder}">
            </div>

            <div class="mb-4">
                <label class="field-label">
                    <span th:text="#{view.stock.form.expiration.label}">유통기한</span>
                    <span class="text-slate-400 font-normal" th:text="#{view.common.optional}">(선택)</span>
                </label>
                <input type="date" th:field="*{expirationDate}"
                       class="field-input">
            </div>

            <div class="flex gap-2 justify-between">
                <button type="button"
                        hx-get="/empty"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="text-sm text-slate-500 hover:text-slate-700 transition"
                        th:text="#{view.common.cancel}">취소</button>
                <button type="submit"
                        class="btn-primary"
                        th:text="#{view.common.add}">추가</button>
            </div>
        </form>

    </div>
</div>
<script th:inline="none">
(function () {
    var modal = document.getElementById('modal');
    if (!modal) return;
    /* mousedown fires before the browser updates checked state,
       so we can snapshot whether the radio was already checked. */
    modal.addEventListener('mousedown', function (e) {
        var r = e.target.closest('input[type="radio"][data-deselectable]');
        if (r) r._wasChecked = r.checked;
    }, true);
    /* On click, if the radio was already checked → uncheck it (deselect).
       Programmatic uncheck does NOT fire 'change', so HTMX won't re-request.
       We manually clear any dependent target instead. */
    modal.addEventListener('click', function (e) {
        var r = e.target.closest('input[type="radio"][data-deselectable]');
        if (!r || !r._wasChecked) return;
        r.checked = false;
        r._wasChecked = false;
        var targetSel = r.dataset.clearsTarget;
        if (targetSel) {
            var el = document.querySelector(targetSel);
            if (el) el.innerHTML = '';
        }
    }, true);
})();
</script>

<!-- ── 선반 응답 (HTMX 부분 응답) ── -->
<div th:fragment="shelf-oob">
    <th:block th:if="${shelves != null && !shelves.empty}">
        <p class="text-xs font-medium text-slate-500 mb-1.5" th:text="#{view.item.addStock.selectShelf}">선반 선택</p>
        <div class="overflow-x-auto whitespace-nowrap flex gap-2 pb-1">
            <label th:each="shelf : ${shelves}"
                   class="radio-pill inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-slate-200 text-sm text-slate-600 cursor-pointer select-none transition hover:bg-slate-50 flex-shrink-0">
                <input type="radio" name="shelfExternalId" th:value="${shelf.externalId}" class="sr-only" form="stock-form"
                       data-deselectable data-clears-target="#box-radio-area"
                       th:attr="hx-get=@{/items/{id}/add-stock(id=${item.externalId},spaceId=${spaceId},shelfId=${shelf.externalId})}"
                       hx-target="#box-radio-area"
                       hx-swap="innerHTML"
                       hx-trigger="change">
                <span class="radio-dot w-2 h-2 rounded-full bg-current" style="display:none"></span>
                <span th:text="${shelf.name}">선반명</span>
            </label>
        </div>
    </th:block>
    <p th:if="${shelves == null || shelves.empty}" class="text-xs text-slate-400 py-2"
       th:text="#{view.item.addStock.noShelf}">등록된 선반이 없습니다.</p>
    <div id="box-radio-area" hx-swap-oob="true"><!-- clear --></div>
</div>

<!-- ── 박스 응답 (HTMX 부분 응답) ── -->
<div th:fragment="box-oob">
    <th:block th:if="${boxes != null && !boxes.empty}">
        <p class="text-xs font-medium text-slate-500 mb-1.5" th:text="#{view.item.addStock.selectBox}">박스 선택</p>
        <div class="overflow-x-auto whitespace-nowrap flex gap-2 pb-1">
            <label th:each="box : ${boxes}"
                   class="radio-pill inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-slate-200 text-sm text-slate-600 cursor-pointer select-none transition hover:bg-slate-50 flex-shrink-0">
                <input type="radio" name="boxExternalId" th:value="${box.externalId}" class="sr-only" form="stock-form"
                       data-deselectable>
                <span class="radio-dot w-2 h-2 rounded-full bg-current" style="display:none"></span>
                <span th:text="${box.name}">박스명</span>
            </label>
        </div>
    </th:block>
</div>

<!-- ── 생성 완료 (OOB 응답) ── -->
<th:block th:fragment="created">
    <div id="modal" hx-swap-oob="true" data-component-id="items.modal-mount"></div>
    <div th:id="'item-' + ${item.externalId}" hx-swap-oob="outerHTML">
        <div th:replace="~{items/fragments/card :: view}"></div>
    </div>
</th:block>

</body>
</html>
