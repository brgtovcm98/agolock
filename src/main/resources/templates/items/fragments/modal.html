<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="modal-overlay fixed inset-0 z-50 flex items-center justify-center">
    <div class="modal-dialog max-w-sm mx-4 p-6 max-h-[90vh] overflow-y-auto flex flex-col">

        <h2 id="modal-title" class="text-lg font-semibold text-slate-800 mb-4" th:text="#{view.item.modal.add.title}">품목 추가</h2>

        <form th:object="${form}"
              method="post"
              enctype="multipart/form-data"
              hx-post="/items"
              hx-encoding="multipart/form-data"
              hx-target="#modal"
              hx-swap="outerHTML">

            <div class="mb-3">
                <label class="field-label">
                    <span th:text="#{view.item.modal.image.label}">사진</span> <span class="text-slate-400 font-normal" th:text="|#{view.common.optional}|">(선택)</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer w-full rounded-lg border border-dashed
                              border-slate-300 px-3 py-2 text-sm text-slate-500
                              hover:border-blue-400 hover:text-blue-500 transition"
                       id="item-modal-image-label">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    <span id="item-modal-image-label-text" th:text="#{view.item.modal.image.placeholder}">사진을 선택하세요</span>
                    <input type="file" th:field="*{imageFile}"
                           accept="image/jpeg,image/png,image/webp,image/gif"
                           class="sr-only">
                </label>
                <img id="item-modal-preview"
                     class="hidden mt-2 w-full aspect-square rounded-lg object-cover border border-slate-200"
                     th:alt="#{view.item.modal.image.previewAlt}">
                <span id="item-modal-analysis-status"
                      class="hidden mt-1 block text-xs text-blue-500" th:text="#{view.item.card.aiAnalyzing}">AI 분석 중...</span>
                <button type="button"
                        id="item-modal-analysis-retry-btn"
                        class="hidden mt-2 text-xs font-semibold text-blue-600 hover:text-blue-800 transition"
                        th:text="#{view.item.card.aiRetry}">
                    다시 분석
                </button>
            </div>

            <div class="mb-3">
                <label class="field-label" th:text="#{view.item.card.nameLabel}">품목명 *</label>
                <input type="text" th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'border-red-400'"
                       class="field-input"
                       th:placeholder="#{view.item.modal.namePlaceholder}">
                <span th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <div class="mb-4">
                <label class="field-label">
                    <span th:text="#{view.item.card.descLabel}">설명</span> <span class="text-slate-400 font-normal" th:text="|#{view.common.optional}|">(선택)</span>
                </label>
                <input type="text" th:field="*{description}"
                       th:classappend="${#fields.hasErrors('description')} ? 'border-red-400'"
                       class="field-input"
                       th:placeholder="#{view.item.card.descPlaceholder}">
                <span th:if="${#fields.hasErrors('description')}"
                      th:errors="*{description}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <div class="mb-4">
                <label class="field-label">
                    <span th:text="#{view.item.card.priceLabel}">가격</span> <span class="text-slate-400 font-normal" th:text="|#{view.common.optional}|">(선택)</span>
                </label>
                <input type="number" min="0" step="1" th:field="*{price}"
                       th:classappend="${#fields.hasErrors('price')} ? 'border-red-400'"
                       class="field-input"
                       th:placeholder="#{view.stock.form.price.placeholder}">
                <span th:if="${#fields.hasErrors('price')}"
                      th:errors="*{price}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <div class="mb-4">
                <label class="field-label">
                    <span th:text="#{view.item.policy.expirationDays}">유통기한(일)</span>
                </label>
                <input type="number" min="1" th:field="*{expirationPeriodDays}"
                       th:classappend="${#fields.hasErrors('expirationPeriodDays')} ? 'border-red-400'"
                       class="field-input"
                       th:placeholder="#{view.item.policy.expirationDays}">
                <span th:if="${#fields.hasErrors('expirationPeriodDays')}"
                      th:errors="*{expirationPeriodDays}"
                      class="mt-1 block text-xs text-red-500"></span>
                <p data-expiration-preview
                   th:data-label="#{view.item.policy.expirationPreview}"
                   class="hidden mt-2 rounded-lg bg-emerald-50 px-3 py-2 text-xs font-medium text-emerald-700"></p>
            </div>

            <details class="mb-4" th:if="${lotSerialEnabled}">
                <summary class="cursor-pointer text-sm font-semibold text-blue-600 hover:text-blue-800 transition" th:text="#{view.item.policy.section}">시리얼/로트 정책</summary>
                <div class="mt-3 space-y-3">
                    <div>
                        <label class="field-label field-label-sm" th:text="#{view.item.policy.serialMode}">시리얼 모드</label>
                        <select th:field="*{serialMode}"
                                class="field-input">
                            <option value="NONE" th:text="#{enum.TrackingMode.NONE}">없음</option>
                            <option value="AUTO" th:text="#{enum.TrackingMode.AUTO}">자동</option>
                            <option value="MANUAL" th:text="#{enum.TrackingMode.MANUAL}">수동</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <input type="text" th:field="*{serialPrefix}" th:placeholder="#{view.item.policy.serialPrefix}"
                               class="field-input">
                        <input type="number" min="0" max="16" th:field="*{serialPaddingLength}" th:placeholder="#{view.item.policy.serialPadding}"
                               class="field-input">
                        <input type="number" min="0" th:field="*{serialNextSequence}" th:placeholder="#{view.item.policy.serialNext}"
                               class="field-input">
                    </div>
                    <p data-serial-preview
                       th:data-label="#{view.item.policy.serialPreview}"
                       class="hidden rounded-lg bg-blue-50 px-3 py-2 text-xs font-medium text-blue-700"></p>
                    <input type="hidden" th:field="*{serialIncrementUnit}" value="1">

                    <div>
                        <label class="field-label field-label-sm" th:text="#{view.item.policy.lotMode}">로트 모드</label>
                        <select th:field="*{lotMode}"
                                class="field-input">
                            <option value="NONE" th:text="#{enum.TrackingMode.NONE}">없음</option>
                            <option value="AUTO" th:text="#{enum.TrackingMode.AUTO}">자동</option>
                            <option value="MANUAL" th:text="#{enum.TrackingMode.MANUAL}">수동</option>
                        </select>
                    </div>
                    <div>
                        <input type="text" th:field="*{lotVendorCode}" th:placeholder="#{view.item.policy.lotVendorCode}"
                               class="field-input">
                    </div>
                    <p data-lot-preview
                       th:data-label="#{view.item.policy.lotPreview}"
                       class="hidden rounded-lg bg-blue-50 px-3 py-2 text-xs font-medium text-blue-700"></p>
                    <input type="hidden" th:field="*{lotDateFormat}" value="yyyyMMdd">
                    <input type="hidden" th:field="*{lotIncludeSequence}" value="true">
                    <input type="hidden" th:field="*{lotNextSequence}" value="0">
                </div>
            </details>

            <input type="hidden" th:field="*{imageHash}" id="item-modal-image-hash">

            <div class="flex gap-2 justify-end">
                <button type="button"
                        hx-get="/empty"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="rounded-lg border border-slate-300 px-4 py-2 text-sm text-slate-600
                               hover:bg-slate-50 transition"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        id="item-modal-submit-btn"
                        class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white
                               hover:bg-blue-700 transition"
                        th:text="#{view.common.add}">
                    추가
                </button>
            </div>
        </form>
    </div>

    <script>
    var analyzeItemModalImage = createImageAnalysisHandler({
        fileInputSelector:        '#modal input[name="imageFile"]',
        nameInputSelector:        '#modal input[name="name"]',
        descriptionInputSelector: '#modal input[name="description"]',
        submitSelector:           '#item-modal-submit-btn',
        statusSelector:           '#item-modal-analysis-status',
        retryButtonSelector:      '#item-modal-analysis-retry-btn',
        fileLabelSelector:        '#item-modal-image-label'
    });

    initImageUpload({
        fileInputSelector:  '#modal input[name="imageFile"]',
        previewSelector:    '#item-modal-preview',
        hashInputSelector:  '#item-modal-image-hash',
        submitSelector:     '#item-modal-submit-btn',
        labelTextSelector:  '#item-modal-image-label-text',
        onImageReady: analyzeItemModalImage
    });

    </script>
    <script th:if="${lotSerialEnabled}">
    (function initTrackingModeToggles() {
        const modal = document.getElementById('modal');
        if (!modal) return;
        const serialMode = modal.querySelector('[name="serialMode"]');
        const serialPrefix = modal.querySelector('[name="serialPrefix"]');
        const serialPadding = modal.querySelector('[name="serialPaddingLength"]');
        const serialNext = modal.querySelector('[name="serialNextSequence"]');

        const lotMode = modal.querySelector('[name="lotMode"]');
        const lotVendor = modal.querySelector('[name="lotVendorCode"]');

        function updateSerial() {
            if (!serialMode) return;
            const isAuto = serialMode.value === 'AUTO';
            if (serialPrefix) serialPrefix.disabled = !isAuto;
            if (serialPadding) serialPadding.disabled = !isAuto;
            if (serialNext) serialNext.disabled = !isAuto;
        }

        function updateLot() {
            if (!lotMode) return;
            const isAuto = lotMode.value === 'AUTO';
            if (lotVendor) lotVendor.disabled = !isAuto;
        }

        if (serialMode) {
            serialMode.addEventListener('change', updateSerial);
            updateSerial();
        }
        if (lotMode) {
            lotMode.addEventListener('change', updateLot);
            updateLot();
        }
        if (window.initTrackingPolicyPreview) {
            window.initTrackingPolicyPreview(modal);
        }
    })();
    </script>
</div>

<!-- 성공 응답: OOB로 카드 추가 + 빈 상태 제거 + 모달 닫기 -->
<th:block th:fragment="created">
    <div id="item-cards" hx-swap-oob="afterbegin">
        <div th:replace="~{items/fragments/card :: view}"></div>
    </div>
    <p id="item-empty-msg" hx-swap-oob="true"></p>
    <div id="modal"></div>
</th:block>

</body>
</html>
