<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 읽기 모드 카드 -->
<div th:fragment="view"
     data-component-id="items.card.view"
     th:id="'item-' + ${item.externalId}"
     data-item-card
     th:classappend="${item.stockCount == 0} ? 'is-empty'"
     class="list-row item-row">

    <div class="index-col border-r border-line-soft" th:text="${#numbers.formatInteger(idx, 2)}">01</div>
    <div class="item-info">
        <img th:src="${item.primaryImageExternalId != null} ? @{/images/{id}(id=${item.primaryImageExternalId})} : @{/image/placeholder/item_placeholder_v2.png}"
             alt=""
             class="row-thumb">
        <div class="min-w-0">
            <div class="item-name"
                 th:classappend="${item.stockCount == 0} ? 'text-stat-dim'"
                 th:text="${item.name}">품목명</div>
            <div class="item-desc"
                 th:classappend="${item.stockCount == 0} ? 'text-faint'"
                 th:text="${item.description}">설명</div>
        </div>
    </div>

    <div class="item-stock">
        <th:block th:if="${item.stockCount > 0}">
            <a th:href="@{/stocks(item=${item.externalId})}"><b th:text="${item.stockCount}">8</b></a><span class="text-muted" th:text="#{view.item.card.unit}">개</span>
            <span class="text-muted">
                <span> · </span>
                <button th:if="${item.spaceCount > 0}"
                        th:attr="hx-get=@{/items/{id}/spaces(id=${item.externalId})}"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="cursor-pointer hover:underline"
                        th:text="#{view.item.card.spaceCount(${item.spaceCount})}">공간 2곳</button>
                <span th:unless="${item.spaceCount > 0}" th:text="#{view.item.card.spaceCount(${item.spaceCount})}">0곳 공간</span>
            </span>
        </th:block>
        <span th:unless="${item.stockCount > 0}" class="empty" th:text="#{view.item.card.noStock}">재고 없음</span>
    </div>

    <div class="item-actions">
        <button class="btn-accent btn-sm"
                th:attr="hx-get=@{/items/{id}/add-stock(id=${item.externalId})}"
                hx-target="#modal"
                hx-swap="outerHTML"
                th:text="#{view.item.card.addStock}">+ 재고</button>
        <button th:if="${item.stockCount > 0}"
                class="btn-secondary btn-sm"
                th:attr="hx-get=@{/items/{id}/history(id=${item.externalId})}"
                hx-target="#modal"
                hx-swap="outerHTML"
                th:text="#{view.stock.action.history}">이력</button>
        <button class="btn-secondary btn-sm"
                th:attr="hx-get=@{/items/{id}/edit(id=${item.externalId},sortBy=${sortBy},keyword=${keyword},searchType=${searchType},page=${currentPage},idx=${idx})},hx-target='#item-' + ${item.externalId}"
                hx-swap="outerHTML"
                th:text="#{view.common.edit}">수정</button>
    </div>

</div>

<!-- 수정 모드 카드 -->
<div th:fragment="edit"
     data-component-id="items.card.edit"
     th:id="'item-' + ${item.externalId}"
     data-item-card
     class="card-editing px-4 py-4">

    <form th:object="${form}"
          method="post"
          th:attr="hx-put=@{/items/{id}(id=${item.externalId})}"
          hx-target="#item-list-section"
          hx-swap="outerHTML"
          hx-encoding="multipart/form-data"
          class="flex flex-col gap-4 md:flex-row md:items-start">
        <input type="hidden" name="sortBy" th:value="${sortBy}">
        <input type="hidden" name="keyword" th:value="${keyword}">
        <input type="hidden" name="searchType" th:value="${searchType}">
        <input type="hidden" name="page" th:value="${currentPage}">

        <div class="flex flex-1 gap-4">
            <div class="w-20 shrink-0 md:w-32">
                <img th:src="${item.primaryImageExternalId != null} ? @{/images/{id}(id=${item.primaryImageExternalId})} : @{/image/placeholder/item_placeholder_v2.png}"
                     data-existing-image
                     alt=""
                     class="aspect-square w-full border border-line-soft object-cover bg-surface-dim">
                <img data-image-preview
                     class="hidden aspect-square w-full border border-line-soft object-cover bg-surface-dim"
                     alt="">
                <input type="file" name="imageFile" data-image-file
                       accept="image/jpeg,image/png,image/webp,image/gif"
                       class="mt-2 block w-full text-xs text-muted
                              file:mr-2 file:border-0 file:bg-surface-dim file:px-3 file:py-2
                              file:text-xs file:text-ink hover:file:bg-line-soft">
                <input type="hidden" name="imageHash" data-image-hash th:value="*{imageHash}">
                <span data-image-analysis-status class="mt-1 hidden block text-xs text-accent" th:text="#{view.item.card.aiAnalyzing}">AI 분석 중...</span>
                <button type="button"
                        data-image-analysis-retry
                        class="btn-text mt-2 hidden text-sm"
                        th:text="#{view.item.card.aiRetry}">
                    다시 분석
                </button>
                <button type="button"
                        th:if="${item.primaryImageExternalId != null}"
                        th:attr="data-reanalyze-src=@{/images/{id}/analyze(id=${item.primaryImageExternalId})}"
                        data-image-reanalyze
                        class="btn-text mt-2 text-sm"
                        th:text="#{view.item.card.aiReanalyzeStored}">
                    저장된 이미지 AI 분석
                </button>
            </div>

            <div class="grid flex-1 gap-3 md:grid-cols-2">
                <div>
                    <label class="field-label field-label-sm" th:text="#{view.item.card.nameLabel}">품목명 *</label>
                    <input type="text" th:field="*{name}"
                           class="field-input"
                           th:errorclass="is-invalid">
                    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="field-error"></span>
                </div>

                <div>
                    <label class="field-label field-label-sm" th:text="#{view.item.card.descLabel}">설명</label>
                    <input type="text" th:field="*{description}"
                           class="field-input"
                           th:placeholder="#{view.item.card.descPlaceholder}"
                           th:errorclass="is-invalid">
                    <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="field-error"></span>
                </div>

                <div>
                    <label class="field-label field-label-sm" th:text="#{view.item.card.priceLabel}">가격</label>
                    <input type="number" min="0" step="1" th:field="*{price}"
                           class="field-input font-mono"
                           th:placeholder="#{view.stock.form.price.placeholder}"
                           th:errorclass="is-invalid">
                    <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="field-error"></span>
                </div>

                <div>
                    <label class="field-label field-label-sm">
                        <span th:text="#{view.item.policy.expirationDays}">유통기한(일)</span>
                    </label>
                    <input type="number" min="1" th:field="*{expirationPeriodDays}"
                           class="field-input font-mono"
                           th:placeholder="#{view.item.policy.expirationDays}"
                           th:errorclass="is-invalid">
                    <span th:if="${#fields.hasErrors('expirationPeriodDays')}" th:errors="*{expirationPeriodDays}" class="field-error"></span>
                    <p data-expiration-preview
                       th:data-label="#{view.item.policy.expirationPreview}"
                       class="mt-2 hidden border border-line-soft bg-surface-dim px-3 py-2 text-xs font-medium text-stat-dim"></p>
                </div>

                <details th:if="${lotSerialEnabled}" class="md:col-span-2">
                    <summary class="btn-text cursor-pointer text-sm font-semibold" th:text="#{view.item.policy.section}">시리얼/로트 정책</summary>
                    <div class="mt-3 space-y-3">
                        <select th:field="*{serialMode}" class="field-input">
                            <option value="NONE" th:text="#{enum.TrackingMode.NONE}">없음</option>
                            <option value="AUTO" th:text="#{enum.TrackingMode.AUTO}">자동</option>
                            <option value="MANUAL" th:text="#{enum.TrackingMode.MANUAL}">수동</option>
                        </select>
                        <div class="grid grid-cols-3 gap-2">
                            <input type="text" th:field="*{serialPrefix}" th:placeholder="#{view.item.policy.serialPrefix}"
                                   class="field-input">
                            <input type="number" min="0" max="16" th:field="*{serialPaddingLength}" th:placeholder="#{view.item.policy.serialPadding}"
                                   class="field-input">
                            <input type="number" min="0" th:field="*{serialNextSequence}" th:placeholder="#{view.item.policy.serialNext}"
                                   class="field-input">
                        </div>
                        <p data-serial-preview
                           th:data-label="#{view.item.policy.serialPreview}"
                           class="hidden border border-line-soft bg-surface-dim px-3 py-2 text-xs font-medium text-stat-dim"></p>
                        <input type="hidden" name="serialIncrementUnit" th:value="*{serialIncrementUnit}">

                        <select th:field="*{lotMode}" class="field-input">
                            <option value="NONE" th:text="#{enum.TrackingMode.NONE}">없음</option>
                            <option value="AUTO" th:text="#{enum.TrackingMode.AUTO}">자동</option>
                            <option value="MANUAL" th:text="#{enum.TrackingMode.MANUAL}">수동</option>
                        </select>
                        <div>
                            <input type="text" th:field="*{lotVendorCode}" th:placeholder="#{view.item.policy.lotVendorCode}"
                                   class="field-input">
                        </div>
                        <p data-lot-preview
                           th:data-label="#{view.item.policy.lotPreview}"
                           class="hidden border border-line-soft bg-surface-dim px-3 py-2 text-xs font-medium text-stat-dim"></p>
                        <input type="hidden" name="lotDateFormat" th:value="*{lotDateFormat}">
                        <input type="hidden" name="lotIncludeSequence" th:value="*{lotIncludeSequence}">
                        <input type="hidden" name="lotNextSequence" th:value="*{lotNextSequence}">
                        <input type="hidden" data-lot-sequence-key th:value="${item.lotSequenceKey}">
                    </div>
                </details>
            </div>
        </div>

        <div class="flex flex-col gap-2 md:ml-auto md:pt-7">
            <div class="flex gap-2">
                <button type="submit"
                        class="btn-primary btn-sm"
                        data-submit-btn
                        th:text="#{view.common.save}">저장</button>
                <button type="button"
                        class="btn-secondary btn-sm"
                        th:attr="hx-get=@{/items/{id}/cancel(id=${item.externalId},sortBy=${sortBy},keyword=${keyword},searchType=${searchType},page=${currentPage},idx=${idx})},hx-target='#item-' + ${item.externalId}"
                        hx-swap="outerHTML"
                        th:text="#{view.common.cancel}">취소</button>
            </div>
            <div class="text-right">
                <button type="button"
                        class="btn-danger btn-sm"
                        th:attr="hx-delete=@{/items/{id}(id=${item.externalId},page=${currentPage},sortBy=${sortBy},keyword=${keyword})},hx-confirm=#{view.item.card.deleteConfirm(${item.name})}"
                        hx-target="#item-list-section"
                        hx-swap="outerHTML"
                        th:text="#{view.common.delete}">삭제</button>
            </div>
        </div>
    </form>

    <script>
    (function () {
        var card = document.currentScript.closest('[data-item-card]');
        if (!card) return;
        var analyzeImage = createImageAnalysisHandler({
            fileInputSelector:        '[data-image-file]',
            nameInputSelector:        'input[name="name"]',
            descriptionInputSelector: 'input[name="description"]',
            submitSelector:           '[data-submit-btn]',
            statusSelector:           '[data-image-analysis-status]',
            retryButtonSelector:      '[data-image-analysis-retry]'
        }, card);

        initImageUpload({
            fileInputSelector:     '[data-image-file]',
            previewSelector:       '[data-image-preview]',
            hashInputSelector:     '[data-image-hash]',
            submitSelector:        '[data-submit-btn]',
            existingImageSelector: '[data-existing-image]',
            onImageReady: analyzeImage
        }, card);

        if (/*[[${lotSerialEnabled}]]*/ false) { (function initTrackingModeToggles() {
            var serialMode = card.querySelector('[name="serialMode"]');
            var serialPrefix = card.querySelector('[name="serialPrefix"]');
            var serialPadding = card.querySelector('[name="serialPaddingLength"]');
            var serialNext = card.querySelector('[name="serialNextSequence"]');

            var lotMode = card.querySelector('[name="lotMode"]');
            var lotVendor = card.querySelector('[name="lotVendorCode"]');

            function updateSerial() {
                if (!serialMode) return;
                var isAuto = serialMode.value === 'AUTO';
                if (serialPrefix) serialPrefix.disabled = !isAuto;
                if (serialPadding) serialPadding.disabled = !isAuto;
                if (serialNext) serialNext.disabled = !isAuto;
            }

            function updateLot() {
                if (!lotMode) return;
                var isAuto = lotMode.value === 'AUTO';
                if (lotVendor) lotVendor.disabled = !isAuto;
            }

            if (serialMode) {
                serialMode.addEventListener('change', updateSerial);
                updateSerial();
            }
            if (lotMode) {
                lotMode.addEventListener('change', updateLot);
                updateLot();
            }
            if (window.initTrackingPolicyPreview) {
                window.initTrackingPolicyPreview(card);
            }
        })(); }


        var reanalyzeBtn = card.querySelector('[data-image-reanalyze]');
        if (reanalyzeBtn) {
            var statusSpan = card.querySelector('[data-image-analysis-status]');
            var nameInput  = card.querySelector('input[name="name"]');
            var descInput  = card.querySelector('input[name="description"]');
            var reanalyzed = 0;

            var fileInput = card.querySelector('[data-image-file]');
            if (fileInput) {
                fileInput.addEventListener('change', function () {
                    reanalyzeBtn.classList.add('hidden');
                });
            }

            reanalyzeBtn.addEventListener('click', async function () {
                var endpoint = reanalyzeBtn.dataset.reanalyzeSrc;
                if (!endpoint) return;

                reanalyzeBtn.disabled = true;
                if (statusSpan) { statusSpan.classList.remove('hidden'); statusSpan.textContent = 'AI 분석 중...'; }

                var fd = new FormData();
                fd.append('retryAttempt', String(reanalyzed));
                if (reanalyzed > 0) {
                    if (nameInput) fd.append('previousName', nameInput.value);
                    if (descInput) fd.append('previousDescription', descInput.value);
                }

                try {
                    var res = await fetch(endpoint, {
                        method: 'POST',
                        body: fd,
                        headers: getCsrfHeaders()
                    });
                    if (!res.ok) {
                        var errorMessage = '이미지 AI 분석에 실패했습니다.';
                        try {
                            var errorData = await res.json();
                            if (errorData && errorData.message) errorMessage = errorData.message;
                        } catch (_) {}
                        throw new Error(errorMessage);
                    }
                    var data = await res.json();
                    if (nameInput && data.name) nameInput.value = data.name;
                    if (descInput && data.description) descInput.value = data.description;
                    reanalyzed++;
                    reanalyzeBtn.textContent = '다시 분석';
                } catch (e) {
                    if (window.SeuStockToast) window.SeuStockToast({ type: 'error', message: e.message || '이미지 AI 분석에 실패했습니다.' });
                } finally {
                    if (statusSpan) statusSpan.classList.add('hidden');
                    reanalyzeBtn.disabled = false;
                }
            });
        }
    })();
    </script>
</div>
</body>
</html>
