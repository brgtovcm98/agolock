<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 읽기 모드 카드 (개선) -->
<div th:fragment="view"
     th:id="'item-' + ${item.externalId}"
     data-item-card
     th:classappend="${item.stockCount == 0} ? 'is-empty'"
     class="item-row">

    <div class="item-info">
        <img th:src="${item.primaryImageExternalId != null} ? @{/images/{id}(id=${item.primaryImageExternalId})} : @{/image/placeholder/item_placeholder_v2.png}"
             alt=""
             class="item-thumb object-cover border border-slate-200"
             th:classappend="${item.stockCount > 0} ? 'accent' : 'muted'">
        <div class="min-w-0">
            <div class="item-name"
                 th:classappend="${item.stockCount == 0} ? 'muted'"
                 th:text="${item.name}">품목명</div>
            <div class="item-desc"
                 th:classappend="${item.stockCount == 0} ? 'muted'"
                 th:text="${item.description}">설명</div>
        </div>
    </div>

    <div class="item-stock">
        <th:block th:if="${item.stockCount > 0}">
            <a th:href="@{/stocks(item=${item.externalId})}"><b th:text="${item.stockCount} + '개'">8개</b></a>
            <span class="sub">
                <span> · </span>
                <button th:if="${item.spaceCount > 0}"
                        th:attr="hx-get=@{/items/{id}/spaces(id=${item.externalId})}"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="cursor-pointer hover:underline"
                        th:text="#{view.item.card.spaceCount(${item.spaceCount})}">공간 2곳</button>
                <span th:unless="${item.spaceCount > 0}" th:text="#{view.item.card.spaceCount(${item.spaceCount})}">0곳 공간</span>
        </th:block>
        <span th:unless="${item.stockCount > 0}" class="empty" th:text="#{view.item.card.noStock}">재고 없음</span>
    </div>

    <div class="item-actions">
        <th:block th:if="${item.stockCount > 0}">
            <button class="btn-secondary btn-sm"
                    th:attr="hx-get=@{/items/{id}/history(id=${item.externalId})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    th:text="#{view.stock.action.history}">이력</button>
        </th:block>
        <th:block th:unless="${item.stockCount > 0}">
            <button class="btn--cta"
                    th:attr="hx-get=@{/items/{id}/add-stock(id=${item.externalId})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    th:text="#{view.item.card.addStock}">+ 재고</button>
        </th:block>
        <button class="btn-secondary btn-sm"
                th:attr="hx-get=@{/items/{id}/edit(id=${item.externalId})},hx-target='#item-' + ${item.externalId}"
                hx-swap="outerHTML"
                th:text="#{view.common.edit}">수정</button>
    </div>

</div>

<!-- 수정 모드 카드 -->
<div th:fragment="edit"
     th:id="'item-' + ${item.externalId}"
     data-item-card
     class="grid max-h-[calc(100vh-8rem)] gap-3 overflow-y-auto border-l-4 border-blue-500 bg-blue-50-40 px-4 py-4 md:grid-item-card md:items-start">

    <div class="min-w-0">
        <div class="mb-2 w-20 md:w-full">
            <img th:src="${item.primaryImageExternalId != null} ? @{/images/{id}(id=${item.primaryImageExternalId})} : @{/image/placeholder/item_placeholder_v2.png}"
                 data-existing-image
                 alt=""
                 class="aspect-square w-full rounded-lg object-cover border border-slate-200">
            <img data-image-preview
                 class="hidden aspect-square w-full rounded-lg object-cover border border-slate-200"
                 alt="">
        </div>
        <input type="file" name="imageFile" data-image-file
               accept="image/jpeg,image/png,image/webp,image/gif"
               class="block w-full text-xs text-slate-500
                      file:mr-2 file:rounded-lg file:border-0 file:bg-slate-100 file:px-3 file:py-2
                      file:text-xs file:font-semibold file:text-slate-700 hover:file:bg-slate-200">
        <span data-image-analysis-status
              class="hidden mt-1 block text-xs text-blue-500" th:text="#{view.item.card.aiAnalyzing}">AI 분석 중...</span>
        <button type="button"
                data-image-analysis-retry
                class="hidden mt-2 text-xs font-semibold text-blue-600 hover:text-blue-800 transition"
                th:text="#{view.item.card.aiRetry}">
            다시 분석
        </button>
        <button type="button"
                th:if="${item.primaryImageExternalId != null}"
                th:attr="data-reanalyze-src=@{/images/{id}/analyze(id=${item.primaryImageExternalId})}"
                data-image-reanalyze
                class="mt-2 text-xs font-semibold text-blue-600 hover:text-blue-800 transition"
                th:text="#{view.item.card.aiReanalyzeStored}">
            저장된 이미지 AI 분석
        </button>
        <input type="hidden" name="imageHash" data-image-hash value="">
    </div>

    <div class="space-y-2 min-w-0">
        <div>
            <label class="field-label field-label-sm" th:text="#{view.item.card.nameLabel}">품목명 *</label>
            <input type="text" name="name" th:value="${item.name}"
                   class="field-input">
        </div>

        <div>
            <label class="field-label field-label-sm" th:text="#{view.item.card.descLabel}">설명</label>
            <input type="text" name="description" th:value="${item.description}"
                   class="field-input"
                   th:placeholder="#{view.item.card.descPlaceholder}">
        </div>

        <div>
            <label class="field-label field-label-sm" th:text="#{view.item.card.priceLabel}">가격</label>
            <input type="number" min="0" step="1" name="price" th:value="${item.price}"
                   class="field-input"
                   th:placeholder="#{view.stock.form.price.placeholder}">
        </div>

        <div>
            <label class="field-label field-label-sm">
                <span th:text="#{view.item.policy.expirationDays}">유통기한(일)</span>
            </label>
            <input type="number" min="1" name="expirationPeriodDays" th:value="${item.expirationPeriodDays}"
                   class="field-input"
                   th:placeholder="#{view.item.policy.expirationDays}">
            <p data-expiration-preview
               th:data-label="#{view.item.policy.expirationPreview}"
               class="hidden mt-2 rounded-lg bg-emerald-50 px-3 py-2 text-xs font-medium text-emerald-700"></p>
        </div>

        <details th:if="${lotSerialEnabled}">
            <summary class="cursor-pointer text-sm font-semibold text-blue-600 hover:text-blue-800 transition" th:text="#{view.item.policy.section}">시리얼/로트 정책</summary>
            <div class="mt-3 space-y-3">
                <select name="serialMode" class="field-input">
                    <option value="NONE" th:selected="${item.serialMode.name() == 'NONE'}" th:text="#{enum.TrackingMode.NONE}">없음</option>
                    <option value="AUTO" th:selected="${item.serialMode.name() == 'AUTO'}" th:text="#{enum.TrackingMode.AUTO}">자동</option>
                    <option value="MANUAL" th:selected="${item.serialMode.name() == 'MANUAL'}" th:text="#{enum.TrackingMode.MANUAL}">수동</option>
                </select>
                <div class="grid grid-cols-3 gap-2">
                    <input type="text" name="serialPrefix" th:value="${item.serialPrefix}" th:placeholder="#{view.item.policy.serialPrefix}"
                           class="field-input">
                    <input type="number" min="0" max="16" name="serialPaddingLength" th:value="${item.serialPaddingLength}" th:placeholder="#{view.item.policy.serialPadding}"
                           class="field-input">
                    <input type="number" min="0" name="serialNextSequence" th:value="${item.serialNextSequence}" th:placeholder="#{view.item.policy.serialNext}"
                           class="field-input">
                </div>
                <p data-serial-preview
                   th:data-label="#{view.item.policy.serialPreview}"
                   class="hidden rounded-lg bg-blue-50 px-3 py-2 text-xs font-medium text-blue-700"></p>
                <input type="hidden" name="serialIncrementUnit" th:value="${item.serialIncrementUnit}">

                <select name="lotMode" class="field-input">
                    <option value="NONE" th:selected="${item.lotMode.name() == 'NONE'}" th:text="#{enum.TrackingMode.NONE}">없음</option>
                    <option value="AUTO" th:selected="${item.lotMode.name() == 'AUTO'}" th:text="#{enum.TrackingMode.AUTO}">자동</option>
                    <option value="MANUAL" th:selected="${item.lotMode.name() == 'MANUAL'}" th:text="#{enum.TrackingMode.MANUAL}">수동</option>
                </select>
                <div>
                    <input type="text" name="lotVendorCode" th:value="${item.lotVendorCode}" th:placeholder="#{view.item.policy.lotVendorCode}"
                           class="field-input">
                </div>
                <p data-lot-preview
                   th:data-label="#{view.item.policy.lotPreview}"
                   class="hidden rounded-lg bg-blue-50 px-3 py-2 text-xs font-medium text-blue-700"></p>
                <input type="hidden" name="lotDateFormat" th:value="${item.lotDateFormat}">
                <input type="hidden" name="lotIncludeSequence" th:value="${item.lotIncludeSequence}">
                <input type="hidden" name="lotNextSequence" th:value="${item.lotNextSequence}">
                <input type="hidden" data-lot-sequence-key th:value="${item.lotSequenceKey}">
            </div>
        </details>
    </div>

    <div class="flex flex-wrap items-center gap-2 min-w-0 md:contents">
        <div class="flex flex-wrap items-center gap-2 text-xs min-w-0">
            <a th:if="${item.stockCount > 0}"
               th:href="@{/stocks(item=${item.externalId})}"
               class="inline-flex items-center rounded-full bg-blue-50 px-2 py-0.5 text-blue-700 font-medium hover:bg-blue-100 transition"
               th:text="#{view.item.card.stockCount(${item.stockCount})}"></a>
            <span th:if="${item.stockCount == 0}"
                  class="inline-flex items-center rounded-full bg-slate-50 px-2 py-0.5 text-slate-500 font-medium"
                  th:text="#{view.item.card.stockCount(${item.stockCount})}"></span>
        </div>

        <div class="flex flex-wrap items-center gap-2 text-xs min-w-0">
            <button th:if="${item.spaceCount > 0}"
                    th:attr="hx-get=@{/items/{id}/spaces(id=${item.externalId})}"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="inline-flex items-center rounded-full bg-emerald-50 px-2 py-0.5 text-emerald-700 font-medium hover:bg-emerald-100 transition"
                    th:text="#{view.item.card.spaceCount(${item.spaceCount})}"></button>
            <span th:if="${item.spaceCount == 0}"
                  class="inline-flex items-center rounded-full bg-slate-50 px-2 py-0.5 text-slate-500 font-medium"
                  th:text="#{view.item.card.spaceCount(${item.spaceCount})}"></span>
        </div>
    </div>

    <div class="flex flex-wrap gap-2 items-center md:justify-end">
        <button class="rounded-lg border border-red-200 bg-white px-3 py-1.5 text-sm font-semibold text-red-500 hover:bg-red-50 transition md:order-last"
                th:attr="hx-delete=@{/items/{id}(id=${item.externalId},page=${page != null ? page.page() : 1},sortBy=${sortBy},keyword=${keyword})},hx-confirm=#{view.item.card.deleteConfirm(${item.name})}"
                hx-target="#item-list-section"
                hx-swap="outerHTML"
                th:text="#{view.common.delete}">삭제</button>
        <button class="rounded-lg bg-blue-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-blue-700 transition"
                th:attr="hx-put=@{/items/{id}(id=${item.externalId})},hx-target='#item-' + ${item.externalId},hx-include='#item-' + ${item.externalId}"
                hx-swap="outerHTML"
                hx-encoding="multipart/form-data"
                data-submit-btn
                th:text="#{view.common.save}">저장</button>
        <button class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition"
                th:attr="hx-get=@{/items/{id}/cancel(id=${item.externalId})},hx-target='#item-' + ${item.externalId}"
                hx-swap="outerHTML"
                th:text="#{view.common.cancel}">취소</button>
    </div>

    <script>
    (function () {
        var card = document.currentScript.closest('[data-item-card]');
        if (!card) return;
        var analyzeImage = createImageAnalysisHandler({
            fileInputSelector:        '[data-image-file]',
            nameInputSelector:        'input[name="name"]',
            descriptionInputSelector: 'input[name="description"]',
            submitSelector:           '[data-submit-btn]',
            statusSelector:           '[data-image-analysis-status]',
            retryButtonSelector:      '[data-image-analysis-retry]'
        }, card);

        initImageUpload({
            fileInputSelector:     '[data-image-file]',
            previewSelector:       '[data-image-preview]',
            hashInputSelector:     '[data-image-hash]',
            submitSelector:        '[data-submit-btn]',
            existingImageSelector: '[data-existing-image]',
            onImageReady: analyzeImage
        }, card);

        if (/*[[${lotSerialEnabled}]]*/ false) { (function initTrackingModeToggles() {
            var serialMode = card.querySelector('[name="serialMode"]');
            var serialPrefix = card.querySelector('[name="serialPrefix"]');
            var serialPadding = card.querySelector('[name="serialPaddingLength"]');
            var serialNext = card.querySelector('[name="serialNextSequence"]');

            var lotMode = card.querySelector('[name="lotMode"]');
            var lotVendor = card.querySelector('[name="lotVendorCode"]');

            function updateSerial() {
                if (!serialMode) return;
                var isAuto = serialMode.value === 'AUTO';
                if (serialPrefix) serialPrefix.disabled = !isAuto;
                if (serialPadding) serialPadding.disabled = !isAuto;
                if (serialNext) serialNext.disabled = !isAuto;
            }

            function updateLot() {
                if (!lotMode) return;
                var isAuto = lotMode.value === 'AUTO';
                if (lotVendor) lotVendor.disabled = !isAuto;
            }

            if (serialMode) {
                serialMode.addEventListener('change', updateSerial);
                updateSerial();
            }
            if (lotMode) {
                lotMode.addEventListener('change', updateLot);
                updateLot();
            }
            if (window.initTrackingPolicyPreview) {
                window.initTrackingPolicyPreview(card);
            }
        })(); }


        var reanalyzeBtn = card.querySelector('[data-image-reanalyze]');
        if (reanalyzeBtn) {
            var statusSpan = card.querySelector('[data-image-analysis-status]');
            var nameInput  = card.querySelector('input[name="name"]');
            var descInput  = card.querySelector('input[name="description"]');
            var reanalyzed = 0;

            var fileInput = card.querySelector('[data-image-file]');
            if (fileInput) {
                fileInput.addEventListener('change', function () {
                    reanalyzeBtn.classList.add('hidden');
                });
            }

            reanalyzeBtn.addEventListener('click', async function () {
                var endpoint = reanalyzeBtn.dataset.reanalyzeSrc;
                if (!endpoint) return;

                reanalyzeBtn.disabled = true;
                if (statusSpan) { statusSpan.classList.remove('hidden'); statusSpan.textContent = 'AI 분석 중...'; }

                var fd = new FormData();
                fd.append('retryAttempt', String(reanalyzed));
                if (reanalyzed > 0) {
                    if (nameInput) fd.append('previousName', nameInput.value);
                    if (descInput) fd.append('previousDescription', descInput.value);
                }

                try {
                    var res = await fetch(endpoint, {
                        method: 'POST',
                        body: fd,
                        headers: getCsrfHeaders()
                    });
                    if (!res.ok) {
                        var errorMessage = '이미지 AI 분석에 실패했습니다.';
                        try {
                            var errorData = await res.json();
                            if (errorData && errorData.message) errorMessage = errorData.message;
                        } catch (_) {}
                        throw new Error(errorMessage);
                    }
                    var data = await res.json();
                    if (nameInput && data.name) nameInput.value = data.name;
                    if (descInput && data.description) descInput.value = data.description;
                    reanalyzed++;
                    reanalyzeBtn.textContent = '다시 분석';
                } catch (e) {
                    if (window.SeuStockToast) window.SeuStockToast({ type: 'error', message: e.message || '이미지 AI 분석에 실패했습니다.' });
                } finally {
                    if (statusSpan) statusSpan.classList.add('hidden');
                    reanalyzeBtn.disabled = false;
                }
            });
        }
    })();
    </script>
</div>
</body>
</html>
