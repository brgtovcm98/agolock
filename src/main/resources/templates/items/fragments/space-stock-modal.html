<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 p-6 max-h-[90vh] overflow-y-auto flex flex-col gap-4">

        <div class="flex items-center justify-between">
            <h2 class="text-lg font-semibold text-slate-800">
                <span th:text="#{view.item.spaceStock.title(${itemName})}"></span>
            </h2>
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="text-slate-400 hover:text-slate-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="divide-y divide-slate-100">
            <a th:each="ss : ${spaceStocks}"
               th:href="@{/stocks(itemExternalId=${externalId},spaceExternalId=${ss.spaceExternalId})}"
               class="flex items-center justify-between py-2.5 hover:bg-slate-50 transition">
                <span class="text-sm text-slate-700" th:text="${ss.spaceName}"></span>
                <span class="inline-flex items-center rounded-full bg-blue-50 px-2.5 py-0.5
                             text-xs font-semibold text-blue-700"
                      th:text="|${ss.count}#{view.item.card.unit}|"></span>
            </a>
        </div>

        <div class="flex justify-end border-t border-slate-100 pt-2">
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="rounded-md border border-slate-300 px-4 py-2 text-sm text-slate-600
                           hover:bg-slate-50 transition"
                    th:text="#{view.common.close}">
                닫기
            </button>
        </div>
    </div>
</div>

</body>
</html>
