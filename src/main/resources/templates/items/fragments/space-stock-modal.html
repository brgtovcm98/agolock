<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="ui-modal-overlay ui-fixed ui-inset-0 ui-z-50 ui-flex ui-items-center ui-justify-center ui-bg-black-40">
    <div class="ui-modal-dialog ui-bg-white ui-rounded-xl ui-shadow-xl ui-w-full ui-max-w-sm ui-mx-4 ui-p-6 ui-max-h-90vh ui-overflow-y-auto ui-flex ui-flex-col ui-gap-4">

        <div class="ui-flex ui-items-center ui-justify-between">
            <h2 id="modal-title" class="ui-text-lg ui-font-semibold ui-text-slate-800">
                <span th:text="#{view.item.spaceStock.title(${itemName})}"></span>
            </h2>
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="ui-text-slate-400 ui-hover-text-slate-600 ui-transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="ui-divide-y ui-divide-slate-100">
            <a th:each="ss : ${spaceStocks}"
               th:href="@{/stocks(item=${externalId},space=${ss.spaceExternalId})}"
               class="ui-flex ui-items-center ui-justify-between ui-py-2-5 ui-hover-bg-slate-50 ui-transition">
                <span class="ui-text-sm ui-text-slate-700" th:text="${ss.spaceName}"></span>
                <span class="ui-inline-flex ui-items-center ui-rounded-full ui-bg-blue-50 ui-px-2-5 ui-py-0-5
                             ui-text-xs ui-font-semibold ui-text-blue-700"
                      th:text="|${ss.count}#{view.item.card.unit}|"></span>
            </a>
        </div>

        <div class="ui-flex ui-justify-end ui-border-t ui-border-slate-100 pt-2">
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="ui-rounded-md ui-border ui-border-slate-300 ui-px-4 ui-py-2 ui-text-sm ui-text-slate-600
                           ui-hover-bg-slate-50 ui-transition"
                    th:text="#{view.common.close}">
                닫기
            </button>
        </div>
    </div>
</div>

</body>
</html>
