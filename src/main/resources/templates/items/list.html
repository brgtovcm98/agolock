<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.item.list.title}">내 품목 · SeuStock</title>
</head>
<body class="page min-h-screen flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<div id="modal" data-component-id="items.modal-mount"></div>

<main data-component-id="page.items-list" class="page-main">

    <div class="mb-6 flex flex-wrap items-end justify-between gap-3">
        <div>
            <p class="page-caption mb-2" th:text="|ITEMS / ${#numbers.formatInteger(page.totalCount(), 2)}|">ITEMS / 12</p>
            <h1 class="page-title" th:text="#{view.item.list.header}">내 품목</h1>
        </div>
        <button type="button"
                data-component-id="items.create-button"
                hx-get="/items/new"
                hx-target="#modal"
                hx-swap="outerHTML"
                class="btn-primary btn-sm"
                th:text="#{view.item.list.add}">
            + 품목 추가
        </button>
    </div>

    <div id="item-list-section" data-component-id="items.list-section" aria-live="polite" th:fragment="item-list-section" class="space-y-3">
        <div data-component-id="items.filter-card" class="search-sort-block">
            <form data-component-id="items.search-form" hx-get="/items"
                  hx-target="#item-list-section"
                  hx-select="#item-list-section"
                  hx-swap="outerHTML"
                  hx-push-url="true"
                  class="search-row">
                <input type="hidden" name="sortBy" th:value="${sortBy}">
                <input type="hidden" name="page" value="1">
                <select name="searchType"
                        class="search-select border-r-0" th:attr="aria-label=#{aria.filter.searchType}">
                    <option value="name" th:selected="${searchType == null or searchType == 'name'}" th:text="#{view.item.list.searchType.name}">품목명</option>
                    <option value="description" th:selected="${searchType == 'description'}" th:text="#{view.item.list.searchType.description}">설명</option>
                </select>
                <input type="text"
                       name="keyword"
                       th:value="${keyword}"
                       th:placeholder="#{view.item.list.search.placeholder}"
                       class="search-input border-r-0">
                <button type="submit"
                        class="btn-search shrink-0"
                        th:text="#{view.item.list.search.button}">
                    검색
                </button>
            </form>
            <div data-component-id="items.sort-controls" class="sort-row">
                <button th:attr="hx-get=@{/items(sortBy='newest',keyword=${keyword},searchType=${searchType})}"
                        hx-target="#item-list-section" hx-select="#item-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'newest'} ? 'sort-tab-active'"
                        class="sort-tab"
                        th:text="#{view.item.list.sort.newest}">
                    가장 최신 순
                </button>
                <button th:attr="hx-get=@{/items(sortBy='oldest',keyword=${keyword},searchType=${searchType})}"
                        hx-target="#item-list-section" hx-select="#item-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'oldest'} ? 'sort-tab-active'"
                        class="sort-tab"
                        th:text="#{view.item.list.sort.oldest}">
                    가장 오래된 순
                </button>
                <button th:attr="hx-get=@{/items(sortBy='name',keyword=${keyword},searchType=${searchType})}"
                        hx-target="#item-list-section" hx-select="#item-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'name'} ? 'sort-tab-active'"
                        class="sort-tab"
                        th:text="#{view.item.list.sort.name}">
                    품목명 순
                </button>
            </div>
        </div>

        <div id="item-list"
             data-component-id="items.list"
             th:fragment="item-list"
             class="table-container">
            <div class="table-header item-row">
                <div class="index-col border-r border-line-soft"></div>
                <div class="row-thumb-spacer" aria-hidden="true"></div>
                <div th:text="#{view.item.list.table.item}">품목</div>
                <div th:text="#{view.item.list.table.stock}">재고</div>
                <div class="text-right" th:text="#{view.item.list.table.manage}">관리</div>
            </div>

            <p id="item-empty-msg"
               th:if="${items.empty}"
               class="empty-state"
               th:text="#{view.item.list.empty}">
                등록된 품목이 없습니다. 위 버튼으로 추가핳세요.
            </p>

            <div id="item-cards"
                 data-component-id="items.list-rows"
                 th:if="${!items.empty}">
                <th:block th:each="item, iter : ${items}">
                    <th:block th:with="idx=${iter.index + 1 + (page != null ? (page.page() - 1) * page.size() : 0)}">
                        <div th:replace="~{items/fragments/card :: view}"></div>
                    </th:block>
                </th:block>
            </div>
        </div>

        <div th:if="${page.totalPages() > 1}"
             class="flex items-center justify-center gap-1">
            <button th:if="${page.hasPrevious()}"
                    th:attr="hx-get=@{/items(page=${page.previousPage()},sortBy=${sortBy},keyword=${keyword},searchType=${searchType})}"
                    hx-target="#item-list-section" hx-select="#item-list-section" hx-swap="outerHTML" hx-push-url="true"
                    class="btn-secondary btn-sm"
                    th:text="#{view.common.pagination.prev}">
                이전
            </button>
            <th:block th:each="pageNumber : ${#numbers.sequence(1, page.totalPages())}">
                <button th:attr="hx-get=@{/items(page=${pageNumber},sortBy=${sortBy},keyword=${keyword},searchType=${searchType})}"
                        hx-target="#item-list-section" hx-select="#item-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${pageNumber == page.page()} ? 'page-link-active'"
                        class="page-link"
                        th:text="${pageNumber}">1</button>
            </th:block>
            <button th:if="${page.hasNext()}"
                    th:attr="hx-get=@{/items(page=${page.nextPage()},sortBy=${sortBy},keyword=${keyword},searchType=${searchType})}"
                    hx-target="#item-list-section" hx-select="#item-list-section" hx-swap="outerHTML" hx-push-url="true"
                    class="btn-secondary btn-sm"
                    th:text="#{view.common.pagination.next}">
                다음
            </button>
        </div>
    </div>

</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
