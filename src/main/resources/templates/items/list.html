<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="#{view.item.list.title}">내 품목 · SeuStock</title>
</head>
<body class="page min-h-screen bg-slate-50 flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<div id="modal"></div>

<main class="page-main mx-auto w-full max-w-4xl px-4 py-10 flex-1">

    <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
        <h1 class="page-title text-2xl font-bold text-slate-800" th:text="#{view.item.list.header}">내 품목</h1>
        <button type="button"
                hx-get="/items/new"
                hx-target="#modal"
                hx-swap="outerHTML"
                class="btn-primary"
                th:text="#{view.item.list.add}">
            + 품목 추가
        </button>
    </div>

    <div id="item-list-section" aria-live="polite" th:fragment="item-list-section" class="space-y-3">
        <div class="card p-4 rounded-lg border border-slate-200 bg-white px-4 py-3 space-y-2">
            <form hx-get="/items"
                  hx-target="#item-list-section"
                  hx-select="#item-list-section"
                  hx-swap="outerHTML"
                  hx-push-url="true"
                  class="flex items-stretch">
                <input type="hidden" name="sortBy" th:value="${sortBy}">
                <input type="hidden" name="page" value="1">
                <select name="searchType"
                        class="shrink-0 rounded-l-md rounded-r-none border border-r-0 border-slate-200 bg-slate-50 px-2 py-1.5 text-xs font-medium text-slate-500 focus:z-10 focus:border-blue-400 focus:outline-none focus:ring-1 focus:ring-blue-400" th:attr="aria-label=#{aria.filter.searchType}">
                    <option value="name" th:selected="${searchType == null or searchType == 'name'}" th:text="#{view.item.list.searchType.name}">품목명</option>
                    <option value="description" th:selected="${searchType == 'description'}" th:text="#{view.item.list.searchType.description}">설명</option>
                </select>
                <input type="text"
                       name="keyword"
                       th:value="${keyword}"
                       th:placeholder="#{view.item.list.search.placeholder}"
                       class="flex-1 min-w-0 rounded-none border border-slate-200 px-3 py-1.5 text-sm text-slate-700 placeholder:text-slate-400 focus:z-10 focus:border-blue-400 focus:outline-none focus:ring-1 focus:ring-blue-400">
                <button type="submit"
                        class="shrink-0 rounded-l-none rounded-r-md bg-slate-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-slate-700 transition"
                        th:text="#{view.item.list.search.button}">
                    검색
                </button>
            </form>
            <div class="flex flex-wrap gap-1">
                <button th:attr="hx-get=@{/items(sortBy='newest',keyword=${keyword},searchType=${searchType})}"
                        hx-target="#item-list-section" hx-select="#item-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'newest'} ? 'bg-blue-100 text-blue-700 ring-1 ring-blue-300' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'"
                        class="rounded-full px-2-5 py-0.5 text-xs font-medium transition"
                        th:text="#{view.item.list.sort.newest}">
                    가장 최신 순
                </button>
                <button th:attr="hx-get=@{/items(sortBy='oldest',keyword=${keyword},searchType=${searchType})}"
                        hx-target="#item-list-section" hx-select="#item-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'oldest'} ? 'bg-blue-100 text-blue-700 ring-1 ring-blue-300' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'"
                        class="rounded-full px-2-5 py-0.5 text-xs font-medium transition"
                        th:text="#{view.item.list.sort.oldest}">
                    가장 오래된 순
                </button>
                <button th:attr="hx-get=@{/items(sortBy='name',keyword=${keyword},searchType=${searchType})}"
                        hx-target="#item-list-section" hx-select="#item-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'name'} ? 'bg-blue-100 text-blue-700 ring-1 ring-blue-300' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'"
                        class="rounded-full px-2-5 py-0.5 text-xs font-medium transition"
                        th:text="#{view.item.list.sort.name}">
                    품목명 순
                </button>
            </div>
        </div>

        <div id="item-list"
             th:fragment="item-list"
             class="card overflow-hidden rounded-lg border border-slate-200 bg-white">
            <div class="hidden md:grid grid-item-card gap-3 border-b border-slate-200 bg-slate-50 px-4 py-3 text-xs font-semibold uppercase tracking-wide text-slate-500">
                <div th:text="#{view.item.list.table.item}">품목</div>
                <div th:text="#{view.item.list.table.description}">설명</div>
                <div th:text="#{view.item.list.table.stock}">재고</div>
                <div th:text="#{view.item.list.table.space}">공간</div>
                <div class="text-right" th:text="#{view.item.list.table.manage}">관리</div>
            </div>

            <p id="item-empty-msg"
               th:if="${items.empty}"
               class="empty-state px-4 py-10 text-center text-sm text-slate-400"
               th:text="#{view.item.list.empty}">
                등록된 품목이 없습니다. 위 버튼으로 추가해보세요.
            </p>

            <div id="item-cards"
                 class="divide-y divide-slate-100">
                <th:block th:each="item : ${items}">
                    <div th:replace="~{items/fragments/card :: view}"></div>
                </th:block>
            </div>
        </div>

        <div th:if="${page.totalPages() > 1}"
             class="flex items-center justify-center gap-1">
            <button th:if="${page.hasPrevious()}"
                    th:attr="hx-get=@{/items(page=${page.previousPage()},sortBy=${sortBy},keyword=${keyword},searchType=${searchType})}"
                    hx-target="#item-list-section" hx-select="#item-list-section" hx-swap="outerHTML" hx-push-url="true"
                    class="btn-secondary px-3 py-1.5"
                    th:text="#{view.common.pagination.prev}">
                이전
            </button>
            <th:block th:each="pageNumber : ${#numbers.sequence(1, page.totalPages())}">
                <button th:attr="hx-get=@{/items(page=${pageNumber},sortBy=${sortBy},keyword=${keyword},searchType=${searchType})}"
                        hx-target="#item-list-section" hx-select="#item-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${pageNumber == page.page()} ? 'bg-blue-600 text-white' : 'border border-slate-300 bg-white text-slate-600 hover:bg-slate-50'"
                        class="min-w-9 rounded-lg px-3 py-1.5 text-sm font-semibold transition"
                        th:text="${pageNumber}">1</button>
            </th:block>
            <button th:if="${page.hasNext()}"
                    th:attr="hx-get=@{/items(page=${page.nextPage()},sortBy=${sortBy},keyword=${keyword},searchType=${searchType})}"
                    hx-target="#item-list-section" hx-select="#item-list-section" hx-swap="outerHTML" hx-push-url="true"
                    class="btn-secondary px-3 py-1.5"
                    th:text="#{view.common.pagination.next}">
                다음
            </button>
        </div>
    </div>

</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
