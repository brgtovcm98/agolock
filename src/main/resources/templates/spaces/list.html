<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="|#{view.space.list.title} · SeuStock|">내 공간 · SeuStock</title>
</head>
<body class="ui-page ui-min-h-screen ui-bg-slate-50 ui-flex ui-flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<div id="modal"></div>

<main class="ui-page-main ui-mx-auto ui-w-full ui-max-w-3xl ui-px-4 ui-py-10 ui-flex-1">

    <div class="ui-page-header ui-mb-6 ui-flex ui-flex-wrap ui-items-center ui-justify-between ui-gap-3">
        <h1 class="ui-page-title ui-text-2xl ui-font-bold ui-text-slate-800" th:text="#{view.space.list.title}">내 공간</h1>
        <button type="button"
                hx-get="/spaces/new"
                hx-target="#modal"
                hx-swap="outerHTML"
                class="ui-button ui-button-primary ui-rounded-md ui-bg-blue-600 ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-white
                       ui-hover-bg-blue-700 ui-transition"
                th:text="#{view.space.list.add}">
            + 공간 추가
        </button>
    </div>

    <!-- 공간 목록 -->
    <div id="space-list-section" aria-live="polite" th:fragment="space-list-section" class="ui-space-y-3">
        <div class="ui-filter-panel ui-rounded-lg ui-border ui-border-slate-200 ui-bg-white ui-px-4 ui-py-3 ui-space-y-2">
            <form hx-get="/spaces"
                  hx-target="#space-list-section"
                  hx-select="#space-list-section"
                  hx-swap="outerHTML"
                  hx-push-url="true"
                  class="ui-flex ui-items-stretch">
                <input type="ui-hidden" name="sortBy" th:value="${sortBy}">
                <input type="ui-hidden" name="page" value="1">
                <span class="ui-inline-flex ui-shrink-0 ui-items-center ui-rounded-l-md ui-rounded-r-none ui-border ui-border-r-0 ui-border-slate-200 ui-bg-slate-50 ui-px-2 ui-py-1-5 ui-text-xs ui-font-medium ui-text-slate-500" th:text="#{view.space.list.searchLabel}">공간명</span>
                <input type="text"
                       name="keyword"
                       th:value="${keyword}"
                       th:placeholder="#{view.space.list.searchPlaceholder}"
                       class="ui-flex-1 ui-min-w-0 ui-rounded-none ui-border ui-border-slate-200 ui-px-3 ui-py-1-5 ui-text-sm ui-text-slate-700 ui-placeholder-slate-400 ui-focus-z-10 ui-focus-border-blue-400 ui-focus-outline-none ui-focus-ring-1 ui-focus-ring-blue-400">
                <button type="submit"
                        class="ui-shrink-0 ui-rounded-l-none ui-rounded-r-md ui-bg-slate-600 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-slate-700 ui-transition"
                        th:text="#{view.common.search}">
                    검색
                </button>
            </form>
            <div class="ui-flex ui-flex-wrap ui-gap-1">
                <button th:attr="hx-get=@{/spaces(sortBy='newest',keyword=${keyword})}"
                        hx-target="#space-list-section" hx-select="#space-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'newest'} ? 'ui-bg-blue-100 ui-text-blue-700 ui-ring-1 ui-ring-blue-300' : 'ui-bg-slate-100 ui-text-slate-500 ui-hover-bg-slate-200'"
                        class="ui-rounded-full ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-medium ui-transition"
                        th:text="#{view.common.sort.newest}">
                    가장 최신 순
                </button>
                <button th:attr="hx-get=@{/spaces(sortBy='oldest',keyword=${keyword})}"
                        hx-target="#space-list-section" hx-select="#space-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'oldest'} ? 'ui-bg-blue-100 ui-text-blue-700 ui-ring-1 ui-ring-blue-300' : 'ui-bg-slate-100 ui-text-slate-500 ui-hover-bg-slate-200'"
                        class="ui-rounded-full ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-medium ui-transition"
                        th:text="#{view.common.sort.oldest}">
                    가장 오래된 순
                </button>
                <button th:attr="hx-get=@{/spaces(sortBy='name',keyword=${keyword})}"
                        hx-target="#space-list-section" hx-select="#space-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'name'} ? 'ui-bg-blue-100 ui-text-blue-700 ui-ring-1 ui-ring-blue-300' : 'ui-bg-slate-100 ui-text-slate-500 ui-hover-bg-slate-200'"
                        class="ui-rounded-full ui-px-2-5 ui-py-0-5 ui-text-xs ui-font-medium ui-transition"
                        th:text="#{view.common.sort.name}">
                    공간명 순
                </button>
            </div>
        </div>

        <div id="space-list"
             th:fragment="space-list"
             class="ui-list ui-overflow-hidden ui-rounded-lg ui-border ui-border-slate-200 ui-bg-white">
            <div class="ui-hidden ui-md-flex ui-items-center ui-justify-between ui-border-b ui-border-slate-200 ui-bg-slate-50 ui-px-4 ui-py-3 ui-text-xs ui-font-semibold ui-uppercase ui-tracking-wide ui-text-slate-500">
                <div th:text="#{view.space.list.table.space}">공간</div>
                <div th:text="#{view.space.list.table.manage}">관리</div>
            </div>

            <div id="space-empty-msg"
                 th:if="${spaces.empty}"
                 class="ui-empty-state ui-px-4 ui-py-10 ui-text-center ui-text-sm ui-text-slate-400"
                 th:text="#{view.space.list.empty}">
                등록된 공간이 없습니다. 위에서 추가해보세요.
            </div>

            <div id="space-list-rows"
                 class="ui-divide-y ui-divide-slate-100">
                <th:block th:each="space : ${spaces}">
                    <th:block th:replace="~{spaces/fragments/row :: view}"></th:block>
                </th:block>
            </div>
        </div>

        <div id="space-list-more" th:fragment="space-list-more" class="ui-flex ui-justify-center">
            <button th:if="${page.hasNext()}"
                    th:attr="hx-get=@{/spaces(page=${page.nextPage()},sortBy=${sortBy},keyword=${keyword},append=true)}"
                    hx-target="#space-list-more"
                    hx-swap="outerHTML"
                    class="ui-button ui-button-secondary ui-rounded-md ui-border ui-border-slate-300 ui-bg-white ui-px-4 ui-py-2 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                    th:text="#{view.space.list.more}">
                더 보기
            </button>
        </div>

    </div>

</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
