<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="|#{view.space.list.title} · SeuStock|">내 공간 · SeuStock</title>
</head>
<body class="page min-h-screen bg-slate-50 flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<div id="modal"></div>

<main class="page-main mx-auto w-full max-w-3xl px-4 py-10 flex-1">

    <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
        <h1 class="page-title" th:text="#{view.space.list.title}">내 공간</h1>
        <button type="button"
                hx-get="/spaces/new"
                hx-target="#modal"
                hx-swap="outerHTML"
                class="btn-primary btn-header-action"
                th:text="#{view.space.list.add}">
            + 공간 추가
        </button>
    </div>

    <!-- 공간 목록 -->
    <div id="space-list-section" aria-live="polite" th:fragment="space-list-section" class="space-y-3">
        <div class="card p-4 space-y-2">
            <form hx-get="/spaces"
                  hx-target="#space-list-section"
                  hx-select="#space-list-section"
                  hx-swap="outerHTML"
                  hx-push-url="true"
                  class="flex items-stretch">
                <input type="hidden" name="sortBy" th:value="${sortBy}">
                <input type="hidden" name="page" value="1">
                <span class="inline-flex shrink-0 items-center rounded-l-md rounded-r-none border border-r-0 border-slate-200 bg-slate-50 px-2 py-1.5 text-xs font-medium text-slate-500" th:text="#{view.space.list.searchLabel}">공간명</span>
                <input type="text"
                       name="keyword"
                       th:value="${keyword}"
                       th:placeholder="#{view.space.list.searchPlaceholder}"
                       class="flex-1 min-w-0 rounded-none border border-slate-200 px-3 py-1.5 text-sm text-slate-700 placeholder:text-slate-400 focus:z-10 focus:border-blue-400 focus:outline-none focus:ring-1 focus:ring-blue-400">
                <button type="submit"
                        class="shrink-0 rounded-l-none rounded-r-md bg-slate-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-slate-700 transition"
                        th:text="#{view.common.search}">
                    검색
                </button>
            </form>
            <div class="flex flex-wrap gap-1">
                <button th:attr="hx-get=@{/spaces(sortBy='most_stock',keyword=${keyword})}"
                        hx-target="#space-list-section" hx-select="#space-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'most_stock'} ? 'bg-blue-100 text-blue-700 ring-1 ring-blue-300' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'"
                        class="rounded-full px-2-5 py-0.5 text-xs font-medium transition"
                        th:text="#{view.common.sort.mostStock}">
                    재고 많은 순
                </button>
                <button th:attr="hx-get=@{/spaces(sortBy='recent_activity',keyword=${keyword})}"
                        hx-target="#space-list-section" hx-select="#space-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'recent_activity'} ? 'bg-blue-100 text-blue-700 ring-1 ring-blue-300' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'"
                        class="rounded-full px-2-5 py-0.5 text-xs font-medium transition"
                        th:text="#{view.common.sort.recentActivity}">
                    최근 활동 순
                </button>
                <button th:attr="hx-get=@{/spaces(sortBy='newest',keyword=${keyword})}"
                        hx-target="#space-list-section" hx-select="#space-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'newest'} ? 'bg-blue-100 text-blue-700 ring-1 ring-blue-300' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'"
                        class="rounded-full px-2-5 py-0.5 text-xs font-medium transition"
                        th:text="#{view.common.sort.newest}">
                    가장 최신 순
                </button>
                <button th:attr="hx-get=@{/spaces(sortBy='oldest',keyword=${keyword})}"
                        hx-target="#space-list-section" hx-select="#space-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'oldest'} ? 'bg-blue-100 text-blue-700 ring-1 ring-blue-300' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'"
                        class="rounded-full px-2-5 py-0.5 text-xs font-medium transition"
                        th:text="#{view.common.sort.oldest}">
                    가장 오래된 순
                </button>
                <button th:attr="hx-get=@{/spaces(sortBy='name',keyword=${keyword})}"
                        hx-target="#space-list-section" hx-select="#space-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'name'} ? 'bg-blue-100 text-blue-700 ring-1 ring-blue-300' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'"
                        class="rounded-full px-2-5 py-0.5 text-xs font-medium transition"
                        th:text="#{view.common.sort.name}">
                    공간명 순
                </button>
            </div>
        </div>

        <div id="space-list"
             th:fragment="space-list"
             class="flex flex-col gap-2.5">
            <div id="space-empty-msg"
                 th:if="${spaces.empty}"
                 class="empty-state rounded-xl border border-slate-200 bg-white"
                 th:text="#{view.space.list.empty}">
                등록된 공간이 없습니다. 위에서 추가해보세요.
            </div>

            <div id="space-list-rows"
                 class="flex flex-col gap-2.5">
                <th:block th:each="space : ${spaces}">
                    <th:block th:replace="~{spaces/fragments/row :: view}"></th:block>
                </th:block>
            </div>
        </div>

        <div id="space-list-more" th:fragment="space-list-more" class="flex justify-center">
            <button th:if="${page.hasNext()}"
                    th:attr="hx-get=@{/spaces(page=${page.nextPage()},sortBy=${sortBy},keyword=${keyword},append=true)}"
                    hx-target="#space-list-more"
                    hx-swap="outerHTML"
                    class="btn-secondary"
                    th:text="#{view.space.list.more}">
                더 보기
            </button>
        </div>

    </div>

</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
