<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal" data-component-id="spaces.modal.create" role="dialog" aria-modal="true" aria-labelledby="modal-title"
     class="modal-overlay fixed inset-0 z-50 flex items-center justify-center">
    <div class="modal-dialog max-w-sm mx-4 p-6">

        <h2 id="modal-title" class="modal-title mb-4" th:text="#{view.space.modal.add.title}">공간 추가</h2>

        <form th:object="${form}"
              method="post"
              hx-post="/spaces"
              hx-target="#modal"
              hx-swap="outerHTML">
            <div class="mb-4">
                <label class="field-label"
                       th:text="#{view.space.list.searchLabel}">
                    공간명
                </label>
                <input type="text" th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                       class="field-input"
                       th:placeholder="#{view.space.list.addPlaceholder}">
                <span th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"
                      class="field-error"></span>
            </div>

            <div class="flex gap-2 justify-end">
                <button type="button"
                        hx-get="/empty"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="btn-secondary text-sm"
                        th:text="#{view.common.cancel}">
                    취소
                </button>
                <button type="submit"
                        class="btn-primary text-sm"
                        th:text="#{view.common.add}">
                    추가
                </button>
            </div>
        </form>
    </div>
</div>

<th:block th:fragment="created">
    <div id="space-list-rows" hx-swap-oob="afterbegin">
        <th:block th:replace="~{spaces/fragments/row :: view}"></th:block>
    </div>
    <div id="space-empty-msg" hx-swap-oob="true"></div>
    <div id="modal" data-component-id="spaces.modal-mount"></div>
</th:block>

</body>
</html>
