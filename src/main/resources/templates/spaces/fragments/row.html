<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 읽기 모드 카드 (컴팩트 집계 스트립) -->
<div th:fragment="view" th:id="'space-' + ${space.externalId}"
     class="ui-flex ui-flex-col ui-gap-3 ui-px-4 ui-py-4 ui-sm-flex-row sm:items-start sm:justify-between">
    <div class="ui-min-w-0 ui-flex-1"
         th:with="sm=${summaries != null ? summaries.get(space.externalId) : null}">
        <div class="ui-flex ui-flex-wrap items-baseline ui-gap-x-2">
            <a th:href="@{/spaces/{id}(id=${space.externalId})}"
               class="ui-truncate ui-text-sm ui-font-medium ui-text-blue-600 ui-hover-underline"
               th:text="${space.name}"></a>
            <span class="ui-text-xs ui-text-slate-400"
                  th:text="${#temporals.format(space.createdAt, 'yyyy-MM-dd')}"></span>
        </div>

        <!-- 집계 지표 (요약이 있을 때만) -->
        <div th:if="${sm != null}" class="ui-mt-1-5 ui-space-y-1">
            <p class="ui-text-xs ui-text-slate-600">
                <span th:text="|#{view.space.list.summary.items} ${sm.itemCount}|"></span>
                <span class="ui-text-slate-300"> · </span>
                <span th:text="|#{view.space.list.summary.stocks} ${sm.stockCount}|"></span>
                <span class="ui-text-slate-300"> · </span>
                <span class="ui-font-medium ui-text-slate-700"
                      th:text="|₩ ${#numbers.formatInteger(sm.totalValue, 1, 'COMMA')}|"></span>
            </p>

            <p class="ui-text-xs ui-text-slate-400">
                <span th:text="|#{view.space.list.summary.shelves} ${sm.shelfCount}|"></span>
                <span class="ui-text-slate-300"> · </span>
                <span th:text="|#{view.space.list.summary.boxes} ${sm.boxCount}|"></span>
                <span th:if="${sm.lastActivityAt != null}">
                    <span class="ui-text-slate-300"> · </span>
                    <span th:text="|#{view.space.list.summary.lastActivity} ${#temporals.format(sm.lastActivityAt, 'MM-dd')}|"></span>
                </span>
            </p>

            <!-- 주의 배지 (값이 0이면 숨김) -->
            <div th:if="${sm.expiringCount > 0 or sm.expiredCount > 0 or sm.damagedLostCount > 0}"
                 class="ui-flex ui-flex-wrap ui-gap-1">
                <span th:if="${sm.expiringCount > 0}"
                      class="ui-inline-flex ui-items-center ui-rounded-full ui-bg-amber-100 ui-px-2 ui-py-0-5 ui-text-xs ui-font-medium ui-text-amber-700 ui-ring-1 ui-ring-amber-200"
                      th:text="|⚠ #{view.space.list.summary.alert.expiring} ${sm.expiringCount}|"></span>
                <span th:if="${sm.expiredCount > 0}"
                      class="ui-inline-flex ui-items-center ui-rounded-full ui-bg-red-100 ui-px-2 ui-py-0-5 ui-text-xs ui-font-medium ui-text-red-700 ui-ring-1 ui-ring-red-200"
                      th:text="|#{view.space.list.summary.alert.expired} ${sm.expiredCount}|"></span>
                <span th:if="${sm.damagedLostCount > 0}"
                      class="ui-inline-flex ui-items-center ui-rounded-full ui-bg-slate-100 ui-px-2 ui-py-0-5 ui-text-xs ui-font-medium ui-text-slate-600 ui-ring-1 ui-ring-slate-200"
                      th:text="|#{view.space.list.summary.alert.damagedLost} ${sm.damagedLostCount}|"></span>
            </div>
        </div>
    </div>

    <div class="ui-flex ui-shrink-0 ui-items-center ui-gap-2 sm:justify-end">
        <button class="ui-rounded-md ui-border ui-border-slate-300 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                th:attr="hx-get=@{/spaces/{id}/edit(id=${space.externalId})},hx-target='#space-' + ${space.externalId}"
                hx-swap="outerHTML" th:text="#{view.common.edit}">수정</button>
    </div>
</div>

<!-- 수정 모드 카드 -->
<div th:fragment="edit" th:id="'space-' + ${space.externalId}"
     class="ui-grid ui-gap-3 ui-border-l-4 ui-border-blue-500 ui-bg-blue-50-40 ui-px-4 ui-py-4 md:grid-cols-[minmax(0,1.5fr)_minmax(0,1fr)_14rem] ui-md-items-center">
    <input type="text" name="name" th:value="${space.name}"
           class="ui-flex-1 ui-rounded-md ui-border ui-border-slate-300 ui-px-2 ui-py-1 ui-text-sm
                  ui-focus-outline-none ui-focus-ring-2 ui-focus-ring-blue-500 ui-focus-border-blue-500">
    <p class="ui-text-sm ui-text-slate-500"
       th:text="${#temporals.format(space.createdAt, 'yyyy-MM-dd')}"></p>
    <div class="ui-flex ui-items-center ui-gap-2 md:justify-end">
        <button class="ui-rounded-md ui-bg-blue-600 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-blue-700 ui-transition"
                th:attr="hx-put=@{/spaces/{id}(id=${space.externalId})},hx-target='#space-' + ${space.externalId}"
                hx-swap="outerHTML"
                hx-include="closest div[id]" th:text="#{view.common.save}">저장</button>
        <button class="ui-rounded-md ui-border ui-border-red-200 ui-bg-white ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-red-500 ui-hover-bg-red-50 ui-transition"
                th:attr="hx-delete=@{/spaces/{id}(id=${space.externalId},page=${page != null ? page.page() : 1},sortBy=${sortBy},keyword=${keyword})},hx-confirm=#{view.space.list.deleteConfirm(${space.name})}"
                hx-target="#space-list-section"
                hx-swap="outerHTML" th:text="#{view.common.delete}">삭제</button>
        <button class="ui-rounded-md ui-border ui-border-slate-300 ui-bg-white ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-slate-600 ui-hover-bg-slate-50 ui-transition"
                th:attr="hx-get=@{/spaces/{id}/cancel(id=${space.externalId})},hx-target='#space-' + ${space.externalId}"
                hx-swap="outerHTML" th:text="#{view.common.cancel}">취소</button>
    </div>
</div>

</body>
</html>
