<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 읽기 모드 카드 (개선) -->
<div th:fragment="view" data-component-id="spaces.row.view" th:id="'space-' + ${space.externalId}"
     th:with="sm=${summaries != null ? summaries.get(space.externalId) : null}"
     th:classappend="${sm == null or sm.itemCount == 0} ? 'is-empty'"
     class="space-card">

    <div th:if="${sm != null and sm.itemCount > 0}">
        <!-- 채워진 공간 -->
        <div class="space-top">
            <div class="space-title">
                <a class="space-no" th:href="@{/spaces/{id}(id=${space.externalId})}"
                   th:text="${space.name}">공간 3</a>
                <span class="space-date"
                      th:text="${#temporals.format(space.createdAt, 'yyyy-MM-dd')}">2026-06-21</span>
            </div>
            <div class="space-actions">
                <button class="btn-secondary btn-sm"
                        th:attr="hx-get=@{/spaces/{id}/edit(id=${space.externalId})},hx-target='#space-' + ${space.externalId}"
                        hx-swap="outerHTML" th:text="#{view.common.edit}">수정</button>
            </div>
        </div>
        <div class="space-metrics">
            <div class="space-metric">
                <div class="lbl" th:text="#{view.space.list.summary.items}">품목</div>
                <div class="val" th:text="${sm.itemCount}">8</div>
            </div>
            <div class="space-metric">
                <div class="lbl" th:text="#{view.space.list.summary.stocks}">재고</div>
                <div class="val" th:text="${sm.stockCount}">142</div>
            </div>
            <div class="space-metric">
                <div class="lbl" th:text="#{view.space.list.summary.value}">평가액</div>
                <div class="val" th:text="'₩' + ${#numbers.formatInteger(sm.totalValue, 1, 'COMMA')}">₩320,000</div>
            </div>
            <div class="space-metric div">
                <div class="lbl" th:text="#{view.space.list.summary.shelvesBoxes}">선반 · 박스</div>
                <div class="val" th:text="${sm.shelfCount} + ' · ' + ${sm.boxCount}">4 · 12</div>
            </div>
        </div>
    </div>

    <div th:unless="${sm != null and sm.itemCount > 0}">
        <!-- 빈 공간 -->
        <div class="space-top">
            <div class="space-title">
                <a class="space-no muted" th:href="@{/spaces/{id}(id=${space.externalId})}"
                   th:text="${space.name}">공간 25</a>
                <span class="space-date" th:text="${#temporals.format(space.createdAt, 'yyyy-MM-dd')} + ' · ' + #{view.space.list.emptyState}">2026-06-21 · 비어 있음</span>
            </div>
            <div class="space-actions">
                <a class="btn--cta"
                   th:href="@{/spaces/{id}(id=${space.externalId})}"
                   th:text="#{view.space.list.addItem}">+ 품목 담기</a>
                <button class="btn-secondary btn-sm"
                        th:attr="hx-get=@{/spaces/{id}/edit(id=${space.externalId})},hx-target='#space-' + ${space.externalId}"
                        hx-swap="outerHTML" th:text="#{view.common.edit}">수정</button>
            </div>
        </div>
    </div>

</div>

<!-- 수정 모드 카드 -->
<div th:fragment="edit" data-component-id="spaces.row.edit" th:id="'space-' + ${space.externalId}"
     class="grid gap-3 border-l-4 border-blue-500 bg-blue-50-40 px-4 py-4 md:grid-cols-[minmax(0,1.5fr)_minmax(0,1fr)_14rem] md:items-center">
    <input type="text" name="name" th:value="${space.name}"
           class="field-input flex-1">
    <p class="text-sm text-slate-500"
       th:text="${#temporals.format(space.createdAt, 'yyyy-MM-dd')}"></p>
    <div class="flex items-center gap-2 md:justify-end">
        <button class="btn-primary btn-sm"
                th:attr="hx-put=@{/spaces/{id}(id=${space.externalId})},hx-target='#space-' + ${space.externalId}"
                hx-swap="outerHTML"
                hx-include="closest div[id]" th:text="#{view.common.save}">저장</button>
        <button class="btn-danger btn-sm"
                th:attr="hx-delete=@{/spaces/{id}(id=${space.externalId},page=${page != null ? page.page() : 1},sortBy=${sortBy},keyword=${keyword})},hx-confirm=#{view.space.list.deleteConfirm(${space.name})}"
                hx-target="#space-list-section"
                hx-swap="outerHTML" th:text="#{view.common.delete}">삭제</button>
        <button class="btn-secondary btn-sm"
                th:attr="hx-get=@{/spaces/{id}/cancel(id=${space.externalId})},hx-target='#space-' + ${space.externalId}"
                hx-swap="outerHTML" th:text="#{view.common.cancel}">취소</button>
    </div>
</div>

</body>
</html>
