<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="${spaceDetail.name} + ' · SeuStock'">공간 상세 · SeuStock</title>
</head>
<body class="ui-page ui-min-h-screen ui-bg-slate-50 ui-flex ui-flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<div id="modal"></div>

<main class="ui-page-main ui-mx-auto ui-w-full ui-max-w-5xl ui-px-4 ui-py-10 ui-flex-1">

    <!-- 헤더 -->
    <div class="ui-mb-6 ui-flex ui-items-center ui-gap-2 ui-text-sm ui-text-slate-500">
        <a href="/spaces" class="ui-hover-text-slate-800 ui-transition" th:text="#{view.space.detail.nav}">내 공간</a>
        <span>›</span>
        <span class="ui-font-semibold ui-text-slate-800" th:text="${spaceDetail.name}"></span>
    </div>

    <!-- 2패널 레이아웃 -->
    <div class="ui-flex ui-flex-col ui-lg-flex-row ui-gap-4 ui-lg-items-start">

        <!-- 왼쪽: 위치 트리 -->
        <div class="ui-w-full ui-lg-w-64 ui-lg-shrink-0 ui-rounded-lg ui-border ui-border-slate-200 ui-bg-white ui-overflow-hidden">
            <div class="ui-px-4 ui-py-3 ui-bg-slate-50 ui-border-b ui-border-slate-200 ui-flex ui-items-center ui-justify-between">
                <span class="ui-text-xs ui-font-semibold ui-text-slate-500 ui-uppercase ui-tracking-wide" th:text="#{view.space.detail.structure}">위치 구조</span>
                <button th:attr="hx-get=@{/spaces/{id}/shelves/new(id=${space})}"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="ui-rounded-md ui-bg-blue-600 ui-px-3 ui-py-1-5 ui-text-sm ui-font-semibold ui-text-white ui-hover-bg-blue-700 ui-transition"
                        th:text="#{view.space.detail.addShelf}">
                    + 선반
                </button>
            </div>

            <ul id="shelf-list" th:fragment="shelf-list">
                <th:block th:replace="~{spaces/fragments/shelf-list-response :: shelf-list-content}"></th:block>
            </ul>

            <!-- 전체보기 진입점 -->
            <div class="tree-item-container ui-tree-item-selected ui-border-t ui-border-slate-100 ui-px-3">
                <button th:attr="hx-get=@{/spaces/{id}/stocks/all(id=${space})}"
                        hx-target="#stock-panel"
                        hx-swap="outerHTML"
                        class="tree-item-trigger tree-item-text ui-w-full ui-text-left ui-text-sm ui-font-medium ui-text-slate-600 ui-hover-text-slate-900 ui-active-bg-slate-50 ui-transition ui-py-3 ui-min-h-56px ui-flex ui-items-center"
                        th:text="|🗂 #{view.space.detail.viewAll(${spaceDetail.name})}|">
                    🗂 [[${space.name}]] 전체보기
                </button>
            </div>

            <!-- 공간 직접 재고 진입점 -->
            <div class="tree-item-container ui-border-t ui-border-slate-100 ui-px-3">
                <button th:attr="hx-get=@{/spaces/{id}/stocks(id=${space})}"
                        hx-target="#stock-panel"
                        hx-swap="outerHTML"
                        class="tree-item-trigger tree-item-text ui-w-full ui-text-left ui-text-sm ui-text-slate-500 ui-hover-text-slate-800 ui-active-bg-slate-50 ui-transition ui-py-3 ui-min-h-56px ui-flex ui-items-center"
                        th:text="|📦 #{view.space.detail.viewLoose(${spaceDetail.name})}|">
                    📦 [[${space.name}]]에 대충 던져놓은 물건들
                </button>
            </div>
        </div>

        <!-- 오른쪽: 재고 패널 -->
        <div class="ui-w-full ui-lg-flex-1 ui-lg-min-w-0">
            <div id="stock-panel"
                 th:attr="hx-get=@{/spaces/{id}/stocks/all(id=${space})}"
                 hx-trigger="load"
                 hx-swap="outerHTML">
            </div>
        </div>

    </div>

</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    function toggleBoxList(shelfId, headerEl) {
        const ul = document.getElementById('box-list-' + shelfId);
        const arrow = headerEl.querySelector('.arrow');
        if (!ul) return;
        if (ul.classList.contains('hidden')) {
            ul.classList.remove('hidden');
            if (arrow) arrow.textContent = '▼';
        } else {
            ul.classList.add('hidden');
            if (arrow) arrow.textContent = '▶';
        }
    }

    function startStockMoveMode() {
        const panel = document.getElementById('stock-panel');
        if (!panel) return;
        panel.classList.add('stock-move-mode');
        panel.querySelectorAll('.stock-default-only').forEach(function(el) {
            el.classList.add('hidden');
        });
        panel.querySelectorAll('.stock-move-only').forEach(function(el) {
            el.classList.remove('hidden');
        });
        const form = document.getElementById('stock-move-selection-form');
        if (form) form.classList.remove('hidden');
        syncStockMoveControls();
    }

    function cancelStockMoveMode() {
        const panel = document.getElementById('stock-panel');
        if (!panel) return;
        panel.classList.remove('stock-move-mode');
        panel.querySelectorAll('.stock-default-only').forEach(function(el) {
            el.classList.remove('hidden');
        });
        panel.querySelectorAll('.stock-move-only').forEach(function(el) {
            el.classList.add('hidden');
        });
        panel.querySelectorAll('.stock-move-check').forEach(function(input) {
            input.checked = false;
        });
        panel.querySelectorAll('.stock-move-count').forEach(function(input) {
            input.value = input.max || '1';
        });
        const form = document.getElementById('stock-move-selection-form');
        if (form) form.classList.add('hidden');
        const fields = document.getElementById('move-selection-fields');
        if (fields) fields.innerHTML = '';
        syncStockMoveControls();
    }

    function syncStockMoveControls() {
        const submit = document.getElementById('stock-move-submit');
        if (!submit) return;
        const checkedRows = Array.from(document.querySelectorAll('#stock-panel .stock-move-check:checked'));
        const hasInvalidCount = checkedRows.some(function(check) {
            const row = check.closest('[data-item-external-id]');
            const countInput = row ? row.querySelector('.stock-move-count') : null;
            const count = countInput ? parseInt(countInput.value, 10) : NaN;
            const max = countInput ? parseInt(countInput.max, 10) : NaN;
            return isNaN(count) || count < 1 || count > max;
        });
        submit.disabled = checkedRows.length === 0 || hasInvalidCount;
    }

    function prepareStockMoveSelection() {
        const fields = document.getElementById('move-selection-fields');
        if (!fields) return false;
        fields.innerHTML = '';

        const checkedRows = Array.from(document.querySelectorAll('#stock-panel .stock-move-check:checked'));
        if (checkedRows.length === 0) {
            syncStockMoveControls();
            return false;
        }

        for (let i = 0; i < checkedRows.length; i++) {
            const row = checkedRows[i].closest('[data-item-external-id]');
            const countInput = row ? row.querySelector('.stock-move-count') : null;
            const count = countInput ? parseInt(countInput.value, 10) : NaN;
            const max = countInput ? parseInt(countInput.max, 10) : NaN;
            if (!row || isNaN(count) || count < 1 || count > max) {
                syncStockMoveControls();
                return false;
            }
            fields.appendChild(hiddenInput('items[' + i + '].itemExternalId', row.dataset.itemExternalId));
            fields.appendChild(hiddenInput('items[' + i + '].count', String(count)));
        }
        return true;
    }

    function hiddenInput(name, value) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = name;
        input.value = value || '';
        return input;
    }

    document.addEventListener('htmx:afterRequest', function(evt) {
        const triggerEl = evt.detail.elt;
        if (triggerEl && triggerEl.classList.contains('tree-item-trigger')) {
            document.querySelectorAll('.tree-item-container').forEach(function(el) {
                el.classList.remove('ui-tree-item-selected');
            });
            const container = triggerEl.closest('.tree-item-container');
            if (container) {
                container.classList.add('ui-tree-item-selected');
            }
        }
    });
</script>

</body>
</html>
